  id = 15
  question = "Реализовать сортировку массива чисел"
  answer = "**Условие задачи:**  \n🔥 Напишите функцию, которая принимает массив `int[]`, сортирует его по возрастанию и возвращает результат.\n\n📌 **Пример 1:**  \nInput: `[9, 4, 7, 3, 1]`  \nOutput: `[1, 3, 4, 7, 9]`\n\n📌 **Пример 2:**  \nInput: `[5, 1, 1, 2, 0, 0]`  \nOutput: `[0, 0, 1, 1, 2, 5]`\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используй **алгоритм пузырьковой сортировки (Bubble Sort)**.  \n💡 Сравнивай соседние элементы и меняй местами, если они стоят не в том порядке.  \n💡 Повторяй процесс, пока массив не отсортируется.  \n💡 Сложность такого алгоритма — O(n²), он подходит только для небольших массивов.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class ArrayUtils {\n    public static int[] sortArray(int[] arr) {\n        for (int i = 0; i < arr.length - 1; i++) {\n            for (int j = 0; j < arr.length - i - 1; j++) {\n                if (arr[j] > arr[j + 1]) {\n                    int temp = arr[j];\n                    arr[j] = arr[j + 1];\n                    arr[j + 1] = temp;\n                }\n            }\n        }\n        return arr;\n    }\n\n    public static void main(String[] args) {\n        int[] nums = {9, 4, 7, 3, 1};\n        int[] sorted = sortArray(nums);\n        for (int n : sorted) {\n            System.out.print(n + \" \");\n        }\n        // Вывод: 1 3 4 7 9\n    }\n}\n```\n\n📌 **Что важно помнить:**  \n✅ Мы не используем `Arrays.sort()` — это ручная реализация.  \n✅ Это **пузырьковая сортировка**, простая в реализации.  \n✅ Подходит для обучения и простых задач, но неэффективна для больших массивов.  \n✅ Можно улучшить, добавив флаг для выхода при уже отсортированном массиве.\n\n{{< /details >}}"
  filepath = "sort-array"

[[tasks]]
  id = 16
  question = "Реализовать простое двоичное дерево поиска"
  answer = "**Условие задачи:**  \n🔥 Реализовать простое **двоичное дерево поиска (BST)**:\n\n- добавление элементов\n    \n- обход в **in-order** (сначала левый, потом текущий, потом правый)\n    \n**Пример 1**\n\nВход:\n\n```java\n[5, 3, 7, 2, 4, 6, 8]\n```\n\nДерево:\n\n```\n        5\n       / \\\n      3   7\n     / \\ / \\\n    2  4 6  8\n```\n\nРезультат in-order:\n\n```java\n[2, 3, 4, 5, 6, 7, 8]\n```\n\n---\n\n**Пример 2**\n\nВход:\n\n```java\n[10, 5, 1, 7, 40, 50]\n```\n\nДерево:\n\n```\n        10\n       /  \\\n      5    40\n     / \\      \\\n    1   7      50\n```\n\nРезультат in-order:\n\n```java\n[1, 5, 7, 10, 40, 50]\n```\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n🌳 **Двоичное дерево поиска** (Binary Search Tree) хранит меньшие значения слева, большие — справа.  \n📌 Для вставки используем рекурсивный метод `insertRec`.  \n📌 Обход in-order позволяет получить **отсортированную последовательность** значений.  \n💡 Используй `System.out.print()` внутри рекурсивного обхода, чтобы увидеть структуру.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class BinaryTree {\n\n    static class Node {\n        int value;\n        Node left;\n        Node right;\n\n        Node(int value) {\n            this.value = value;\n        }\n    }\n\n    private Node root;\n\n    public void insert(int value) {\n        root = insertRec(root, value);\n    }\n\n    private Node insertRec(Node root, int value) {\n        if (root == null) return new Node(value);\n\n        if (value < root.value) root.left = insertRec(root.left, value);\n        else if (value > root.value) root.right = insertRec(root.right, value);\n\n        return root;\n    }\n\n    public void inOrderTraversal() {\n        inOrderRec(root);\n    }\n\n    private void inOrderRec(Node root) {\n        if (root != null) {\n            inOrderRec(root.left);\n            System.out.print(root.value + \" \");\n            inOrderRec(root.right);\n        }\n    }\n\n    public static void main(String[] args) {\n        BinaryTree tree = new BinaryTree();\n        tree.insert(5);\n        tree.insert(3);\n        tree.insert(7);\n        tree.insert(1);\n        tree.insert(4);\n\n        System.out.println(\"In-order traversal:\");\n        tree.inOrderTraversal();  // Output: 1 3 4 5 7\n    }\n}\n```\n\n📌 **Что ты реализовал:**  \n✅ Добавление элементов в бинарное дерево.  \n✅ Обход in-order (слева → текущий → справа).  \n✅ Рекурсивную структуру дерева.  \n✅ Пример работы — можно запустить и проверить.\n\n{{< /details >}}"
  filepath = "binary-tree"

[[tasks]]
  id = 17
  question = "Реализовать инверсию числа"
  answer = "**Условие задачи:**  \n🔥 Написать метод, который принимает целое число `x`, инвертирует его цифры и возвращает результат.\n\n- Если число выходит за диапазон `[-10000, 10000]`, необходимо выбросить исключение.\n    \n- Знак числа должен сохраняться.\n    \n\n📌 **Пример 1:**  \nВход: `x = 123`  \nВыход: `321`\n\n📌 **Пример 2:**  \nВход: `x = -123`  \nВыход: `-321`\n\n📌 **Пример 3:**  \nВход: `x = 120`  \nВыход: `21`\n\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используй `% 10`, чтобы получить последнюю цифру числа.  \n💡 Каждый шаг умножай результат на 10 и добавляй извлечённую цифру.  \n💡 Сначала отдели знак числа.  \n💡 Проверь диапазон входного числа до начала вычислений.  \n💡 Временная сложность — `O(d)`, где `d` — количество цифр.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class Solution {\n\n    public static int reverse(int x) {\n        if (x < -10000 || x > 10000) {\n            throw new IllegalArgumentException(\n                    \"Число должно быть в диапазоне [-10000, 10000]\"\n            );\n        }\n\n        int sign = x < 0 ? -1 : 1;\n        int abs = Math.abs(x);\n        int reversed = 0;\n\n        while (abs > 0) {\n            reversed = reversed * 10 + abs % 10;\n            abs /= 10;\n        }\n\n        return sign * reversed;\n    }\n\n    public static void main(String[] args) {\n        System.out.println(reverse(123));   // 321\n        System.out.println(reverse(-123));  // -321\n        System.out.println(reverse(120));   // 21\n    }\n}\n```\n\n📌 **Что важно помнить:**\n\n✅ Работаем с модулем числа, знак возвращаем в конце.  \n✅ Проверяем диапазон входных данных.  \n✅ Не используем преобразование в строку — решение математическое.  \n✅ Сложность алгоритма — `O(d)`.\n\n{{< /details >}}"
  filepath = "reverse-number"

[[tasks]]
  id = 18
  question = "Реализовать проверку повторяющихся символов в строке"
  answer = "**Условие задачи:**  \n🔥 Реализуйте метод, который принимает на вход непустую строку и проверяет, что в строке отсутствуют символы, повторяющиеся более двух раз.\n\nМетод возвращает:\n\n- `true`, если нет символов с более чем двумя повторениями\n    \n- `false`, если такие символы присутствуют\n    \n\n📌 **Пример 1:**  \nВход: `\"aabbcc\"`  \nВыход: `true`\n\n📌 **Пример 2:**  \nВход: `\"aaabbc\"`  \nВыход: `false`\n\n📌 **Ограничения:**\n\n- Строка не пустая\n    \n- Может содержать любые символы\n    \n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `Map<Character, Integer>` для подсчета количества появлений каждого символа.  \n💡 Если для любого символа количество появлений становится больше двух — сразу возвращайте `false`.  \n💡 Добавьте проверку на `null` и пустую строку.  \n💡 Решение должно работать за `O(n)`.  \n💡 Используйте `getOrDefault()` для компактной записи.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.HashMap;\nimport java.util.Map;\n\npublic class StringUtils {\n\n    public static boolean validateString(String input) {\n        if (input == null || input.isEmpty()) {\n            throw new IllegalArgumentException(\"Строка не должна быть пустой\");\n        }\n\n        Map<Character, Integer> charCount = new HashMap<>();\n\n        for (char c : input.toCharArray()) {\n            int count = charCount.getOrDefault(c, 0) + 1;\n\n            if (count > 2) {\n                return false; // ранний выход\n            }\n\n            charCount.put(c, count);\n        }\n\n        return true;\n    }\n\n    public static void main(String[] args) {\n        System.out.println(validateString(\"aabbcc\")); // true\n        System.out.println(validateString(\"aaabbc\")); // false\n        System.out.println(validateString(\"abcabc\")); // true\n    }\n}\n```\n\n📌 **Что важно помнить:**\n\n✅ Временная сложность — `O(n)`  \n✅ Пространственная сложность — `O(k)` (где `k` — количество уникальных символов)  \n✅ Используется ранний выход при превышении лимита  \n✅ Подходит для больших строк\n\n{{< /details >}}"
  filepath = "string-repetition"

[[tasks]]
  id = 19
  question = "Подсчитать количество символов в повторяющейся строке"
  answer = "**Условие задачи:**  \n🔥 Дана строка `s`, состоящая из строчных английских букв, которая повторяется бесконечно.  \nДано целое число `n`. Нужно определить, сколько букв `'a'` содержится в первых `n` символах этой бесконечной строки.\n\n📌 **Пример 1:**  \nВход: `s = \"abcac\", n = 10`  \nВыход: `4`\n\nПояснение:  \nБесконечная строка: `\"abcacabcacabcac...\"`  \nПервые 10 символов: `\"abcacabcac\"`  \nКоличество `'a'` = 4\n\n📌 **Пример 2:**  \nВход: `s = \"a\", n = 1000000000000`  \nВыход: `1000000000000`\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Не создавайте строку длиной `n` — это приведёт к переполнению памяти.  \n💡 Найдите количество полных повторений строки: `n / s.length()`.  \n💡 Подсчитайте количество `'a'` в одной строке `s`.  \n💡 Умножьте на количество полных повторений.  \n💡 Обработайте остаток `n % s.length()`.  \n💡 Используйте тип `long`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nclass Result {\n\n    public static long repeatedString(String s, long n) {\n\n        long countAInOneString = 0;\n\n        // считаем количество 'a' в одной строке\n        for (int i = 0; i < s.length(); i++) {\n            if (s.charAt(i) == 'a') {\n                countAInOneString++;\n            }\n        }\n\n        long fullRepeats = n / s.length();\n        long totalCount = fullRepeats * countAInOneString;\n\n        long remainder = n % s.length();\n\n        // считаем 'a' в остатке\n        for (int i = 0; i < remainder; i++) {\n            if (s.charAt(i) == 'a') {\n                totalCount++;\n            }\n        }\n\n        return totalCount;\n    }\n}\n```\n\n📌 **Что важно помнить:**\n\n✅ Временная сложность — `O(|s|)`  \n✅ Память — `O(1)`  \n✅ Мы не создаём огромную строку  \n✅ Обязательно используем `long`  \n✅ Решение проходит большие тесты HackerRank\n\n{{< /details >}}"
  filepath = "repeated-string"

[[tasks]]
  id = 20
  question = "Написать реализацию метода filterUsers()"
  answer = "**Условие задачи:**  \n🔥 Реализовать метод `filterUsers`, который **in-place** отфильтровывает список `users`, оставляя только тех, у кого имя начинается с `namePrefix` и возраст больше 18.\n\n```java\nimport lombok.Data;\nimport java.util.ArrayList;\n\n@Data\nclass User {\n    private String name;\n    private int age;\n}\n\npublic class UserUtils {\n    public static void filterUsers(ArrayList<User> users, String namePrefix) {\n        // ваш код\n    }\n}\n\n```\n\n{{< hint warning >}}\nСпойлеры к решению\n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Для удаления элементов in-place используйте Iterator и его метод remove().  \n💡 Можно также воспользоваться методом List.removeIf(...) из Java 8.  \n💡 Для проверки префикса используйте String.startsWith(namePrefix).  \n💡 Условие фильтрации: user.getAge() > 18.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n\nimport lombok.Data;\nimport java.util.ArrayList;\nimport java.util.Iterator;\n\n@Data\nclass User {\n    private String name;\n    private int age;\n}\n\npublic class UserUtils {\n    public static void filterUsers(ArrayList<User> users, String namePrefix) {\n        Iterator<User> iterator = users.iterator();\n        while (iterator.hasNext()) {\n            User user = iterator.next();\n            if (!user.getName().startsWith(namePrefix) || user.getAge() <= 18) {\n                iterator.remove();\n            }\n        }\n    }\n\n    // Альтернативный вариант с removeIf:\n    // public static void filterUsers(ArrayList<User> users, String namePrefix) {\n    //     users.removeIf(user ->\n    //         !user.getName().startsWith(namePrefix) || user.getAge() <= 18\n    //     );\n    // }\n\n    public static void main(String[] args) {\n        ArrayList<User> list = new ArrayList<>();\n        list.add(new User(\"Alice\", 20));\n        list.add(new User(\"Bob\", 17));\n        list.add(new User(\"Alex\", 25));\n        list.add(new User(\"Anna\", 18));\n\n        filterUsers(list, \"A\");\n        list.forEach(u -> System.out.println(u.getName() + \" \" + u.getAge()));\n        // Вывод:\n        // Alice 20\n        // Alex 25\n    }\n}\n{{< /details >}}"
  filepath = "filter-users-in-place"

[[tasks]]
  id = 21
  question = "Найти первый неповторяющийся элемент в массиве"
  answer = "**Условие задачи:**  \n🔥 Дан массив целых чисел `{9, 4, 9, 6, 6, 4, 5}`. Необходимо найти первый элемент, который в этом массиве встречается ровно один раз.\n\n**Код:**\n\n```java\npublic class Main {\n    public static void main(String[] args) {\n        int[] array = {9, 4, 9, 6, 6, 4, 5};\n        // TODO\n    }\n}\n````\n\n**Пример 1**\n\nВход:\n\n```java\n{9, 4, 9, 6, 6, 4, 5}\n```\n\nВыход:\n\n```\n5\n```\n\n**Пример 2**\n\nВход:\n\n```java\n{1, 2, 3, 2, 1}\n```\n\nВыход:\n\n```\n3\n```\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `LinkedHashMap`, чтобы сохранить порядок вставки и подсчитать количество вхождений каждого числа.   \n💡 Первый проход по массиву: для каждого элемента увеличивайте счётчик в карте.   \n💡 Второй проход: найдите в исходном массиве первый элемент с частотой `1` в карте.   \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.LinkedHashMap;\nimport java.util.Map;\n\npublic class Main {\n    public static void main(String[] args) {\n        int[] array = {9, 4, 9, 6, 6, 4, 5};\n\n        // Подсчёт вхождений с сохранением порядка\n        Map<Integer, Integer> countMap = new LinkedHashMap<>();\n        for (int num : array) {\n            countMap.put(num, countMap.getOrDefault(num, 0) + 1);\n        }\n\n        // Поиск первого уникального элемента\n        int firstUnique = -1;\n        for (int num : array) {\n            if (countMap.get(num) == 1) {\n                firstUnique = num;\n                break;\n            }\n        }\n\n        if (firstUnique != -1) {\n            System.out.println(\"Первый неповторяющийся элемент: \" + firstUnique);\n        } else {\n            System.out.println(\"Уникальных элементов не найдено\");\n        }\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "first-non-repeating-element"

[[tasks]]
  id = 22
  question = "Инвертировать строку"
  answer = "**Условие задачи:**  \nРеализовать метод, который принимает строку `input` и возвращает её в обратном порядке.\n\n- если `input == null`, необходимо выбросить `IllegalArgumentException`\n    \n\n```java\npublic class StringUtils {\n    public static String reverse(String input) {\n        // ваш код\n    }\n}\n```\n\n📌 **Пример 1:**  \nВход: `input = \"\"hello\"\"`  \nВыход: `\"\"olleh\"\"`\n\n📌 **Пример 2:**  \nВход: `input = \"\"Java\"\"`  \nВыход: `\"\"avaJ\"\"`\n\n📌 **Пример 3:**  \nВход: `input = \"\"\"\"`  \nВыход: `\"\"\"\"`\n\n📌 **Пример 4:**  \nВход: `input = null`  \nВыход: исключение `IllegalArgumentException`  \n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Проверьте вход на `null` и при необходимости выбросьте `IllegalArgumentException`.  \n💡 Используйте `StringBuilder(input).reverse().toString()` для простого и быстрого реверса.  \n💡 Альтернативно можно обойти строку с конца до начала и собирать символы в новый `StringBuilder`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class StringUtils {\n    public static String reverse(String input) {\n        if (input == null) {\n            throw new IllegalArgumentException(\"Input string must not be null\");\n        }\n        return new StringBuilder(input).reverse().toString();\n    }\n\n    public static void main(String[] args) {\n        System.out.println(reverse(\"hello\"));  // olleh\n        System.out.println(reverse(\"Java\"));   // avaJ\n    }\n}\n```\n{{< /details >}}"
  filepath = "reverse-string"

[[tasks]]
  id = 23
  question = "Реализовать `hashCode` для класса Point"
  answer = "**Условие задачи:**  \n📌 Реализовать метод `hashCode()` для класса `Point` с полями `int x` и `int y`. Объяснить, что возвращает `hashCode()`.\n\n**Код:**\n\n```java\npublic class Point {\n    private int x;\n    private int y;\n\n    // конструкторы, геттеры/сеттеры\n\n    @Override\n    public int hashCode() {\n        // TODO: ваша реализация\n    }\n}\n```\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для смешивания полей используйте **простое умножение на простое число** (часто 31).  \n💡 Начальная величина результата может быть, например, `17` или `x`.  \n💡 Формула:\n\n```java\nint result = 17;\nresult = 31 * result + x;\nresult = 31 * result + y;\nreturn result;\n```\n\n💡 Можно воспользоваться утилитой `Objects.hash(x, y)` для краткости, но лучше понять классическое решение.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.Objects;\n\npublic class Point {\n    private int x;\n    private int y;\n\n    // Конструктор, геттеры/сеттеры omitted for brevity\n\n    @Override\n    public int hashCode() {\n        int result = 17;           // начальное произвольное ненулевое значение\n        result = 31 * result + x;  // учитываем поле x\n        result = 31 * result + y;  // учитываем поле y\n        return result;\n    }\n\n    @Override\n    public boolean equals(Object o) {\n        if (this == o) return true;\n        if (!(o instanceof Point)) return false;\n        Point other = (Point) o;\n        return this.x == other.x && this.y == other.y;\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "point-hashcode"

