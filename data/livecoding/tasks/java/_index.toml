  question = "Code review системы расчёта зарплат + бизнес-вопросы"
  answer = "**Условие задачи:**  \n📌 Есть «наследованный» класс `PayrollSystem`, который считает зарплаты сотрудников.  \nДанные приходят из внешней системы в виде `List<Map<String, Object>>` (мы на них повлиять не можем).\n\nЖалобы бухгалтерии:\n\n1. В отчётах **иногда пропадают сотрудники** (особенно новые).\n\n2. В ведомости **появляются отрицательные суммы зарплат**.\n\n3. При **изменении оклада** система не всегда обновляет данные.\n\n4. В цифрах много **дробных значений** (5234.56789 вместо 5234.57).\n\n5. При ошибке в данных (**текст вместо цифр**) система «зависает» без объяснения.\n\n\nНужно:\n\n- провести code review,\n\n- предложить исправления,\n\n- сформулировать, какие **вопросы задать бизнесу**, чтобы правильно решить проблему.\n\n\n**Текущий код (фрагмент):**\n\n```java\npublic class PayrollSystem {  \nstatic List<Map<String, Object>> employees = new ArrayList<>();  \n  \nstatic {  \nMap<String, Object> emp1 = new HashMap<>();  \nemp1.put(\"id\", 1);  \nemp1.put(\"name\", \"Иванов\");  \nemp1.put(\"base_salary\", 40000);  \nemp1.put(\"bonus\", 10000);  \nemp1.put(\"tax_rate\", 0.13);  \nemployees.add(emp1);  \n  \nMap<String, Object> emp2 = new HashMap<>();  \nemp2.put(\"id\", 2);  \nemp2.put(\"name\", \"Петрова\");  \nemp2.put(\"base_salary\", 50000.54);  \nemp2.put(\"bonus\", 6000);  \nemp2.put(\"tax_rate\", 0.13);  \nemployees.add(emp2);  \n  \nMap<String, Object> emp3 = new HashMap<>();  \nemp3.put(\"id\", 3);  \nemp3.put(\"name\", \"Сидоров\");  \nemp3.put(\"base_salary\", 30000.25);  \nemp3.put(\"bonus\", null);  \nemp3.put(\"tax_rate\", 0.13);  \nemployees.add(emp3);  \n  \nMap<String, Object> emp4 = new HashMap<>();  \nemp4.put(\"id\", 4);  \nemp4.put(\"name\", \"Кузнецов\");  \nemp4.put(\"base_salary\", 70000);  \nemp4.put(\"bonus\", 20000.30);  \nemp4.put(\"tax_rate\", 0.15);  \nemployees.add(emp4);  \n}  \n  \nstatic double calculateSalary(Map<String, Object> employee) {  \ndouble baseSalary = ((Number) employee.get(\"base_salary\")).doubleValue();  \ndouble bonus = ((Number) employee.get(\"bonus\")).doubleValue();  \ndouble total = baseSalary + bonus;  \ndouble tax = ((Number) employee.get(\"tax_rate\")).doubleValue();  \ntotal = total - total * tax;  \nreturn total;  \n}  \n  \nstatic List<Map<String, Object>> generatePayroll() {  \nList<Map<String, Object>> payroll = new ArrayList<>();  \nfor (Map<String, Object> emp : employees) {  \ntry {  \ndouble netSalary = calculateSalary(emp);  \nMap<String, Object> entry = new HashMap<>();  \nentry.put(\"name\", emp.get(\"name\"));  \nentry.put(\"salary\", netSalary);  \npayroll.add(entry);  \n} catch (Exception e) {  \ncontinue;  \n}  \n}  \nreturn payroll;  \n}  \n  \nstatic void printPayroll() {  \nList<Map<String, Object>> payroll = generatePayroll();  \nfor (Map<String, Object> p : payroll) {  \nSystem.out.println(p.get(\"name\") + \": \" + p.get(\"salary\") + \" руб.\");  \n}  \n}  \n  \nstatic void updateBaseSalary(int employeeId, double newSalary) {  \nfor (Map<String, Object> emp : employees) {  \nif ((int) emp.get(\"id\") == employeeId) {  \nemp.put(\"base_salary\", newSalary);  \nbreak;  \n}  \n}  \n}  \n  \npublic static void main(String[] args) {  \nSystem.out.println(\"Расчет зарплат:\");  \nprintPayroll();  \n}  \n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Пропадающие сотрудники = где-то ловим `Exception` и тихо делаем `continue`. Любая ошибка → сотрудник исчез.  \n💡 `bonus` может быть `null` → `((Number) null)` даёт `NullPointerException`.  \n💡 `Object`-поля позволяют влететь в `ClassCastException` (текст вместо числа). Сейчас это просто глушится.  \n💡 Для денег лучше `BigDecimal` с `setScale(2, RoundingMode.HALF_UP)`.  \n💡 Отрицательная зарплата должна быть **ошибкой данных**, а не тихо проходить.  \n💡 `updateBaseSalary` меняет только in-memory список; при новой загрузке из внешней системы всё откатится.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n **1. Какие проблемы в текущем коде**\n\n1. **Пропадают сотрудники**\n\n    ```java\n    static List<Map<String, Object>> generatePayroll() {\n        ...\n        try {\n            double netSalary = calculateSalary(emp);\n            ...\n            payroll.add(entry);\n        } catch (Exception e) {\n            continue;\n        }\n    }\n    ```\n\n    - Любая ошибка (NPE, ClassCastException, NumberFormat…) → сотрудник просто **пропускается**.\n\n    - Именно поэтому «особенно новые» могут исчезать: у них чаще всего кривые/новые поля.\n\n2. **Отрицательные суммы**\n\n    - Нет никакой валидации входных данных.\n\n    - Если из внешней системы придёт отрицательный `bonus` или завышенный `tax_rate` (например, 1.5), то итог может стать отрицательным — и мы это спокойно выводим в ведомость.\n\n3. **Изменение оклада не всегда обновляется**\n\n    ```java\n    static void updateBaseSalary(int employeeId, double newSalary) {\n        for (Map<String, Object> emp : employees) {\n            if ((int) emp.get(\"id\") == employeeId) {\n                emp.put(\"base_salary\", newSalary);\n                break;\n            }\n        }\n    }\n    ```\n\n   Возможные причины:\n\n    - `employees` — **static in-memory**. Если каждый расчёт запускается заново или данные заново подгружаются из внешней системы, изменения не живут дольше одного запуска.\n\n    - Если у сотрудника некорректные данные после обновления (например, `bonus = null` / `tax_rate = \"0.13%\"` строкой), он попадает в `catch` и **исчезает из отчёта** → бухгалтер говорит «не обновилось».\n\n4. **Слишком много дробных значений**\n\n    - Работает сырая арифметика с `double`: тип не денежный, ошибки округления гарантированы.\n\n    - Нет принудительного `setScale(2)` → формат плавает.\n\n5. **Система зависает при ошибке в данных**\n\n    - Реально она не «зависает», а **тихо глотает ошибки**:\n\n        ```java\n        } catch (Exception e) {\n            continue;\n        }\n        ```\n\n    - В логах ничего нет, в отчёте сотрудник пропал → для бизнеса это выглядит как «зависло/сломалось, непонятно что».\n\n\n---\n\n **2. Улучшенная реализация расчёта (идея и пример кода)**\n\nНе трогаем формат данных от внешней системы (`Map<String, Object>`), но:\n\n- Вводим **типизированный DTO** для внутренней работы.\n\n- Используем `BigDecimal` для денег.\n\n- Явно валидируем данные и логируем ошибки.\n\n\nУсловно:\n\n```java\nimport java.math.BigDecimal;\nimport java.math.RoundingMode;\n\nrecord EmployeePayData(\n        Integer id,\n        String name,\n        BigDecimal baseSalary,\n        BigDecimal bonus,\n        BigDecimal taxRate\n) {}\n\nrecord PayrollEntry(Integer id, String name, BigDecimal netSalary) {}\n\npublic class PayrollSystem {\n\n    // employees как дано во входном коде — не трогаем\n\n    static EmployeePayData mapEmployee(Map<String, Object> raw) {\n        Integer id = (Integer) raw.get(\"id\");\n        String name = (String) raw.get(\"name\");\n\n        BigDecimal base = toMoney(raw.get(\"base_salary\"), \"base_salary\", name, true);\n        BigDecimal bonus = toMoney(raw.get(\"bonus\"), \"bonus\", name, false); // может быть null → 0\n        BigDecimal taxRate = toRate(raw.get(\"tax_rate\"), \"tax_rate\", name);\n\n        return new EmployeePayData(\n                id,\n                name,\n                base,\n                bonus != null ? bonus : BigDecimal.ZERO,\n                taxRate\n        );\n    }\n\n    private static BigDecimal toMoney(Object value, String field, String empName, boolean required) {\n        if (value == null) {\n            if (required) {\n                throw new IllegalArgumentException(\"Поле \" + field + \" обязательно для сотрудника \" + empName);\n            } else {\n                return null;\n            }\n        }\n        if (value instanceof Integer i) {\n            return BigDecimal.valueOf(i);\n        }\n        if (value instanceof Long l) {\n            return BigDecimal.valueOf(l);\n        }\n        if (value instanceof Double d) {\n            return BigDecimal.valueOf(d);\n        }\n        if (value instanceof String s) {\n            return new BigDecimal(s);\n        }\n        throw new IllegalArgumentException(\"Некорректный тип поля \" + field + \" для \" + empName + \": \" + value.getClass());\n    }\n\n    private static BigDecimal toRate(Object value, String field, String empName) {\n        if (value == null) {\n            throw new IllegalArgumentException(\"Ставка налога обязательна для \" + empName);\n        }\n        BigDecimal rate;\n        if (value instanceof Number n) {\n            rate = BigDecimal.valueOf(n.doubleValue());\n        } else if (value instanceof String s) {\n            rate = new BigDecimal(s);\n        } else {\n            throw new IllegalArgumentException(\"Некорректный тип \" + field + \" для \" + empName);\n        }\n        if (rate.compareTo(BigDecimal.ZERO) < 0 || rate.compareTo(BigDecimal.ONE) > 0) {\n            throw new IllegalArgumentException(\"Некорректная ставка налога \" + rate + \" для \" + empName);\n        }\n        return rate;\n    }\n\n    static BigDecimal calculateSalary(EmployeePayData emp) {\n        BigDecimal total = emp.baseSalary().add(emp.bonus());\n        BigDecimal tax = total.multiply(emp.taxRate());\n        BigDecimal net = total.subtract(tax);\n\n        if (net.compareTo(BigDecimal.ZERO) < 0) {\n            throw new IllegalArgumentException(\"Отрицательная ЗП для \" + emp.name() + \": \" + net);\n        }\n\n        return net.setScale(2, RoundingMode.HALF_UP);\n    }\n\n    static List<PayrollEntry> generatePayroll() {\n        List<PayrollEntry> payroll = new ArrayList<>();\n\n        for (Map<String, Object> raw : employees) {\n            String name = (String) raw.get(\"name\");\n            try {\n                EmployeePayData emp = mapEmployee(raw);\n                BigDecimal net = calculateSalary(emp);\n                payroll.add(new PayrollEntry(emp.id(), emp.name(), net));\n            } catch (Exception e) {\n                // тут в реальной системе логируем\n                System.err.println(\"Ошибка при расчете ЗП для \" + name + \": \" + e.getMessage());\n                // возможно, всё равно добавляем запись с статусом \"ошибка\"\n                // payroll.add(new PayrollEntry(empId, name, null));\n            }\n        }\n\n        return payroll;\n    }\n\n    static void printPayroll() {\n        List<PayrollEntry> payroll = generatePayroll();\n        for (PayrollEntry p : payroll) {\n            System.out.println(p.name() + \": \" + p.netSalary() + \" руб.\");\n        }\n    }\n}\n```\n\n**Что это даёт по пунктам жалоб:**\n\n1. Пропадающие сотрудники\n\n    - Теперь сотрудник либо:\n\n        - появляется с посчитанной ЗП,\n\n        - либо попадает в лог с понятной ошибкой (и можно решить на стороне данных).\n\n    - Мы НЕ молча их игнорируем.\n\n2. Отрицательные суммы\n\n    - В `calculateSalary` отрицательная ЗП → **исключение** и явная ошибка, а не тихий бред в отчёте.\n\n3. Обновление оклада\n\n    - Нужно договориться с бизнесом: кто «мастер» данных — внешняя система или наша.\n\n    - Если мы всё-таки обновляем в нашей системе, то:\n\n        - либо изменения должны сохраняться в БД и синхронизироваться с внешней системой,\n\n        - либо `updateBaseSalary` — только временная корректировка на один расчёт (и это должно быть прямо описано бизнесу).\n\n4. Дробные значения\n\n    - `BigDecimal.setScale(2, RoundingMode.HALF_UP)` → всегда две цифры после запятой.\n\n5. «Зависание» при ошибке\n\n    - Мы не глушим исключения, а **логируем**: понятно, чей сотрудник, какое поле, что именно не так.\n\n    - При желании можно возвращать статус «ошибка данных» вплоть до UI.\n\n\n---\n\n **3. Вопросы, которые я бы задал бизнесу / бухгалтерии**\n\nЯ не буду задавать их тебе «вживую» (по условиям системы), но вот список, которые я как разработчик **обязательно бы уточнил** у бизнеса:\n\n1. **Что делать с сотрудником, у которого некорректные данные?**\n\n    - Пропускать сотрудника?\n\n    - Показывать его в отчёте со статусом «Ошибка данных» и пустой ЗП?\n\n    - Ставить ЗП = 0, но подсвечивать проблему?\n\n2. **Кто владелец (мастер) данных по окладу?**\n\n    - Наша система или внешняя?\n\n    - Если оклад изменили в нашей системе, должно ли это изменение улетать обратно во внешнюю систему?\n\n3. **Как бизнес относится к отрицательной зарплате?**\n\n    - Это всегда ошибка данных?\n\n    - Или поддерживаются случаи удержаний/штрафов, когда один расчёт может быть отрицательным? Если да — как это показывать в отчёте?\n\n4. **Требования к округлению денег:**\n\n    - Всегда до двух знаков после запятой?\n\n    - Какой режим округления: `HALF_UP`, `HALF_DOWN`, `HALF_EVEN`?\n\n    - Нужно ли отдельно показывать «грязную» и «чистую» сумму?\n\n5. **Что считать «успешным расчётом» отчёта:**\n\n    - Если у части сотрудников ошибки в данных — считать отчёт построенным или «отчёт с ошибками» и блокировать выгрузку?\n\n    - Нужен ли агрегированный список всех проблем по сотрудникам (для бухгалтера или HR)?\n\n6. **Частота обновления данных / режим работы:**\n\n    - Отчёт строится за один запуск или система живёт постоянно и хранит состояние?\n\n    - Можно ли нам отказаться от `static`-структур и перейти к БД/кэшу?\n\n\n---\n\nТаким ответом ты покрываешь и **техническую часть** (code review / правки), и **бизнесовую** (какие решения нельзя принимать без требований).\n\n{{< /details >}}"
  filepath = "payroll-system-review-and-fix"

[[tasks]]
  id = 63
  question = "REST эндпоинт: получить все записи из таблицы Demands"
  answer = "**Условие задачи:**  \n📌 В базе есть таблица `Demands`. Фронт-разработчик просит сделать REST-эндпоинт, который вернёт **все строки** из этой таблицы.\n\n```text\nDemands\n+----+-------+--------+\n| id | name  | status |\n+----+-------+--------+\n| 1  | name1 | GOOD   |\n| 2  | name2 |        |\n| 3  | name3 |        |\n| 4  | name4 |        |\n+----+-------+--------+\n```\n\nНужно написать минимальный набор кода (Entity + Repository + Controller), чтобы по HTTP-запросу фронт получил список всех `Demands`.\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Определи сущность `Demand` с полями `id`, `name`, `status` и пометь её `@Entity`.  \n💡 Создай `DemandRepository`, унаследовавшись от `JpaRepository<Demand, Long>`.  \n💡 В `@RestController` внедри репозиторий и сделай `@GetMapping(\"/api/v1/demands\")`, который вернёт `List<Demand>`.  \n💡 Возвращать можно прямо сущность, либо `DTO`, если хочешь отделить слои. Для задачи достаточно сущности.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n```java\n// Сущность, соответствующая таблице Demands\nimport jakarta.persistence.*;\n\n@Entity\n@Table(name = \"demands\")\npublic class Demand {\n\n    @Id\n    @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private Long id;\n\n    private String name;\n\n    private String status;\n\n    public Demand() {\n    }\n\n    public Demand(Long id, String name, String status) {\n        this.id = id;\n        this.name = name;\n        this.status = status;\n    }\n\n    public Long getId() {\n        return id;\n    }\n\n    public String getName() {\n        return name;\n    }\n\n    public String getStatus() {\n        return status;\n    }\n\n    public void setId(Long id) {\n        this.id = id;\n    }\n\n    public void setName(String name) {\n        this.name = name;\n    }\n\n    public void setStatus(String status) {\n        this.status = status;\n    }\n}\n```\n\n```java\n// Репозиторий для работы с таблицей Demands\nimport org.springframework.data.jpa.repository.JpaRepository;\nimport org.springframework.stereotype.Repository;\n\n@Repository\npublic interface DemandRepository extends JpaRepository<Demand, Long> {\n    // findAll() уже есть в JpaRepository\n}\n```\n\n```java\n// REST-контроллер, отдающий все записи Demands\nimport org.springframework.web.bind.annotation.*;\nimport lombok.RequiredArgsConstructor;\n\nimport java.util.List;\n\n@RestController\n@RequestMapping(\"/api/v1/demands\")\n@RequiredArgsConstructor\npublic class DemandController {\n\n    private final DemandRepository demandRepository;\n\n    @GetMapping\n    public List<Demand> getAllDemands() {\n        return demandRepository.findAll();\n    }\n}\n```\n\nТеперь фронтендер может сделать запрос:\n\n```http\nGET /api/v1/demands\n```\n\nИ получить JSON примерно такого вида:\n\n```json\n[\n  { \"id\": 1, \"name\": \"name1\", \"status\": \"GOOD\" },\n  { \"id\": 2, \"name\": \"name2\", \"status\": \"\" },\n  { \"id\": 3, \"name\": \"name3\", \"status\": \"\" },\n  { \"id\": 4, \"name\": \"name4\", \"status\": \"\" }\n]\n```\n\n---\n\nЕсли захочешь — можем следующим шагом добавить DTO, фильтрацию по статусу или пагинацию.\n\n{{< /details >}}"
  filepath = "rest-get-all-demands"

[[tasks]]
  id = 64
  question = "Code review ClientController и связанных классов"
  answer = "**Условие задачи:**  \n📌 Дан REST-контроллер, который должен вернуть полисы клиента. Нужно провести code review:\n\n- найти проблемы (как технические, так и логические),\n\n- предложить, как переписать код более корректно.\n\n\n**Код:**\n\n```java\n@RestController\npublic class ClientController {\n\n    @Value(\"policy.limit\")\n    private int policyLimit;\n\n    @Autowired\n    private PolicyService policyService;\n\n    @RequestMapping(path = \"client/{clientId}/policies\", method = RequestMethod.POST)\n    public Response getClientPolicies(@PathVariable(\"clientId\") String clientId) {\n        List<PolicyDTO> policies = getPolicies().stream()\n            .limit(policyLimit)\n            .filter(p -> p.getClientIds().contains(clientId))\n            .filter(p -> p.isPaid())\n            .toList();\n        return new Response(policies);\n    }\n\n    @Transactional\n    private List<PolicyDTO> getPolicies() {\n        return policyService.getPolicies();\n    }\n\n    @Data\n    @AllArgsConstructor\n    public class Response {\n        private List<PolicyDTO> policies;\n    }\n}\n\n@Data\npublic class PolicyDTO {\n    private String id;\n    private String name;\n    private List<String> clientId;\n    private Boolean isPaid;\n}\n\n@RequiredArgsConstructor\n@Component\npublic class PolicyService {\n    private final PolicyDbRepository repository;\n    /**\n     *  Читает полисы из БД\n     */\n    List<PolicyDTO> getPolicies() {\n        return repository.getPolicies();\n    }\n}\n\npublic interface PolicyDbRepository {\n    List<PolicyDTO> getPolicies();\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 `@Value(\"policy.limit\")` — строка, а не property placeholder. Нужно `@Value(\"${policy.limit}\")`.  \n💡 Поля с `@Autowired` → лучше конструкторная инъекция (`@RequiredArgsConstructor`).  \n💡 `@RequestMapping POST` на метод, который фактически **читает** данные — по REST лучше `GET`.  \n💡 В контроллере вызывается `getPolicies()` с `@Transactional`, но метод `private` + self-invocation → транзакция не сработает.  \n💡 `limit(policyLimit)` стоит делать **после** фильтрации, а ещё лучше — на уровне БД.  \n💡 `PolicyDTO`: поле `clientId` (в коде вызывается `getClientIds()`) и `Boolean isPaid` (Lombok сгенерирует `getIsPaid()`, а не `isPaid()`) → не скомпилируется.  \n💡 Внутренний класс `Response` не `static` → держит ссылку на контроллер, хуже для сериализации/тестов.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n### 1. Основные проблемы в текущем коде\n\n1. **Неправильное использование `@Value`**\n\n    ```java\n    @Value(\"policy.limit\")\n    private int policyLimit;\n    ```\n\n   Так ты просто внедряешь строку `\"policy.limit\"` и пытаешься привести к int.  \n   ✅ Нужно:\n\n    ```java\n    @Value(\"${policy.limit:100}\") // 100 — дефолт\n    private int policyLimit;\n    ```\n\n2. **Field injection + `@Autowired`**\n\n    - Поля с `@Autowired` хуже тестируются, нельзя сделать `final`, сложно мокать.  \n      ✅ Лучше: конструкторная инъекция через `@RequiredArgsConstructor` и `final` поля.\n\n3. **Неверный HTTP-метод**\n\n    ```java\n    @RequestMapping(path = \"client/{clientId}/policies\", method = RequestMethod.POST)\n    ```\n\n   Метод фактически читает данные, а не изменяет → по REST должен быть `GET`.  \n   ✅\n\n    ```java\n    @GetMapping(\"/client/{clientId}/policies\")\n    ```\n\n4. **Бесполезная `@Transactional` на `private`-методе**\n\n    ```java\n    @Transactional\n    private List<PolicyDTO> getPolicies() { ... }\n    ```\n\n    - `private`-метод не проксируется Spring'ом, плюс вызов из того же класса → AOP не сработает.\n\n    - Транзакции стоит ставить на **service-слой**, и обычно `readOnly = true` для чтения.\n\n5. **Порядок операций в Stream**\n\n    ```java\n    getPolicies().stream()\n        .limit(policyLimit)\n        .filter(...)\n        .filter(...)\n    ```\n\n    - Сначала режем до `policyLimit`, а потом фильтруем — в итоге можем получить **меньше** элементов, чем ожидает фронт.  \n      ✅ Логичнее: сначала фильтровать, потом `limit`.\n\n\n    Ещё лучше — вообще не тянуть все полисы в память, а фильтровать на уровне БД.\n\n6. **Проблемы в `PolicyDTO`**\n\n    ```java\n    private List<String> clientId;\n    private Boolean isPaid;\n    ```\n\n    - В контроллере вызывается `p.getClientIds()` и `p.isPaid()`, но таких методов Lombok не сгенерирует.\n\n    - Для `Boolean isPaid` Lombok создаст `getIsPaid()`, а не `isPaid()`.  \n      ✅ Лучше:\n\n\n    ```java\n    private List<String> clientIds;\n    private boolean paid; // примитив, без null\n    ```\n    \n    Тогда Lombok сгенерирует `getClientIds()` и `isPaid()`.\n\n7. **Внутренний класс Response не static**\n\n    ```java\n    @Data\n    @AllArgsConstructor\n     public class Response { ... }\n    ```\n\n   Не-static inner class держит ссылку на внешний `ClientController`.  \n   ✅ Сделать `static` или вынести в отдельный класс / `record`.\n\n8. **Фильтрация в контроллере**  \n   Контроллер сейчас:\n\n    - вытаскивает все полисы из БД через сервис,\n\n    - фильтрует,\n\n    - режет по лимиту.\n\n\n    Логика фильтрации — это бизнес-логика, её место в `PolicyService`.\n\n\n---\n\n### 2. Пример исправленной версии\n\n**Контроллер:**\n\n```java\nimport lombok.AllArgsConstructor;\nimport lombok.Data;\nimport lombok.RequiredArgsConstructor;\nimport org.springframework.beans.factory.annotation.Value;\nimport org.springframework.web.bind.annotation.*;\n\nimport java.util.List;\n\n@RestController\n@RequestMapping(\"/client\")\n@RequiredArgsConstructor\npublic class ClientController {\n\n    @Value(\"${policy.limit:100}\")\n    private int policyLimit;\n\n    private final PolicyService policyService;\n\n    @GetMapping(\"/{clientId}/policies\")\n    public Response getClientPolicies(@PathVariable String clientId) {\n        List<PolicyDTO> policies = policyService.getClientPolicies(clientId, policyLimit);\n        return new Response(policies);\n    }\n\n    @Data\n    @AllArgsConstructor\n    public static class Response {\n        private List<PolicyDTO> policies;\n    }\n}\n```\n\n**DTO:**\n\n```java\nimport lombok.Data;\n\nimport java.util.List;\n\n@Data\npublic class PolicyDTO {\n    private String id;\n    private String name;\n    private List<String> clientIds;  // множественное число\n    private boolean paid;            // примитив → isPaid()\n}\n```\n\n**Сервис:**\n\n```java\nimport lombok.RequiredArgsConstructor;\nimport org.springframework.stereotype.Service;\nimport org.springframework.transaction.annotation.Transactional;\n\nimport java.util.List;\nimport java.util.Objects;\n\n@Service\n@RequiredArgsConstructor\npublic class PolicyService {\n\n    private final PolicyDbRepository repository;\n\n    /**\n     * Читает полисы клиента с учётом лимита.\n     * Логику фильтрации держим на уровне сервиса.\n     */\n    @Transactional(readOnly = true)\n    public List<PolicyDTO> getClientPolicies(String clientId, int limit) {\n        return repository.getPolicies().stream()\n                .filter(Objects::nonNull)\n                .filter(p -> p.getClientIds() != null && p.getClientIds().contains(clientId))\n                .filter(PolicyDTO::isPaid)\n                .limit(limit)\n                .toList();\n    }\n}\n```\n\n**Репозиторий (как был):**\n\n```java\npublic interface PolicyDbRepository {\n    List<PolicyDTO> getPolicies();\n}\n```\n\n> На практике лучше сделать методы сразу с фильтрацией в БД, например:  \n> `List<PolicyDTO> findByClientIdAndPaidTrue(String clientId, Pageable pageable);`  \n> чтобы не тащить все полисы в память.\n\n---\n\n### 3. Кратко, что бы я сказал на собесе\n\n- Исправил DI: конструктор, `final` поля.\n\n- Исправил `@Value` и HTTP-метод (POST → GET).\n\n- Убрал бессмысленную `@Transactional` с private/self-invocation, перенёс транзакцию на сервис.\n\n- Починил DTO (имена полей и типы), чтобы `Stream`-логика вообще компилировалась.\n\n- Перенёс бизнес-логику фильтрации из контроллера в сервис.\n\n- Обратил внимание, что лучше фильтровать на уровне БД, а не в памяти.\n\n\n{{< /details >}}"
  filepath = "client-controller-code-review"

[[tasks]]
  id = 65
  question = "Найти число, которое встречается один раз"
  answer = "**Условие задачи:**  \n📌 Дан массив `int[] nums`, где **каждое значение встречается ровно 2 раза**, кроме одного — оно встречается **1 раз**.  \nНужно найти это значение. Можно начать с неоптимальных вариантов и перейти к оптимальным.\n\n**Код:**\n\n```java\n// Пример:\nint[] nums = {4, 1, 2, 1, 2};\n// Ответ: 4\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Неоптимально: посчитать частоты через Map.  \n💡 Лучше по памяти: отсортировать и пройти парами.  \n💡 Оптимально: использовать XOR — одинаковые числа взаимно уничтожатся (`a ^ a = 0`), а `0 ^ x = x`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n**Вариант 1 — через Map (O(n) по времени, O(n) по памяти)**\n\n```java\npublic int singleNumberMap(int[] nums) {\n    Map<Integer, Integer> freq = new HashMap<>();\n    for (int n : nums) {\n        freq.merge(n, 1, Integer::sum);\n    }\n    for (Map.Entry<Integer, Integer> e : freq.entrySet()) {\n        if (e.getValue() == 1) return e.getKey();\n    }\n    throw new IllegalArgumentException(\"No single element found\");\n}\n```\n\n**Вариант 2 — сортировка (O(n log n) по времени, O(1..n) по памяти)**\n\n```java\npublic int singleNumberSort(int[] nums) {\n    Arrays.sort(nums);\n    for (int i = 0; i < nums.length - 1; i += 2) {\n        if (nums[i] != nums[i + 1]) {\n            return nums[i];\n        }\n    }\n    return nums[nums.length - 1];\n}\n```\n\n**Вариант 3 — XOR (O(n) по времени, O(1) по памяти) ✅ лучший**\n\n```java\npublic int singleNumberXor(int[] nums) {\n    int res = 0;\n    for (int n : nums) {\n        res ^= n;\n    }\n    return res;\n}\n```\n\n{{< /details >}}"
  filepath = "single-number"

[[tasks]]
  id = 66
  question = "Транзакции: сколько будет при вызове b() и как сделать a() транзакционным"
  answer = "**Условие задачи:**  \n📌 Дан код:\n\n```java\n@Service\nclass SomeService {\n\n    @Transactional(propagation = Required_New)\n    public void a() {}\n\n    @Transactional\n    public void b() {\n        a();\n    }\n}\n\nSomeService.b();\n```\n\nНужно ответить:\n\n1. Сколько будет транзакций при вызове `b()`?\n\n2. Почему?\n\n3. Что сделать, чтобы второй вызов (`a()`) тоже был транзакционным (`REQUIRES_NEW`)?\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 `@Transactional` работает через Spring AOP proxy.  \n💡 Вызов `a()` внутри `b()` — это **self-invocation** (внутренний вызов внутри одного объекта), он проходит мимо proxy.  \n💡 Поэтому `REQUIRES_NEW` не применится, если `a()` вызывается напрямую как `a()`.  \n💡 Нужно вызывать `a()` через прокси: вынести `a()` в другой бин или получить self-proxy и вызвать через него.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n**1) Сколько транзакций будет?**\n\nБудет **1 транзакция** — та, что открывается на методе `b()`.\n\n**2) Почему?**\n\n- Spring применяет `@Transactional` через прокси (AOP).\n\n- Вызов `SomeService.b()` извне проходит через прокси → транзакция создаётся.\n\n- Но внутри `b()` вызов `a()` происходит как обычный вызов метода текущего объекта (`this.a()` фактически).\n\n- Такой вызов **не проходит через прокси**, поэтому аннотация на `a()` **не срабатывает**, и `REQUIRES_NEW` не создаёт новую транзакцию.\n\n\n**3) Как сделать, чтобы `a()` тоже был транзакционным (REQUIRES_NEW)?**\n\n**Способ 1 (правильный и самый частый): вынести `a()` в отдельный сервис.**\n\n```java\n@Service\nclass AService {\n    @Transactional(propagation = Propagation.REQUIRES_NEW)\n    public void a() {}\n}\n\n@Service\n@RequiredArgsConstructor\nclass SomeService {\n\n    private final AService aService;\n\n    @Transactional\n    public void b() {\n        aService.a(); // вызов через proxy другого бина → REQUIRES_NEW сработает\n    }\n}\n```\n\n**Способ 2: вызвать через self-proxy (менее предпочтительно).**\n\n```java\n@Service\nclass SomeService {\n\n    @Autowired\n    private SomeService self; // прокси самого себя\n\n    @Transactional(propagation = Propagation.REQUIRES_NEW)\n    public void a() {}\n\n    @Transactional\n    public void b() {\n        self.a(); // вызов через proxy → создаст новую транзакцию\n    }\n}\n```\n\n> Важно: должен быть включён proxy-mode и инъекция будет именно прокси-объекта.\n\n{{< /details >}}"
  filepath = "transactions-self-invocation"

[[tasks]]
  id = 67
  question = "Code review: DocumentService и DocumentReader"
  answer = "**Условие задачи:**  \n📌 Дан сервис `DocumentService`, который читает документы разных типов с помощью самописного `DocumentReader`.  \nНужно провести **code review**:\n\n- что в коде **ок**,\n\n- что **не ок**,\n\n- что и **как улучшить**.\n\n\n**Код:**\n\n```java\n@Component\npublic class DocumentService {\n\n    public InputStream readDocument(String type) {\n        DocumentReader reader = new DocumentReader();\n\n        if (type.equals(\"PDF\")) {\n            return reader.readPdf();\n        } else if (type.equals(\"DOCX\")) {\n            return reader.readDocx();\n        } else if (type.equals(\"XLSX\")) {\n            return reader.readXlsx();\n        } else {\n            return null;\n        }\n    }\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"Подсказки\" close >}}  \n💡 `new DocumentReader()` внутри сервиса — нарушение DI, усложняет тестирование.  \n💡 `type.equals(\"PDF\")` может привести к `NullPointerException`.  \n💡 `else return null` — плохой контракт метода.  \n💡 Условная логика плохо масштабируется (нарушение OCP).  \n💡 Лучше использовать `enum`, `Map` или стратегию.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n### Что в коде **ок** ✅\n\n1. **Простота и читаемость**\n\n    - Логика легко читается: по типу документа выбирается метод чтения.\n\n    - Нет лишних абстракций для маленького примера.\n\n2. **Единая точка входа**\n\n    - Один метод `readDocument` отвечает за чтение документов.\n\n\n---\n\n### Что **не ок** ❌ и почему\n\n1. **Создание `DocumentReader` через `new`**\n\n    ```java\n    DocumentReader reader = new DocumentReader();\n    ```\n\n    - Нарушает Dependency Injection.\n\n    - Нельзя подменить `DocumentReader` в тестах.\n\n    - Если `DocumentReader` станет состоянием или тяжёлым объектом — проблемы.\n\n2. **Возможный `NullPointerException`**\n\n    ```java\n    if (type.equals(\"PDF\")) { ... }\n    ```\n\n    - Если `type == null`, приложение упадёт.\n\n    - Безопаснее: `\"PDF\".equals(type)` или enum.\n\n3. **Возврат `null`**\n\n    ```java\n    else {\n        return null;\n    }\n    ```\n\n    - Плохой контракт метода.\n\n    - Клиент не понимает: это ошибка? тип не поддержан? файл пустой?\n\n4. **String-based типы**\n\n    - `\"PDF\"`, `\"DOCX\"`, `\"XLSX\"` — магические строки.\n\n    - Ошибка в одном символе → баг на проде.\n\n5. **Нарушение Open/Closed Principle (OCP)**\n\n    - Добавление нового формата требует изменения метода и нового `else if`.\n\n    - Код плохо масштабируется.\n\n6. **Отсутствие явной ошибки**\n\n    - Если тип не поддержан, лучше выбросить исключение с понятным сообщением.\n\n\n---\n\n### Как улучшить (минимально)\n\n```java\n@Component\n@RequiredArgsConstructor\npublic class DocumentService {\n\n    private final DocumentReader reader;\n\n    public InputStream readDocument(String type) {\n        if (type == null) {\n            throw new IllegalArgumentException(\"Document type must not be null\");\n        }\n\n        return switch (type) {\n            case \"PDF\"  -> reader.readPdf();\n            case \"DOCX\" -> reader.readDocx();\n            case \"XLSX\" -> reader.readXlsx();\n            default -> throw new IllegalArgumentException(\"Unsupported document type: \" + type);\n        };\n    }\n}\n```\n\n✔️ Уже лучше:\n\n- DI вместо `new`.\n\n- Нет `null`-возврата.\n\n- Явная ошибка.\n\n\n---\n\n### Как сделать **правильно и масштабируемо** ⭐\n\n**1. Enum типов документов**\n\n```java\npublic enum DocumentType {\n    PDF, DOCX, XLSX\n}\n```\n\n**2. Стратегия через Map**\n\n```java\n@Component\n@RequiredArgsConstructor\npublic class DocumentService {\n\n    private final Map<DocumentType, Supplier<InputStream>> readers;\n\n    public InputStream readDocument(DocumentType type) {\n        Supplier<InputStream> reader = readers.get(type);\n        if (reader == null) {\n            throw new IllegalArgumentException(\"Unsupported document type: \" + type);\n        }\n        return reader.get();\n    }\n}\n```\n\n**3. Конфигурация**\n\n```java\n@Configuration\npublic class DocumentConfig {\n\n    @Bean\n    public Map<DocumentType, Supplier<InputStream>> readers(DocumentReader reader) {\n        return Map.of(\n            DocumentType.PDF, reader::readPdf,\n            DocumentType.DOCX, reader::readDocx,\n            DocumentType.XLSX, reader::readXlsx\n        );\n    }\n}\n```\n\n---\n\n### Как это звучит на собеседовании (коротко)\n\n> В текущем коде ок простота, но есть проблемы: `new` вместо DI, `null`-возврат, магические строки и нарушение OCP.  \n> Я бы ввёл `enum` типов и стратегию, чтобы добавление нового формата не требовало переписывания сервиса, а также сделал явный контракт ошибок.\n\nЕсли хочешь — можем упростить ответ под junior/middle или наоборот ужать под **1–2 минуты устного ответа**.\n\n{{< /details >}}"
  filepath = "document-service-code-review"

