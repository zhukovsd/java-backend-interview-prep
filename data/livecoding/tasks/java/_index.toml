  question = "Проверить, можно ли сравнять две строки одной заменой или добавлением символа"
  answer = "**Условие задачи:**  \n📌 В метод передаются две строки. Нужно вернуть `true`, если строки можно сделать одинаковыми, выполнив не более одного изменения:\n\n- заменить один символ\n    \n- добавить один символ в одну из строк\n    \n\nЕсли для этого нужно больше одного изменения, метод должен вернуть `false`.\n\n**Код:**\n\n```java\npublic boolean isOneEditAway(String s1, String s2) {\n    // TODO\n}\n```\n\n📌 **Пример 1:**  \nВход:  \n`s1 = \"cat\"`  \n`s2 = \"cut\"`\n\nВыход:  \n`true`\n\n📌 **Пример 2:**  \nВход:  \n`s1 = \"cat\"`  \n`s2 = \"cats\"`\n\nВыход:  \n`true`\n\n📌 **Пример 3:**  \nВход:  \n`s1 = \"cat\"`  \n`s2 = \"dog\"`\n\nВыход:  \n`false`\n\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"\"Подсказки\"\" close >}}  \n💡 Если разница длин строк больше `1`, сразу можно вернуть `false`.  \n💡 Если длины равны, нужно проверить, отличаются ли строки не более чем в одной позиции.  \n💡 Если длины отличаются на `1`, можно пройти двумя указателями и допустить один сдвиг.  \n💡 Удобно сначала определить, какая строка короче, а какая длиннее.  \n{{< /details >}}\n\n---\n\n{{< details \"\"Решение\"\" close >}}\n\n```java\npublic boolean isOneEditAway(String s1, String s2) {\n    if (s1 == null || s2 == null) {\n        return false;\n    }\n\n    int len1 = s1.length();\n    int len2 = s2.length();\n\n    if (Math.abs(len1 - len2) > 1) {\n        return false;\n    }\n\n    if (len1 == len2) {\n        int diffCount = 0;\n        for (int i = 0; i < len1; i++) {\n            if (s1.charAt(i) != s2.charAt(i)) {\n                diffCount++;\n                if (diffCount > 1) {\n                    return false;\n                }\n            }\n        }\n        return true;\n    }\n\n    String shorter = len1 < len2 ? s1 : s2;\n    String longer = len1 < len2 ? s2 : s1;\n\n    int i = 0;\n    int j = 0;\n    int diffCount = 0;\n\n    while (i < shorter.length() && j < longer.length()) {\n        if (shorter.charAt(i) == longer.charAt(j)) {\n            i++;\n            j++;\n        } else {\n            diffCount++;\n            if (diffCount > 1) {\n                return false;\n            }\n            j++;\n        }\n    }\n\n    return true;\n}\n```\n\n> Если длины равны, проверяем не более одной замены. Если длины отличаются на 1, проверяем, можно ли пропустить один символ в более длинной строке. Если разница длин больше 1, ответ сразу `false`.\n\n{{< /details >}}"
  filepath = "one-edit-distance-strings"
