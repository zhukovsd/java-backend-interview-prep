  id = 57
  question = "Группировка анаграмм"
  answer = "**Условие задачи:**  \nНаписать только функцию. На входе массив строк, на выходе сгруппированная структура. Тип выходных данных определяешь сам. Потом скажешь, почему используешь эту структуру. Могут быть записи с повторяющимися элементами. Вывод отсортировать лексикографически. Чем лучше по оценке скорости алгоритма, тем лучше\n\n- Дан массив строк, необходимо сгруппировать анаграммы   \n- Слово X является анаграммой Y, если одно может быть получено из другого перестановкой букв   \n- В итоговом массиве каждый массив анаграмм должен быть отсортирован в лексикографическом порядке   \n\nПример:\n\n```text\nВвод:\n['eat', 'tea', 'tan', 'ate', 'nat', 'batq']\n\nВывод:\n[\n    ['ate', 'eat', 'tea'],\n    ['nat', 'tan'],\n    ['batq']\n]\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Нужен ключ, который однозначно представит \"форму\" слова (его буквы и их количество).  \n💡 Вариант 1 (проще): отсортировать буквы в слове → `\"eat\"` → `\"aet\"`. Все анаграммы дадут одинаковый ключ.  \n💡 Вариант 2 (быстрее): посчитать частоты букв (массив `int[26]`) и сделать строковый ключ вроде `\"1#0#2#...\"`. Это даёт `O(n * L)` вместо `O(n * L log L)`.  \n💡 Удобно использовать `Map<key, List<String>>`, а в конце вернуть `List<List<String>>`.  \n💡 Не забудь отсортировать внутри каждой группы (`Collections.sort(...)`).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n// Предполагаем, что слова состоят из строчных латинских букв a-z.\n// Возвращаем List<List<String>> — естественное представление \"список групп строк\".\npublic static List<List<String>> groupAnagrams(String[] words) {\n    if (words == null || words.length == 0) {\n        return List.of();\n    }\n\n    // Ключ -> список анаграмм\n    Map<String, List<String>> groups = new HashMap<>();\n\n    for (String word : words) {\n        // частоты букв: index = буква - 'a'\n        int[] freq = new int[26];\n        for (int i = 0; i < word.length(); i++) {\n            char c = word.charAt(i);\n            // если нужно поддержать другие символы, этот подход надо расширять\n            freq[c - 'a']++;\n        }\n\n        // строим строковый ключ из частот\n        StringBuilder keyBuilder = new StringBuilder();\n        for (int count : freq) {\n            keyBuilder.append(count).append('#');\n        }\n        String key = keyBuilder.toString();\n\n        groups.computeIfAbsent(key, k -> new ArrayList<>())\n              .add(word);\n    }\n\n    // итог: сортируем каждую группу лексикографически\n    List<List<String>> result = new ArrayList<>(groups.size());\n    for (List<String> group : groups.values()) {\n        Collections.sort(group);\n        result.add(group);\n    }\n\n    return result;\n}\n```\n\n**Почему именно такая структура и алгоритм:**\n\n- ✅ **`Map<String, List<String>>` как промежуточная структура**\n\n    - `String`-ключ — \"форма\" слова (его буквенный состав).\n\n    - `List<String>` — все слова, которые разделяют эту форму, то есть анаграммы.\n\n- ✅ **`List<List<String>>` как возвращаемый тип**\n\n    - Естественное представление: \"список групп строк\".\n\n    - Удобно и для вывода, и для дальнейшей обработки.\n\n- ⚙️ **Сложность алгоритма:**\n\n    - Для каждого слова длины `L` мы:\n\n        - Один раз проходим по буквам → `O(L)`,\n\n        - Строим ключ из 26 элементов → `O(26) ~ O(1)`.\n\n    - Итого по всем словам (`n` слов): **`O(n * L)`** по времени.\n\n    - По памяти: храним все слова + карту ключей ~ `O(n * L)`.\n\n\nДля собеседования можно отдельно упомянуть, что:\n\n- Более простой, но медленный вариант — сортировать буквы в каждом слове (`O(L log L)` на слово).\n\n- Текущий вариант с частотами букв асимптотически быстрее при длинных словах.\n\n\n{{< /details >}}"
  filepath = "group-anagrams"

[[tasks]]
  id = 58
  question = "Реализация собственного MyArrayList по аналогии с ArrayList"
  answer = "**Условие задачи:**  \n📌 Нужно реализовать свой динамический список `MyArrayList<T>` с методами:  \n`add`, `get`, `remove`, `size`, а также внутренней логикой расширения массива.  \nПоведение должно быть аналогично `java.util.ArrayList`.\n\n**Код (входные данные):**\n\n```java\npublic class Main {\n\n    public static void Main(String[] args) {\n        MyArrayList<String> list = new MyArrayList();\n\n        list.add(\"Привет\");\n        list.add(\"Мир\");\n        list.add(\"Java\");\n\n        System.out.println(\"Элемент по индексу 1: \" + list.get(1));\n        System.out.println(\"Размер: \" + list.size());\n\n        list.remove(1);\n\n        System.out.println(\"После удаления:\");\n        for (int i = 0; i < list.size(); i++) {\n            System.out.println(list.get(i));\n        }\n    }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Внутри нужно хранить массив `Object[]`.  \n💡 Начальный capacity можно взять 10, как в `ArrayList`.  \n💡 При заполнении массива надо делать `grow()` → расширять в 1.5–2 раза.  \n💡 При удалении нужно сдвинуть элементы `System.arraycopy`.  \n💡 Не забыть проверки на выход за пределы.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.Arrays;\n\npublic class MyArrayList<T> {\n\n    private Object[] data;\n    private int size;\n    private static final int DEFAULT_CAPACITY = 10;\n\n    public MyArrayList() {\n        this.data = new Object[DEFAULT_CAPACITY];\n    }\n\n    public int size() {\n        return size;\n    }\n\n    public void add(T element) {\n        ensureCapacity(size + 1);\n        data[size++] = element;\n    }\n\n    public T get(int index) {\n        checkIndex(index);\n        return (T) data[index];\n    }\n\n    public T remove(int index) {\n        checkIndex(index);\n        T removed = (T) data[index];\n\n        int elementsAfter = size - index - 1;\n        if (elementsAfter > 0) {\n            System.arraycopy(data, index + 1, data, index, elementsAfter);\n        }\n\n        data[--size] = null; // освобождаем ссылку\n        return removed;\n    }\n\n    private void ensureCapacity(int minCapacity) {\n        if (minCapacity > data.length) {\n            int newCapacity = data.length + (data.length >> 1); // *1.5\n            if (newCapacity < minCapacity) {\n                newCapacity = minCapacity;\n            }\n            data = Arrays.copyOf(data, newCapacity);\n        }\n    }\n\n    private void checkIndex(int index) {\n        if (index < 0 || index >= size) {\n            throw new IndexOutOfBoundsException(\n                    \"Index \" + index + \" out of bounds for size \" + size);\n        }\n    }\n}\n```\n\n**Пример работы кода из Main:**\n\n```\nЭлемент по индексу 1: Мир\nРазмер: 3\nПосле удаления:\nПривет\nJava\n```\n\n🧠 **Ключевые моменты реализации:**\n\n- Храним элементы в `Object[]`, а при чтении кастуем к `T`.\n\n- При добавлении проверяем, хватает ли места, и расширяем массив.\n\n- При удалении сдвигаем элементы влево, как в `ArrayList`.\n\n- Поддерживаем корректный `size`.\n\n\n{{< /details >}}"
  filepath = "implement-myarraylist"

[[tasks]]
  id = 59
  question = "Как сделать класс immutable"
  answer = "**Условие задачи:**  \n📌 Дан класс `A` с полями `Integer a` и `List<Object> b`.  \nНужно сделать этот класс **immutable** — неизменяемым.\n\n**Код:**\n\n```java\nclass A {\n    Integer a;\n    List<Object> b;\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Все поля должны быть `private final`.  \n💡 Никаких сеттеров.  \n💡 Значения должны устанавливаться только через конструктор.  \n💡 Коллекции — _самое важное_: их нужно копировать, иначе объект можно будет изменить снаружи.  \n💡 При возврате коллекции — отдавать **неизменяемую копию** (`Collections.unmodifiableList`).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic final class A {\n\n    private final Integer a;\n    private final List<Object> b;\n\n    public A(Integer a, List<Object> b) {\n        this.a = a;\n        // глубокая копия списка + делаем его неизменяемым\n        this.b = b == null \n                ? List.of() \n                : List.copyOf(b);\n    }\n\n    public Integer getA() {\n        return a;\n    }\n\n    public List<Object> getB() {\n        // возвращаем неизменяемый список\n        return b;\n    }\n}\n```\n\n**Почему этот класс immutable:**\n\n- `final class` — от него нельзя унаследоваться и изменить поведение.\n\n- Поля `private final` — их невозможно изменить после создания.\n\n- Нет сеттеров.\n\n- Коллекция `b` копируется (`List.copyOf`) → исходный список вне объекта не влияет на состояние.\n\n- `List.copyOf` возвращает **неизменяемый список**, значит нельзя сделать `getB().add(...)`.\n\n\nТакой объект полностью неизменяем и безопасен для многопоточного использования.\n\n{{< /details >}}"
  filepath = "make-class-immutable"

[[tasks]]
  id = 60
  question = "Поиск отсутствующего числа в массиве от 0 до n"
  answer = "**Условие задачи:**  \n📌 Дан массив `nums` длины `n`, содержащий **различные числа** из диапазона `[0, n]`.  \nОдно число из диапазона отсутствует.  \nНужно вернуть **это единственное отсутствующее число**.\n\n**Код:**\n\n```java\n/*\n        Дан массив nums, содержащий n различных чисел в диапазоне [0,n].\n        Нужно вернуть единственное число в этом диапазоне, отсутствующее в массиве\n        \n        Пример 1:\n        Ввод: nums = [3,0,1]\n        Вывод: 2\n        \n        Пример 2:\n        Ввод: nums = [0,1]\n        Вывод: 2\n*/\n\nclass MissingNumberSolution {\n        public int findMissingNumber(int[] nums) {\n        }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Сумма чисел от `0` до `n` известна по формуле:  \n`sumExpected = n * (n + 1) / 2`  \n💡 Сравнив её с суммой массива, вы найдёте отсутствующее число.  \n💡 Это решение работает за **O(n)** времени и **O(1)** памяти.  \n💡 Альтернативный вариант — использовать XOR (тоже O(n), O(1)).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nclass MissingNumberSolution {\n\n    public int findMissingNumber(int[] nums) {\n        int n = nums.length;\n\n        // сумма чисел от 0 до n\n        int expected = n * (n + 1) / 2;\n\n        int actual = 0;\n        for (int num : nums) {\n            actual += num;\n        }\n\n        return expected - actual;\n    }\n}\n```\n\n**Альтернативное решение через XOR (быстрее на практике):**\n\n```java\npublic int findMissingNumber(int[] nums) {\n    int xor = nums.length; // начинаем с n\n\n    for (int i = 0; i < nums.length; i++) {\n        xor ^= i;       // XOR индексов\n        xor ^= nums[i]; // XOR элементов\n    }\n\n    return xor;\n}\n```\n\n{{< /details >}}"
  filepath = "missing-number"

[[tasks]]
  id = 61
  question = "Code review PaymentService: транзакции, DI и логические баги"
  answer = "**Условие задачи:**  \n📌 Дан сервис `PaymentService`. Нужно:\n\n- провести **code review**,\n\n- указать проблемы,\n\n- показать, **как исправить код** (структуру оставить примерно ту же).\n\n\n**Код:**\n\n```java\n@Component\npublic class PaymentService{\n\n    @Autowired\n    private ComissionServiceImpl comissionService;\n\n    private NotificationService notificationService = new NotificationServiceImpl();\n\n    @Autowired\n    private AccountRepository accountRepository;\n\n    public void makePayment(AccountDto acc1, AccountDto acc2, Integer moneyAmount){\n        System.out.println(\"Start payment\");\n        var account1 = accountRepository.findById(acc1.getAccountId());\n        var account2 = accountRepository.findById(acc1.getAccountId());\n        transfer(account1, account2, moneyAmount);\n        notificationService.sendNotification(account1.getAccountId());\n        notificationService.sendNotification(account2.getAccountId());\n        System.out.println(\"End payment\");\n    }\n\n    @Transactional\n    public void transfer(Account acc1, Account acc2, Integer moneyAmount){\n        account1.setMoneyAmount(account1.getMoneyAmount() - moneyAmount);\n        account2.setMoneyAmount(account2.getMoneyAmount() + moneyAmount);\n    }\n\n}\n\npublic class AccountDto {\n    private UUID accountId;\n    private Integer moneyAmount;\n}\n\n@Entity\n@Table\npublic class Account{\n\n    @Id\n    private UUID accountId;\n    private Integer moneyAmount;\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Инъекция зависимостей: не используем `new`, лучше **constructor injection** + интерфейсы, а не конкретные классы.  \n💡 `findById` в Spring Data возвращает `Optional<Account>`, а не `Account`. Нужна обработка.  \n💡 Во втором `findById` используется `acc1`, а должно быть `acc2`.  \n💡 В `transfer` параметры называются `acc1/acc2`, но внутри используются `account1/account2` — код не компилируется.  \n💡 `@Transactional` не сработает, если аннотированный метод вызывается **из этого же класса** (self-invocation). Транзакцию нужно ставить на entrypoint (`makePayment`) или вынести `transfer` в отдельный сервис.  \n💡 Логирование лучше делать через `Logger`, а не `System.out.println`.  \n💡 Денежные суммы лучше хранить в `BigDecimal`, но для livecoding можно оставить `Integer` и хотя бы проверить баланс и неотрицательность суммы.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nНиже пример исправленного варианта с комментариями:\n\n```java\nimport org.springframework.stereotype.Service;\nimport org.springframework.transaction.annotation.Transactional;\nimport lombok.RequiredArgsConstructor;\n\n@Service\n@RequiredArgsConstructor\npublic class PaymentService {\n\n    private final CommissionService commissionService;    // интерфейс, а не реализация\n    private final NotificationService notificationService;\n    private final AccountRepository accountRepository;\n\n    @Transactional\n    public void makePayment(AccountDto fromDto, AccountDto toDto, Integer amount) {\n        if (amount == null || amount <= 0) {\n            throw new IllegalArgumentException(\"Amount must be positive\");\n        }\n\n        System.out.println(\"Start payment\"); // в реальном коде: логгер\n\n        // 1. Загружаем счета\n        Account from = accountRepository.findById(fromDto.getAccountId())\n                .orElseThrow(() -> new IllegalArgumentException(\"Source account not found\"));\n\n        Account to = accountRepository.findById(toDto.getAccountId())\n                .orElseThrow(() -> new IllegalArgumentException(\"Target account not found\"));\n\n        // 2. Считаем комиссию (если нужна)\n        int commission = commissionService.calculateCommission(amount);\n        int totalDebit = amount + commission;\n\n        if (from.getMoneyAmount() < totalDebit) {\n            throw new IllegalStateException(\"Insufficient funds\");\n        }\n\n        // 3. Переводим деньги (внутри той же транзакции)\n        transfer(from, to, amount, commission);\n\n        // 4. Отправляем уведомления\n        notificationService.sendNotification(from.getAccountId());\n        notificationService.sendNotification(to.getAccountId());\n\n        System.out.println(\"End payment\");\n    }\n\n    // package-private / private: вызывать только внутри текущей транзакции\n    void transfer(Account from, Account to, int amount, int commission) {\n        from.setMoneyAmount(from.getMoneyAmount() - amount - commission);\n        to.setMoneyAmount(to.getMoneyAmount() + amount);\n\n        // Если Account — JPA entity, полученная через repository,\n        // можно не вызывать save(): изменения зафиксируются через dirty checking.\n        // Явный save не повредит, но не обязателен:\n        // accountRepository.save(from);\n        // accountRepository.save(to);\n    }\n}\n```\n\nПример интерфейсов (для полноты картины):\n\n```java\npublic interface CommissionService {\n    int calculateCommission(int amount);\n}\n\npublic interface NotificationService {\n    void sendNotification(UUID accountId);\n}\n```\n\nПример DTO / Entity (минимально, чтобы стало понятно):\n\n```java\npublic class AccountDto {\n    private UUID accountId;\n    private Integer moneyAmount;\n\n    public UUID getAccountId() {\n        return accountId;\n    }\n\n    public Integer getMoneyAmount() {\n        return moneyAmount;\n    }\n\n    // setters/конструктор по необходимости\n}\n\n@Entity\n@Table(name = \"accounts\")\npublic class Account {\n\n    @Id\n    private UUID accountId;\n\n    private Integer moneyAmount;\n\n    public UUID getAccountId() {\n        return accountId;\n    }\n\n    public Integer getMoneyAmount() {\n        return moneyAmount;\n    }\n\n    public void setMoneyAmount(Integer moneyAmount) {\n        this.moneyAmount = moneyAmount;\n    }\n}\n```\n\n**Кратко, какие проблемы были и как исправили:**\n\n1. **Неверная загрузка второго аккаунта**\n\n    ```java\n    var account2 = accountRepository.findById(acc1.getAccountId());\n    ```\n\n   👉 Должно быть `acc2.getAccountId()`.\n\n2. **Игнорирование Optional от `findById`**  \n   👉 Теперь используем `orElseThrow(...)`.\n\n3. **Неработающий `@Transactional`**  \n   👉 Перенесли аннотацию на `makePayment` — entrypoint бизнес-операции.\n\n4. **Поля с `@Autowired` и `new ...`**  \n   👉 Заменено на **constructor injection** через `@RequiredArgsConstructor` + интерфейсы.\n\n5. **Опечатка и привязка к реализации**  \n   👉 `ComissionServiceImpl` → `CommissionService`. Привязываемся к интерфейсу.\n\n6. **Проблемы с именами переменных в `transfer`**  \n   👉 Используем корректные параметры и не обращаемся к несуществующим `account1/account2`.\n\n7. **Отсутствие валидаций и проверки баланса**  \n   👉 Добавлены проверки суммы и достаточности средств.\n\n8. **System.out вместо логгера**  \n   👉 Для продакшена стоит заменить на `Logger`, но для livecoding оставили как есть, с замечанием.\n\n\nТакой вариант уже выглядит адекватным ответом на code review на собеседовании.\n\n{{< /details >}}"
  filepath = "payment-service-code-review"

