  answer = "**Условие задачи:**  \n📌 Дан сервис `ClosestNumberFinderService`. Метод `getSystemSecretNumber()` загружает список чисел через `NumberGenerator` и должен вернуть число, ближайшее к `systemId`.\n\nЕсли есть несколько подходящих чисел, нужно вернуть число с минимальной разницей до `systemId`.  \nДля примера: для `List.of(3, 5, 7, 9, 12, 15)` и `systemId = 10` результат должен быть `9`.\n\n**Код:**\n\n```java\n@Service\n@RequiredArgsConstructor\npublic class ClosestNumberFinderService {\n    /* Бин подключается из библиотеки. Нам виден только интерфейс\n        public interface NumberGenerator {\n            List<Integer> loadNumbers();\n        }\n    */\n    private final NumberGenerator generator;\n\n    private Integer systemId = 10;\n\n    public Integer getSystemSecretNumber() {\n        List<Integer> numbers = generator.loadNumbers();\n        return findClosestNumber(numbers, systemId);\n    }\n\n    // Пример для List.of(3, 5, 7, 9, 12, 15) и systemId=10, должно вернуться 9\n    private Integer findClosestNumber(List<Integer> numbers, int systemId) {\n        Number closestNumber = null;\n        //TODO техдолг. Реализовать логику\n        return closestNumber;\n    }\n}\n```\n\n📌 **Пример 1:**  \nВход:  \n`numbers = [3, 5, 7, 9, 12, 15]`  \n`systemId = 10`\n\nВыход:  \n`9`\n\n📌 **Пример 2:**  \nВход:  \n`numbers = [1, 8, 11, 20]`  \n`systemId = 10`\n\nВыход:  \n`11`\n\n📌 **Пример 3:**  \nВход:  \n`numbers = [10, 20, 30]`  \n`systemId = 10`\n\nВыход:  \n`10`\n\n📌 **Пример 4:**  \nВход:  \n`numbers = [-5, 0, 6]`  \n`systemId = 4`\n\nВыход:  \n`6`\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"\"Подсказки\"\" close >}}  \n💡 Нужно пройти по списку и для каждого числа посчитать расстояние до `systemId`.  \n💡 Удобно хранить текущее лучшее число и минимальную найденную разницу.  \n💡 `closestNumber` должен быть типа `Integer`, а не `Number`.  \n💡 Стоит обработать случай пустого списка или `null`.  \n{{< /details >}}\n\n---\n\n{{< details \"\"Решение\"\" close >}}\n\n```java\n@Service\n@RequiredArgsConstructor\npublic class ClosestNumberFinderService {\n    /* Бин подключается из библиотеки. Нам виден только интерфейс\n        public interface NumberGenerator {\n            List<Integer> loadNumbers();\n        }\n    */\n    private final NumberGenerator generator;\n\n    private Integer systemId = 10;\n\n    public Integer getSystemSecretNumber() {\n        List<Integer> numbers = generator.loadNumbers();\n        return findClosestNumber(numbers, systemId);\n    }\n\n    // Пример для List.of(3, 5, 7, 9, 12, 15) и systemId=10, должно вернуться 9\n    private Integer findClosestNumber(List<Integer> numbers, int systemId) {\n        if (numbers == null || numbers.isEmpty()) {\n            return null;\n        }\n\n        Integer closestNumber = numbers.get(0);\n        int minDiff = Math.abs(closestNumber - systemId);\n\n        for (Integer number : numbers) {\n            int diff = Math.abs(number - systemId);\n            if (diff < minDiff) {\n                minDiff = diff;\n                closestNumber = number;\n            }\n        }\n\n        return closestNumber;\n    }\n}\n```\n\n> Нужно пройти по списку, посчитать модуль разницы до `systemId` и вернуть число с минимальной разницей.  \n> В исходном коде ошибка в том, что `closestNumber` объявлен как `Number`, хотя метод должен вернуть `Integer`, и сама логика пока не реализована.\n\n{{< /details >}}"
  filepath = "closest-number-systemid"

[[tasks]]
  id = 78
  question = "Объединить два отсортированных массива в один отсортированный массив"
  answer = "**Условие задачи:**  \n📌 Даны два отсортированных массива `nums1` и `nums2`. Нужно алгоритмически объединить их в один отсортированный массив.\n\nОграничения:\n\n- нельзя использовать встроенные сортировки\n    \n- нужно сохранить отсортированный порядок элементов в результате\n    \n\n**Код:**\n\n```java\npublic int[] mergeSortedArrays(int[] nums1, int[] nums2) {\n    // Пример: [1, 3, 5] и [2, 4, 6] -> [1, 2, 3, 4, 5, 6]\n}\n```\n\n📌 **Пример 1:**  \nВход:  \n`nums1 = [1, 3, 5]`  \n`nums2 = [2, 4, 6]`\n\nВыход:  \n`[1, 2, 3, 4, 5, 6]`\n\n📌 **Пример 2:**  \nВход:  \n`nums1 = [1, 2, 7]`  \n`nums2 = [3, 4, 5]`\n\nВыход:  \n`[1, 2, 3, 4, 5, 7]`\n\n📌 **Пример 3:**  \nВход:  \n`nums1 = []`  \n`nums2 = [1, 2, 3]`\n\nВыход:  \n`[1, 2, 3]`\n\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"\"Подсказки\"\" close >}}  \n💡 Используй два указателя: один для `nums1`, второй для `nums2`.  \n💡 Сравнивай текущие элементы обоих массивов и меньший добавляй в результат.  \n💡 Когда один массив закончится, просто допиши оставшиеся элементы второго массива.  \n💡 Это классическая задача на merge-step из merge sort.  \n{{< /details >}}\n\n---\n\n{{< details \"\"Решение\"\" close >}}\n\n```java\npublic int[] mergeSortedArrays(int[] nums1, int[] nums2) {\n    int[] result = new int[nums1.length + nums2.length];\n\n    int i = 0;\n    int j = 0;\n    int k = 0;\n\n    while (i < nums1.length && j < nums2.length) {\n        if (nums1[i] <= nums2[j]) {\n            result[k++] = nums1[i++];\n        } else {\n            result[k++] = nums2[j++];\n        }\n    }\n\n    while (i < nums1.length) {\n        result[k++] = nums1[i++];\n    }\n\n    while (j < nums2.length) {\n        result[k++] = nums2[j++];\n    }\n\n    return result;\n}\n```\n\n> Нужно пройти по обоим массивам двумя указателями, каждый раз брать меньший элемент и записывать его в результирующий массив. Когда один массив закончится, дописать остаток второго.\n\n{{< /details >}}"
  filepath = "merge-sorted-arrays"

