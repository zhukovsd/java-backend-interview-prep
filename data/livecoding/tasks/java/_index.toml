  question = "Удалить повторения символов из списка, начиная с 3-го повторения"
  answer = "**Условие задачи:**  \n📌 Написать метод, в который передаётся список `char`. Необходимо удалить из списка все повторения символов, начиная с 3-го появления каждого символа.\n\nТо есть:\n\n- 1-е и 2-е появление символа нужно оставить\n    \n- 3-е и все последующие появления этого же символа нужно удалить\n    \n\n**Код:**\n\n```java\npublic void removeDuplicatesFromThird(List<Character> chars) {\n    // TODO\n}\n```\n\n📌 **Пример 1:**  \nВход:  \n`chars = [a, b, a, a, c, b, b]`\n\nВыход:  \n`[a, b, a, c, b]`\n\n📌 **Пример 2:**  \nВход:  \n`chars = [x, x, x, x]`\n\nВыход:  \n`[x, x]`\n\n📌 **Пример 3:**  \nВход:  \n`chars = [m, n, o]`\n\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"\"Подсказки\"\" close >}}  \n💡 Нужно считать, сколько раз каждый символ уже встретился.  \n💡 Удобно использовать `Map<Character, Integer>` для подсчёта.  \n💡 Так как удаление идёт из списка, безопаснее проходить по нему через `Iterator`.  \n💡 Если символ встретился 3-й раз или больше, его нужно удалить.  \n{{< /details >}}\n\n---\n\n{{< details \"\"Решение\"\" close >}}\n\n```java\nimport java.util.HashMap;\nimport java.util.Iterator;\nimport java.util.List;\nimport java.util.Map;\n\npublic void removeDuplicatesFromThird(List<Character> chars) {\n    Map<Character, Integer> counts = new HashMap<>();\n    Iterator<Character> iterator = chars.iterator();\n\n    while (iterator.hasNext()) {\n        Character ch = iterator.next();\n        int newCount = counts.getOrDefault(ch, 0) + 1;\n        counts.put(ch, newCount);\n\n        if (newCount >= 3) {\n            iterator.remove();\n        }\n    }\n}\n```\n\n> Нужно пройти по списку, считать количество появлений каждого символа и удалять элемент, если он встретился 3-й раз или больше. Для удаления во время обхода лучше использовать `Iterator`.\n\n{{< /details >}}"
  filepath = "remove-char-duplicates-from-third"

