[[tasks]]
  id = 1
  question = "Найти первый неповторяющийся элемент в массиве"
  answer = "```java\npublic static void main(String[] args) {\n        int[] nums = {4, 5, 1, 2, 0, 4, 5, 2};\n}\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Можно использовать `LinkedHashMap`, так как он сохраняет порядок вставки элементов и позволяет эффективно отслеживать количество вхождений.\n- Перебираем массив и заносим элементы в `Map`, увеличивая счетчик повторений.\n- Затем снова проходим по массиву и находим первый элемент с `count == 1`.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.LinkedHashMap;\nimport java.util.Map;\n\npublic class FirstUniqueElement {\n    public static int findFirstUnique(int[] nums) {\n        Map<Integer, Integer> countMap = new LinkedHashMap<>();\n\n        for (int num : nums) {\n            countMap.put(num, countMap.getOrDefault(num, 0) + 1);\n        }\n\n        for (int num : nums) {\n            if (countMap.get(num) == 1) {\n                return num;\n            }\n        }\n\n        return -1; // Если уникального элемента нет\n    }\n\n    public static void main(String[] args) {\n        int[] nums = {4, 5, 1, 2, 0, 4, 5, 2};\n        System.out.println(findFirstUnique(nums)); // 1\n    }\n}\n```\n\nВывод:\n\n```\n1\n```\n\nМетод работает за `O(n)`, так как мы дважды проходим по массиву. ✅\n{{< /details >}}"
  filepath = "find-first-unique-element"

[[tasks]]
  id = 2
  question = "Проверить, является ли строка палиндромом"
  answer = "```\n\"A man, a plan, a canal, Panama!\"\n\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Палиндром — это строка, которая читается одинаково как слева направо, так и справа налево.\n- Нужно учесть, что пробелы, знаки препинания и регистр символов не имеют значения при проверке.\n- Можно использовать два указателя: один с начала строки, другой с конца, и проверять, совпадают ли символы, игнорируя пробелы и знаки препинания.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\nДля решения задачи можно использовать регулярные выражения для удаления всего, что не является буквами или цифрами, а затем сравнить строку с её обратной версией.\n\n```java\nclass Main {\n    public static void main(String[] args) {\n        String text = \"A man, a plan, a canal, Panama!\";\n\n        // Преобразуем строку в нижний регистр и удаляем все ненужные символы\n        String cleanedText = text.replaceAll(\"[^a-zA-Z0-9]\", \"\").toLowerCase();\n\n        // Проверяем, равна ли строка своему обратному представлению\n        if (isPalindrome(cleanedText)) {\n            System.out.println(\"Строка является палиндромом\");\n        } else {\n            System.out.println(\"Строка не является палиндромом\");\n        }\n    }\n\n    // Метод для проверки, является ли строка палиндромом\n    public static boolean isPalindrome(String text) {\n        int left = 0;\n        int right = text.length() - 1;\n        \n        while (left < right) {\n            if (text.charAt(left) != text.charAt(right)) {\n                return false;\n            }\n            left++;\n            right--;\n        }\n        return true;\n    }\n}\n```\n\n**Что делает код:**\n\n1. Мы убираем все символы, которые не являются буквами или цифрами, с помощью регулярного выражения `replaceAll(\"[^a-zA-Z0-9]\", \"\")`.\n2. Преобразуем строку в нижний регистр, чтобы игнорировать регистр.\n3. Метод `isPalindrome` проверяет, совпадают ли символы с обеих сторон строки (сначала и с конца).\n\n**Результат для строки `\"A man, a plan, a canal, Panama!\"`:**\n\n```\nСтрока является палиндромом\n```\n\nПалиндром проверен успешно, так как после очистки и приведения к единому регистру строка становится `\"amanaplanacanalpanama\"`, которая читается одинаково в обоих направлениях. ✅\n{{< /details >}}"
  filepath = "check-palindrome"

[[tasks]]
  id = 3
  question = "Найти 2 элемента упорядоченного массива, сумма которых равна заданному числу"
  answer = "**Example 1**\n\n**Input:**\n\n`nums = [1,2,3,4,5,6,7,8,9] target = 10`\n\n**Output:**\n\n`[1,9]`\n\n**Explanation:**  \nСумма элементов `1 + 9 = 10`, что совпадает с целевым значением.\n\n---\n\n **Example 2**\n\n**Input:**\n\n`nums = [2,3,4] target = 6`\n\n**Output:**\n\n`[2,4]`\n\n**Explanation:**  \nЭлементы `2` и `4` дают нужную сумму.\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Так как массив **упорядоченный**, можно использовать два указателя: один в начале, другой в конце.\n- Если сумма элементов больше целевого числа, уменьшаем правый указатель.\n- Если сумма меньше, увеличиваем левый указатель.\n- Если сумма совпала — нашли ответ.\n- Если указатели пересеклись — таких элементов нет.\n- Временная сложность: **O(n)**, так как массив проходит максимум один раз.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class TwoSumSorted {\n    public static int[] findTwoSum(int[] nums, int target) {\n        int left = 0, right = nums.length - 1;\n        \n        while (left < right) {\n            int sum = nums[left] + nums[right];\n\n            if (sum == target) {\n                return new int[]{nums[left], nums[right]};\n            } else if (sum < target) {\n                left++;  // Увеличиваем левый индекс, чтобы увеличить сумму\n            } else {\n                right--; // Уменьшаем правый индекс, чтобы уменьшить сумму\n            }\n        }\n        \n        return new int[]{}; // Если ничего не нашли\n    }\n\n    public static void main(String[] args) {\n        int[] nums = {1, 2, 3, 4, 5, 6, 7, 8, 9};\n        int target = 10;\n        int[] result = findTwoSum(nums, target);\n\n        if (result.length > 0) {\n            System.out.println(\"Найденные элементы: \" + result[0] + \" и \" + result[1]);\n        } else {\n            System.out.println(\"Пара не найдена\");\n        }\n    }\n}\n```\n\n**Пример работы:**  \nВход: `{1, 2, 3, 4, 5, 6, 7, 8, 9}`, `target = 10`  \nВыход: `1 и 9` (или `2 и 8`, `3 и 7`, `4 и 6` в зависимости от того, какую пару он найдет первой).\n{{< /details >}}"
  filepath = "find-two-sum-sorted"

[[tasks]]
  id = 4
  question = "Найти 2 элемента неупорядоченного массива, сумма которых равна заданному числу"
  answer = "**Example 1**\n\n**Input:**\n\n`nums = [2,7,11,15] target = 9`\n\n**Output:**\n\n`[2,7]`\n\n**Explanation:**  \nЭлементы `2` и `7` дают сумму `9`.\n\n---\n\n **Example 2**\n\n**Input:**\n\n`nums = [3,2,4] target = 6`\n\n**Output:**\n\n`[2,4]`\n\n**Explanation:**  \nЭлементы `2` и `4` дают нужную сумму.\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Для **неупорядоченного** массива мы не можем использовать бинарный поиск.   \n- **Оптимальный подход** — использовать `HashMap`, сохраняя разницу `target - num`.   \n- Можно также использовать `Set`, чтобы проверять, встречался ли уже нужный элемент.   \n- **Менее эффективный** способ — два вложенных цикла (`O(n^2)`).   \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.*;\n\npublic class TwoSum {\n    public static int[] findTwoSum(int[] nums, int target) {\n        Map<Integer, Integer> map = new HashMap<>(); // Число -> Индекс\n        for (int i = 0; i < nums.length; i++) {\n            int complement = target - nums[i]; // Число, которое нужно найти\n            if (map.containsKey(complement)) {\n                return new int[]{map.get(complement), i}; // Найденные индексы\n            }\n            map.put(nums[i], i); // Добавляем число в map\n        }\n        return new int[]{}; // Если пары не найдено\n    }\n\n    public static void main(String[] args) {\n        int[] nums = {4, 7, 1, -3, 2};\n        int target = 5;\n        int[] result = findTwoSum(nums, target);\n        if (result.length == 2) {\n            System.out.println(\"Индексы: \" + result[0] + \", \" + result[1]);\n        } else {\n            System.out.println(\"Пара не найдена\");\n        }\n    }\n}\n```\n\n**Разбор кода:**\n\n- Используем `HashMap`, чтобы хранить число и его индекс.\n- Для каждого элемента вычисляем `complement = target - num`.\n- Если `complement` уже в `map`, значит нашли пару.\n- Время выполнения: **`O(n)`** (проходим массив один раз).\n{{< /details >}}"
  filepath = "find-two-sum-unsorted"

[[tasks]]
  id = 5
  question = "Реализовать код для отображения \"Тик\" и \"Так\" с разницей в одну секунду, используя два потока"
  answer = "- Один поток должен печатать \"Тик\", а другой — \"Так\".\n- Потоки должны работать с разницей в одну секунду.\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Для синхронизации потоков можно использовать **wait()** и **notify()** или **notifyAll()**.\n- Используйте общий объект или блок синхронизации для координации потоков.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nВот пример кода для реализации задачи:\n\n```java\npublic class TickTock {\n    private final Object lock = new Object();\n    public void tick() {\n        synchronized (lock) {\n            System.out.println(\"Тик\");\n            try {\n                Thread.sleep(1000);\n            } catch (InterruptedException e) {\n                throw new RuntimeException(e);\n            }\n            lock.notify();\n            try {\n                lock.wait();\n            } catch (InterruptedException e) {\n                throw new RuntimeException(e);\n            }\n        }\n    }\n    public void tock() {\n        synchronized (lock) {\n            System.out.println(\"Так\");\n            try {\n                Thread.sleep(1000);\n            } catch (InterruptedException e) {\n                throw new RuntimeException(e);\n            }\n            lock.notify();\n            try {\n                lock.wait();\n            } catch (InterruptedException e) {\n                throw new RuntimeException(e);\n            }\n        }\n    }\n\n    public static void main(String[] args) {\n        TickTock tickTock = new TickTock();\n\n        Thread tickThread = new Thread(() -> {\n            while (true) {\n                tickTock.tick();\n            }\n        });\n\n        Thread tockThread = new Thread(() -> {\n            while (true) {\n                tickTock.tock();\n            }\n        });\n\n        tickThread.start();\n        tockThread.start();\n    }\n}\n```\n\n**Объяснение:**\n\n1. **Общий объект lock**: используется для синхронизации потоков.\n2. **Флаг tickTurn**: управляет порядком вывода \"Тик\" и \"Так\".\n3. Потоки вызывают метод `tick()` или `tock()`, проверяя флаг `tickTurn`.\n4. Потоки используют `wait()` для ожидания своей очереди и `notify()` для пробуждения другого потока.\n5. Потоки выводят \"Тик\" или \"Так\" с задержкой в 1 секунду (`Thread.sleep(1000)`), обеспечивая интервал между выводами.\n\nКод выводит:\n\n```\nТик\nТак\nТик\nТак\nТик\nТак\nТик\nТак\nТик\nТак\n```\n{{< /details >}}"
  filepath = "thread-sync-tick-tock"

[[tasks]]
  id = 6
  question = "Реализовать паттерн Decorator"
  answer = "{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Паттерн **Декоратор** позволяет динамически добавлять новое поведение объекту, оборачивая его в другой объект.\n- Для этого создается базовый интерфейс, который реализуют как декорируемые классы, так и их декораторы.\n- Декораторы должны реализовывать тот же интерфейс и делегировать вызовы объекту, который они декорируют, добавляя дополнительные действия до или после делегирования.\n- Паттерн полезен, если нужно добавлять функциональность объекту без изменения его кода.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nДля демонстрации паттерна Декоратор создадим систему, где будем декорировать объект, добавляя разные действия, например, к текстовому сообщению.\n\n **Шаг 1. Определим интерфейс**\n\n```java\npublic interface Message {\n    String getContent();\n}\n```\n\n **Шаг 2. Реализуем базовый класс**\n\n```java\npublic class SimpleMessage implements Message {\n\n    private String content;\n\n    public SimpleMessage(String content) {\n        this.content = content;\n    }\n\n    @Override\n    public String getContent() {\n        return content;\n    }\n}\n```\n\n **Шаг 3. Создадим декоратор**\n\n```java\npublic class MessageDecorator implements Message {\n\n    protected Message wrappedMessage;\n\n    public MessageDecorator(Message message) {\n        this.wrappedMessage = message;\n    }\n\n    @Override\n    public String getContent() {\n        return wrappedMessage.getContent();\n    }\n}\n```\n\n **Шаг 4. Реализуем конкретные декораторы**\n\n```java\npublic class UppercaseDecorator extends MessageDecorator {\n\n    public UppercaseDecorator(Message message) {\n        super(message);\n    }\n\n    @Override\n    public String getContent() {\n        return wrappedMessage.getContent().toUpperCase();\n    }\n}\n\npublic class ExclamationDecorator extends MessageDecorator {\n\n    public ExclamationDecorator(Message message) {\n        super(message);\n    }\n\n    @Override\n    public String getContent() {\n        return wrappedMessage.getContent() + \"!!!\";\n    }\n}\n```\n\n **Шаг 5. Используем декоратор**\n\n```java\npublic class Main {\n    public static void main(String[] args) {\n        Message message = new SimpleMessage(\"Hello\");\n        \n        // Применяем декораторы\n        message = new UppercaseDecorator(message);\n        message = new ExclamationDecorator(message);\n\n        System.out.println(message.getContent());  // Выведет \"HELLO!!!\"\n    }\n}\n```\n\n **Ключевые моменты:**\n\n1. **Интерфейс `Message`** определяет общие методы для всех сообщений.\n2. **Класс `SimpleMessage`** - это базовая реализация, которая возвращает сообщение.\n3. **`MessageDecorator`** - абстрактный декоратор, который хранит ссылку на объект `Message` и делегирует вызовы.\n4. Конкретные декораторы, такие как **`UppercaseDecorator`** и **`ExclamationDecorator`**, расширяют функциональность базового объекта, изменяя или дополняя поведение.\n\nТаким образом, паттерн Декоратор позволяет гибко расширять функциональность объектов, не изменяя их код.\n{{< /details >}}"
  filepath = "decorator-pattern"

[[tasks]]
  id = 7
  question = "Спроектировать и реализовать класс-сервис для сокращения URL-адресов"
  answer = "**Описание**\n- Для реализации сервиса сокращения URL можно использовать **хеширование** или создание уникальных идентификаторов.  \n- Каждый раз, когда пользователь вводит длинный URL, мы генерируем уникальный идентификатор для этого URL и сохраняем его в базе данных или памяти.  \n\n{{< hint warning >}}  \n**Спойлеры к решению**    \n{{< /hint >}}  \n  \n{{< details \"Подсказки\" close >}}  \n- Можно использовать структуру данных, которая будет хранить пары **исходный URL** → **сокращенный URL**.  \n- Для хранения данных можно использовать **Map**, где ключом будет уникальный идентификатор, а значением — оригинальный URL.  \n- После этого, при запросе по сокращенному URL, сервис должен возвращать оригинальный URL.  \n{{< /details >}}  \n  \n{{< details \"Решение\" close >}}  \n  \nДля начала реализуем простой сервис сокращения URL-адресов с использованием Map для хранения данных и генерации коротких URL.  \n  \n**Шаг 1. Создадим интерфейс сервиса**  \n  \n```java  \npublic interface URLShorteningService {  \nString shortenURL(String originalURL);  \nString getOriginalURL(String shortenedURL);  \n}  \n```  \n  \n**Шаг 2. Реализуем сервис**  \n  \n```java  \nimport java.util.HashMap;  \nimport java.util.Map;  \n  \npublic class URLShorteningServiceImpl implements URLShorteningService {  \n  \nprivate static final String BASE_URL = \"http://short.ly/\";  \nprivate Map<String, String> urlStorage = new HashMap<>();  \nprivate static final String CHARACTERS = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789\";  \nprivate static final int URL_LENGTH = 6; // Длина сокращенного URL  \n  \n@Override  \npublic String shortenURL(String originalURL) {  \nString shortURL = generateShortURL();  \nurlStorage.put(shortURL, originalURL);  \nreturn BASE_URL + shortURL;  \n}  \n  \n@Override  \npublic String getOriginalURL(String shortenedURL) {  \nString shortURL = shortenedURL.replace(BASE_URL, \"\");  \nreturn urlStorage.getOrDefault(shortURL, null);  \n}  \n  \n// Генерация случайного короткого URL  \nprivate String generateShortURL() {  \nStringBuilder shortURL = new StringBuilder();  \nfor (int i = 0; i < URL_LENGTH; i++) {  \nint index = (int) (Math.random() * CHARACTERS.length());  \nshortURL.append(CHARACTERS.charAt(index));  \n}  \nreturn shortURL.toString();  \n}  \n}  \n```  \n  \n**Шаг 3. Пример использования сервиса**  \n  \n```java  \npublic class Main {  \npublic static void main(String[] args) {  \nURLShorteningService urlShorteningService = new URLShorteningServiceImpl();  \n  \n// Сокращение URL  \nString originalURL = \"https://www.example.com/long-url\";  \nString shortenedURL = urlShorteningService.shortenURL(originalURL);  \nSystem.out.println(\"Shortened URL: \" + shortenedURL);  \n  \n// Получение оригинального URL  \nString retrievedURL = urlShorteningService.getOriginalURL(shortenedURL);  \nSystem.out.println(\"Original URL: \" + retrievedURL);  \n}  \n}  \n```  \n  \n** Ключевые моменты:**  \n  \n1. **Класс `URLShorteningServiceImpl`** реализует логику сокращения URL и возвращения оригинала.  \n2. **Генерация короткого URL** происходит с использованием случайных символов, из которых формируется строка заданной длины.  \n3. Для хранения пары **оригинальный URL → сокращенный URL** используется **Map**.  \n4. Метод **`shortenURL`** генерирует сокращенный URL, сохраняет его в хранилище и возвращает.  \n5. Метод **`getOriginalURL`** извлекает оригинальный URL из хранилища по сокращенному URL.  \n  \nТакой сервис будет работать для базового сокращения URL, а также может быть расширен дополнительными функциями, например:  \n  \n- Проверка на дубликаты сокращенных URL.  \n- Хранение статистики по кликам.  \n- Сроки действия сокращенных URL.  \n{{< /details >}}"
  filepath = "url-shortener-service"

