  id = 42
  question = "Исправление ошибок: OrderService"
  answer = "🔥 Исправление ошибок в коде\n\n```java\npublic class OrderService {\n\n@Autowired\nprivate OrderRepository orderRepository;\n\nprivate final NotificationService notificationService;\n\n@Autowired\npublic OrderService(NotificationService notificationService) {\n    this.notificationService = notificationService;\n}\n\npublic void updateOrderStatus(Long orderId, String newStatus) {\n    Order order = orderRepository.findById(orderId);\n\n    if (newStatus.equals(\"\"COMPLETED\"\")) {\n        order.setStatus(\"\"COMPLETED\"\");\n        notificationService.notify(order.getUserId(), \"\"Your order is completed\"\");\n    } else if (newStatus.equals(\"\"CANCELLED\"\")) {\n        order.setStatus(\"\"CANCELLED\"\");\n        notificationService.notify(order.getUserId(), \"\"Your order is cancelled\"\");\n    } else if (newStatus.equals(\"\"PENDING\"\")) {\n        order.setStatus(\"\"PENDING\"\");\n        orderRepository.save(order);\n    } else if (newStatus.equals(\"\"IN_PROGRESS\"\")) {\n        order.setStatus(\"\"IN_PROGRESS\"\");\n        orderRepository.save(order);\n    } else {\n        throw new IllegalArgumentException(\"\"Unsupported status: \"\" + newStatus);\n    }\n}\n}\n        \n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используй **один стиль DI** — конструктор для всех зависимостей (`final` поля, `@Autowired` на конструкторе).  \n💡 `findById` в Spring Data возвращает `Optional`: обработай случай, когда заказа нет.  \n💡 Проверяй `orderId` и `newStatus` на `null/blank`, избегай `newStatus.equals(...)` → возможен NPE.  \n💡 Статусы как **enum**, а не строковые литералы. Парси через `valueOf` безопасно.  \n💡 Сохраняй заказ **после** изменения статуса во всех ветках, а уведомления — **после успешного сохранения**.  \n💡 Оберни метод в `@Transactional`, чтобы изменение и сохранение были атомарны.  \n💡 Сделай обновление идемпотентным: если статус не поменялся — ничего не делай.  \n💡 Логируй, не используй `printStackTrace()`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\n@Service\npublic class OrderService {\n\n    private final OrderRepository orderRepository;\n    private final NotificationService notificationService;\n    private static final Logger log = LoggerFactory.getLogger(OrderService.class);\n\n    @Autowired\n    public OrderService(OrderRepository orderRepository,\n                        NotificationService notificationService) {\n        this.orderRepository = Objects.requireNonNull(orderRepository);\n        this.notificationService = Objects.requireNonNull(notificationService);\n    }\n\n    @Transactional\n    public void updateOrderStatus(Long orderId, String newStatus) {\n        if (orderId == null) {\n            throw new IllegalArgumentException(\"orderId must not be null\");\n        }\n        if (newStatus == null || newStatus.isBlank()) {\n            throw new IllegalArgumentException(\"newStatus must not be null or blank\");\n        }\n\n        Order order = orderRepository.findById(orderId)\n                .orElseThrow(() -> new OrderNotFoundException(orderId));\n\n        OrderStatus targetStatus = parseStatus(newStatus);\n\n        // идемпотентность\n        if (targetStatus == order.getStatus()) {\n            log.debug(\"Status is already {} for orderId={}\", targetStatus, orderId);\n            return;\n        }\n\n        order.setStatus(targetStatus);\n        orderRepository.save(order); // сохранить во всех кейсах\n\n        // уведомления после успешного сохранения\n        if (targetStatus == OrderStatus.COMPLETED) {\n            notificationService.notify(order.getUserId(), \"Your order is completed\");\n        } else if (targetStatus == OrderStatus.CANCELLED) {\n            notificationService.notify(order.getUserId(), \"Your order is cancelled\");\n        }\n\n        log.info(\"Order {} status changed to {}\", orderId, targetStatus);\n    }\n\n    private OrderStatus parseStatus(String status) {\n        try {\n            return OrderStatus.valueOf(status.trim().toUpperCase(Locale.ROOT));\n        } catch (IllegalArgumentException ex) {\n            throw new IllegalArgumentException(\"Unsupported status: \" + status);\n        }\n    }\n}\n\n// Доменные типы и исключения\n\npublic enum OrderStatus {\n    PENDING, IN_PROGRESS, COMPLETED, CANCELLED\n}\n\npublic class OrderNotFoundException extends RuntimeException {\n    public OrderNotFoundException(Long id) {\n        super(\"Order not found: \" + id);\n    }\n}\n```\n\n- Конструкторная инъекция и `final` поля.\n- Безопасный парсинг статуса в `enum`.\n- `@Transactional` гарантирует атомарность.\n- Сохранение происходит для **всех** статусов.\n- Уведомления отправляются только для важных переходов и **после** сохранения.\n- Обработка отсутствующего заказа и защита от `null/blank`.\n\n{{< /details >}}"
  filepath = "order-service-fix-status"

[[tasks]]
  id = 43
  question = "Объединить массивы без дубликатов"
  answer = "🔥 Объедини два списка целых чисел, исключив повторы.\n\n```java\npublic List<Integer> collect(List<Integer> lst1, List<Integer> lst2) {\n    // код тут\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Чтобы убрать дубликаты, используй `Set` (например, `HashSet`).  \n💡 Для сохранения порядка можно применить `LinkedHashSet`.  \n💡 В Java 8+ удобно стримами: `Stream.concat(...)` и `distinct()`.  \n💡 Если важна сортировка, лучше использовать `TreeSet`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nВариант с `Set`:\n\n```java\npublic List<Integer> collect(List<Integer> lst1, List<Integer> lst2) {\n    Set<Integer> set = new LinkedHashSet<>();\n    set.addAll(lst1);\n    set.addAll(lst2);\n    return new ArrayList<>(set);\n}\n```\n\nВариант на Stream API:\n\n```java\npublic List<Integer> collect(List<Integer> lst1, List<Integer> lst2) {\n    return Stream.concat(lst1.stream(), lst2.stream())\n                 .distinct()\n                 .collect(Collectors.toList());\n}\n```\n\n- `LinkedHashSet` сохраняет порядок первого появления.\n\n- `distinct()` работает лениво и автоматически убирает дубли.\n\n- Важно: оба решения не зависят от размера входных коллекций.\n\n\n{{< /details >}}"
  filepath = "merge-arrays-unique"

[[tasks]]
  id = 44
  question = "Покрытие тестами метода calc"
  answer = "🔥 Нужно продумать тесты для функции `calc(a, b, operation)` по документации.\n\n```java\n/*\n * Выполняет одну из операций \"+\", \"-\", \"/\", \"*\" для переданных параметров\n * В любой непонятной ситуации, в т.ч. невозможность разделить нацело, бросается exception\n */\npublic Integer calc(Integer a, Integer b, String operation);\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Покрывай позитивные кейсы для всех операций: `+`, `-`, `*`, `/`.  \n💡 Обработай граничные условия: деление на ноль, остаток от деления ≠ 0.  \n💡 Проверь `null`-аргументы.  \n💡 Проверь некорректный оператор (например, `\"%\"`, `null`, пустая строка).  \n💡 Тестируй большие числа и переполнение.  \n💡 Используй JUnit 5 + AssertJ для удобных ассертов.  \n💡 Для исключений — `assertThrows`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nНабор тестов (примерно 10–12 штук):\n\n1. **Сложение**: `calc(2, 3, \"+\") == 5`.\n\n2. **Вычитание**: `calc(10, 4, \"-\") == 6`.\n\n3. **Умножение**: `calc(6, 7, \"*\") == 42`.\n\n4. **Деление нацело**: `calc(8, 2, \"/\") == 4`.\n\n5. **Деление с остатком**: `calc(7, 2, \"/\")` → exception.\n\n6. **Деление на ноль**: `calc(5, 0, \"/\")` → exception.\n\n7. **Неизвестная операция**: `calc(5, 2, \"%\")` → exception.\n\n8. **Оператор `null`**: → exception.\n\n9. **Аргументы `null`** (`a=null` или `b=null`) → exception.\n\n10. **Граничные значения**: `calc(Integer.MAX_VALUE, 1, \"+\")` → exception или переполнение (проверка).\n\n11. **Негативные числа**: `calc(-3, -7, \"*\") == 21`.\n\n12. **Идемпотентность**: повторный вызов с одинаковыми аргументами даёт тот же результат.\n\n\nПример JUnit 5 теста:\n\n```java\nclass CalcServiceTest {\n\n    private final CalcService service = new CalcService();\n\n    @Test\n    void shouldAddNumbers() {\n        assertThat(service.calc(2, 3, \"+\")).isEqualTo(5);\n    }\n\n    @Test\n    void shouldThrowWhenDividingByZero() {\n        assertThrows(ArithmeticException.class,\n            () -> service.calc(5, 0, \"/\"));\n    }\n\n    @Test\n    void shouldThrowOnUnsupportedOperation() {\n        assertThrows(IllegalArgumentException.class,\n            () -> service.calc(5, 2, \"%\"));\n    }\n}\n```\n\n- Покрытие позитивных и негативных сценариев.\n\n- Ясные названия тестов.\n\n- Используются `assertThrows` и `assertThat`.\n\n\n{{< /details >}}"
  filepath = "calc-tests"

[[tasks]]
  id = 45
  question = "Реализация проверки продажи товара по времени и типу с условиями if-else"
  answer = "🔥 Нужно написать метод, который проверяет возможность продажи продукта в зависимости от времени и категории.\n\n```java\n// Дано\npublic class IceCream implements Product {};\npublic abstract class Alcohol implements Product {\n    int getAbv(); // крепость\n};\n\n// ТЗ\n/*\n * 13:00–14:00 — обед, продажа запрещена\n * 23:00–02:59 — запрет на продажу любого алкоголя\n * 03:00–07:59 — запрет на продажу крепкого алкоголя (>=40)\n*/\npublic boolean checkSale(Product item, Integer hour) {\n    // код тут\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Сначала проверь обеденное время.  \n💡 В диапазоне 23:00–02:59 блокируй любой алкоголь.  \n💡 В диапазоне 03:00–07:59 блокируй крепкий алкоголь (`abv >= 40`).  \n💡 Для остальных случаев возвращай `true`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic boolean checkSale(Product item, Integer hour) {\n    if (hour == null || hour < 0 || hour > 23) {\n        throw new IllegalArgumentException(\"Некорректный час: \" + hour);\n    }\n\n    // Обед — запрет всех продаж\n    if (hour == 13) {\n        return false;\n    }\n\n    // Ночной запрет на любой алкоголь\n    if (hour >= 23 || hour < 3) {\n        if (item instanceof Alcohol) {\n            return false;\n        }\n    }\n\n    // Утренний запрет на крепкий алкоголь\n    if (hour >= 3 && hour < 8) {\n        if (item instanceof Alcohol && ((Alcohol) item).getAbv() >= 40) {\n            return false;\n        }\n    }\n\n    return true;\n}\n```\n\n- Простые условия `if-else`.\n\n- Ясная логика шаг за шагом.\n\n- Проверены все описанные диапазоны времени.\n\n\n{{< /details >}}"
  filepath = "if-else-can-sell"

[[tasks]]
  id = 46
  question = "Алгоритм фильтрации большой последовательности чисел"
  answer = "🔥 Нужно спроектировать метод, который принимает последовательность чисел до **1 Гб** и возвращает только те значения, которые **> 5**, при этом доступно 1.1 Гб памяти.\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Не загружай всю последовательность в память — обрабатывай её **потоково**.  \n💡 В Java можно использовать `Stream` или `Iterator`, писать в `OutputStream` или `Writer`.  \n💡 Если источник — файл, лучше применять `BufferedReader` + фильтр.  \n💡 Если источник — коллекция, и она очень большая, итерируй последовательно, не держа дубликаты.  \n💡 Для производительности фильтрацию делай «на лету» без промежуточных списков.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nВариант на Java:\n\n```java\npublic void filterAndWrite(InputStream input, OutputStream output) throws IOException {\n    try (BufferedReader reader = new BufferedReader(new InputStreamReader(input));\n         BufferedWriter writer = new BufferedWriter(new OutputStreamWriter(output))) {\n\n        String line;\n        while ((line = reader.readLine()) != null) {\n            int value = Integer.parseInt(line.trim());\n            if (value > 5) {\n                writer.write(String.valueOf(value));\n                writer.newLine();\n            }\n        }\n    }\n}\n```\n\n- Читаем вход **построчно** → минимальное потребление памяти.\n\n- Проверяем условие `> 5`.\n\n- Записываем результат в поток (файл, сокет и т.п.).\n\n\n---\n\nВариант с коллекцией (итерация без копирования):\n\n```java\npublic Iterable<Integer> filter(Iterable<Integer> source) {\n    return () -> new Iterator<>() {\n        private final Iterator<Integer> it = source.iterator();\n        private Integer next;\n\n        @Override\n        public boolean hasNext() {\n            while (it.hasNext()) {\n                Integer candidate = it.next();\n                if (candidate != null && candidate > 5) {\n                    next = candidate;\n                    return true;\n                }\n            }\n            return false;\n        }\n\n        @Override\n        public Integer next() {\n            return next;\n        }\n    };\n}\n```\n\n- Результат возвращается лениво, без создания промежуточного списка.\n\n- Память тратится только на один текущий элемент.\n\n\n---\n\n📌 Итого:\n\n- Используем **стримовую/итеративную обработку**.\n\n- Не храним всю выборку в памяти.\n\n- Фильтруем значения **на лету**.\n\n\n{{< /details >}}"
  filepath = "filter-big-sequence"

[[tasks]]
  id = 47
  question = "Алгоритм подсчёта вхождений элементов списка"
  answer = "🔥 Нужно реализовать метод, который принимает список `Integer` и возвращает структуру с уникальными элементами и количеством их вхождений.\n\n```java\npublic class Utils {\n    // на вход список целых чисел, необходимо получить структуру: уникальные элементы и их кол-во\n    // пример: 1 2 11 2 11 9 11 1 2 3\n    //\n    // структура:\n    // 1  -> 2\n    // 2  -> 3\n    // 11 -> 3\n    // 9  -> 1\n\n    public Map<Integer, Integer> countElementItems(List<Integer> list) {\n        // код тут\n    }\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для подсчёта удобно использовать `Map<Integer, Integer>`.  \n💡 Можно воспользоваться `HashMap` для скорости, либо `TreeMap` для сортировки ключей.  \n💡 В Java 8+ можно применять `Collectors.groupingBy(...)`.  \n💡 Если список пустой — вернуть пустую структуру.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nРеализация через цикл:\n\n```java\npublic Map<Integer, Integer> countElementItems(List<Integer> list) {\n    Map<Integer, Integer> result = new HashMap<>();\n    for (Integer value : list) {\n        result.put(value, result.getOrDefault(value, 0) + 1);\n    }\n    return result;\n}\n```\n\nРеализация через Stream API:\n\n```java\n   public static Map<Integer, Integer> countElementItems(List<Integer> list) {\n    return list.stream()\n            .collect(Collectors.groupingBy(i -> i, Collectors.summingInt(e -> 1)));\n}\n```\n\n- В первом варианте `Map<Integer, Integer>`.\n\n- Во втором — `Map<Integer, Long>` (так как `counting()` возвращает `Long`).\n\n\n---\n\n📌 Итог:\n\n- Уникальные значения — ключи карты.\n\n- Количество вхождений — значения карты.\n\n- Решение работает за **O(n)** по времени и **O(n)** по памяти.\n\n\n{{< /details >}}"
  filepath = "count-elements"

[[tasks]]
  id = 48
  question = "Code Review: Метод find в сервисе интернет-магазина"
  answer = "🔥 Пользователь заходит на страничку магазина, выбирает фильтры для отображения товаров. Фильтров больше 5. Когда пользователь выбрал фильтры и нажал Найти, к нам на бэк поступает запрос, и прилетает в этот участок кода, в метод find(Filter filter). Мы ищем кол-во товаров, которые удовлетворяют фильтру. Если их больше 0, то загружаем товары, иначе возвращаем пустой список. Этот метод вызывается 200 раз в секунду. В 50 процентах случаев count = 0\n\n```java\nclass Service {\n    //200 RPS\n    //50% count = 0\n    \n    public List<Product> find(Filter filter) {\n        int count = repo.count(filter);\n        if(count > 0) {\n            return repo.find(filter);\n        }\n        return new ArrayList<>();\n    }\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Двойной запрос к БД (`count` + `find`) нагружает систему. Лучше сделать один.  \n💡 Если нужно вернуть список, просто вызывай `repo.find(filter)` и проверяй результат на пустоту.  \n💡 При RPS=200 и 50% пустых результатов нагрузка на БД возрастает ×2.  \n💡 Можно добавить кэширование фильтров с нулевым результатом (например, на 30 секунд).  \n💡 Используй `Collections.emptyList()` вместо `new ArrayList<>()`.  \n💡 Для часто повторяющихся фильтров рассмотри in-memory кэш или Redis.  \n💡 Если фильтров много и сложные запросы, подумай о денормализации данных или использовании search-движка (Elastic, Solr).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nИсправленный вариант:\n\n```java\nclass Service {\n    public List<Product> find(Filter filter) {\n        List<Product> products = repo.find(filter);\n        return products.isEmpty() ? Collections.emptyList() : products;\n    }\n}\n```\n\nВариант с кэшированием пустых результатов:\n\n```java\nclass Service {\n    private final Cache<Filter, Boolean> emptyResultCache = Caffeine.newBuilder()\n            .expireAfterWrite(Duration.ofSeconds(30))\n            .build();\n\n    public List<Product> find(Filter filter) {\n        if (Boolean.TRUE.equals(emptyResultCache.getIfPresent(filter))) {\n            return Collections.emptyList();\n        }\n\n        List<Product> products = repo.find(filter);\n\n        if (products.isEmpty()) {\n            emptyResultCache.put(filter, true);\n            return Collections.emptyList();\n        }\n\n        return products;\n    }\n}\n```\n\n- Убран лишний `count`-запрос.\n- Возврат оптимизирован с использованием `Collections.emptyList()`.\n- Возможность кешировать частые фильтры с пустыми результатами.\n\n\n{{< /details >}}"
  filepath = "find-products-review"

[[tasks]]
  id = 49
  question = "Code Review: Синхронизация критической секции в двух потоках"
  answer = "🔥 В текущем коде создаётся новый `Object` для синхронизации при каждом вызове `doSome()`, поэтому потоки синхронизируются на **разных** мониторах — критическая секция фактически не защищена. Кроме того, вызов `new Service.doSome()` некорректен по синтаксису, а `main` должен быть `static`.\n\n```java\nclass Main{\nvoid main(){\n    execute(()->new Service.doSome());\n    execute(()->new Service.doSome());\n}\n}\n\nclass Service{\n    void doSome(){\n        Object obj = new Object();\n        //code\n        synchronized(obj){\n            //code\n        }\n        //code\n    }\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Не создавай монитор внутри метода — он будет разным для каждого вызова. Держи общий `lock` в поле экземпляра (или используй `synchronized` на `this`).  \n💡 Запускай оба потока на **одном и том же** экземпляре `Service`, иначе будут разные мониторы.  \n💡 Исправь сигнатуру `main` на `public static void main(String[] args)` и вызовы лямбд (`service::doSome`).  \n{{< /details >}}\n\n{{< details \"Решение (альтернатива с synchronized-методом)\" close >}}\n\n```java\nclass Main {\n    public static void main(String[] args) {\n        Service service = new Service();\n        execute(service::doSome);\n        execute(service::doSome);\n    }\n\n    static void execute(Runnable r) {\n        new Thread(r).start();\n    }\n}\n\nclass Service {\n    void doSome() {\n        // code\n        critical(); // критическая секция вызовом синхронизированного метода\n        // code\n    }\n\n    private synchronized void critical() {\n        // code (критическая секция)\n    }\n}\n```\n\n- Синхронизация на `this` через `synchronized`-метод обеспечивает взаимное исключение между потоками на одном экземпляре.  \n  {{< /details >}}"
  filepath = "sync-critical-section"

