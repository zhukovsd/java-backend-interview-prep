[[tasks]]
  id = 1
  question = "Создать уникальную коллекцию (типа String) активных (атрибут Item.active со значением true) имен (атрибут Item.name), используя в качестве входных данных список items"
  answer = "```java\n@Getter\n@Setter\nclass Item {\n    private final Long id;\n    private String name;\n    private boolean active;\n}\n\nList<Item> items = ...\n\n\nCollection<String> result = items.stream()...\n\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Мы можем использовать **Stream API** в Java для фильтрации элементов из списка и сбора результатов в уникальную коллекцию.  \n🔍 Для этого воспользуемся **`filter`** для выбора активных элементов и **`map`** для извлечения имен. Затем используем **`Collectors.toSet()`** для того, чтобы результат был уникальным.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.*;\nimport java.util.stream.*;\n\n@Getter\n@Setter\nclass Item {\n    private final Long id;\n    private String name;\n    private boolean active;\n}\n\npublic class Main {\n    public static void main(String[] args) {\n        List<Item> items = ...; // Ваш список объектов Item\n\n        Collection<String> result = items.stream()\n            .filter(Item::isActive)               // Фильтруем активные элементы\n            .map(Item::getName)                   // Извлекаем имя\n            .collect(Collectors.toSet());         // Собираем в уникальную коллекцию\n\n        System.out.println(result);\n    }\n}\n```\n\n📌 **Объяснение:**\n\n- **`filter(Item::isActive)`** — фильтруем элементы, где **`active == true`**.\n- **`map(Item::getName)`** — извлекаем имена активных элементов.\n- **`collect(Collectors.toSet())`** — собираем результат в **`Set`**, который автоматически исключает дубликаты, обеспечивая уникальность.\n\n🚀 **Результат:**\n\n- Мы получим коллекцию уникальных имен активных предметов.\n{{< /details >}}"
  filepath = "unique-active-item-names"

[[tasks]]
  id = 2
  question = "Упростить вложенные лямбда-выражения"
  answer = "**Условие задачи:**  \n📌 Разобраться, что делает данный код, и улучшить читаемость за счёт рефакторинга.\n\n```java\npublic class AvoidComplexLambdas {\n    private final Set<User> users = new HashSet<>();\n\n    public Set<User> findEditors() {\n        return users.stream()\n                .filter(u -> u.getRoles().stream()\n                        .anyMatch(r -> r.getPermissions().contains(Permission.EDIT)))\n                .collect(toSet());\n    }\n}\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к ответу**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Метод `findEditors()` ищет пользователей, которые имеют хотя бы одну роль с разрешением `EDIT`.  \n💡 Вложенные лямбды ухудшают читаемость.  \n💡 Хорошей практикой будет **вынести вложенную логику** в отдельный метод с понятным названием.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n### 🔍 Что делает код?\n\nМетод `findEditors()`:\n\n- Проходит по всем `users`,\n    \n- Фильтрует тех, у кого хотя бы одна `Role` содержит разрешение `Permission.EDIT`,\n    \n- Возвращает подходящих пользователей как `Set`.\n    \n\n### ✅ Как улучшить?\n\nВыносим вложенные лямбды в отдельный метод `hasEditPermission(User u)`:\n\n```java\npublic class AvoidComplexLambdas {\n    private final Set<User> users = new HashSet<>();\n\n    public Set<User> findEditors() {\n        return users.stream()\n                .filter(this::hasEditPermission)\n                .collect(Collectors.toSet());\n    }\n\n    private boolean hasEditPermission(User user) {\n        return user.getRoles().stream()\n                .anyMatch(role -> role.getPermissions().contains(Permission.EDIT));\n    }\n}\n```\n\n### ✨ Преимущества:\n\n- Читаемость повышается.\n    \n- Появляется возможность переиспользовать метод `hasEditPermission`.\n    \n- Упрощается отладка и тестирование.\n    \n\n🔥 Рефакторинг — это про чистый код, а не только про короткий код! 🧹  \n{{< /details >}}"
  filepath = "avoid-complex-lambdas"

[[tasks]]
  id = 3
  question = "Поиск сотрудника по табельному номеру"
  answer = "**Условие задачи:**  \n📌 Дан класс `Empl` с полями `tabNomer` и `fio`.  \nНеобходимо реализовать метод `getEmployee`, который принимает список сотрудников `List<Empl>` и табельный номер `tabNomer`, и возвращает **первого** сотрудника с таким табельным номером в виде `Optional<Empl>`.\n\n**Код:**\n\n```java\npublic class Empl {\n    private String tabNomer;\n    private String fio;\n\n    public Empl(String tabNomer, String fio) {\n        this.tabNomer = tabNomer;\n        this.fio = fio;\n    }\n\n    public String getTabNomer() { return tabNomer; }\n    public String getFio()     { return fio;     }\n}\n\npublic class EmplService {\n    public Optional<Empl> getEmployee(List<Empl> empls, String tabNomer) {\n        // TODO\n    }\n}\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте **Stream API** для элегантного перебора списка.  \n💡 Метод `filter(...)` позволит оставить только тех сотрудников, у которых `getTabNomer().equals(tabNomer)`.  \n💡 Метод `findFirst()` вернёт первый подходящий элемент в `Optional`.  \n💡 Не забывайте проверять входящие параметры на `null`, если нужно повысить надёжность.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.List;\nimport java.util.Optional;\n\npublic class EmplService {\n    public Optional<Empl> getEmployee(List<Empl> empls, String tabNomer) {\n        if (empls == null || tabNomer == null) {\n            return Optional.empty();\n        }\n        return empls.stream()\n                    .filter(e -> tabNomer.equals(e.getTabNomer()))\n                    .findFirst();\n    }\n}\n```\n\n📌 **Что важно помнить:**  \n✅ `Optional` — хорошая практика для обозначения возможного отсутствия значения.  \n✅ Использование `equals` на константе (`tabNomer.equals(...)`) защищает от NPE, если поле `tabNomer` у сотрудника `null`.  \n✅ Stream-подход делает код компактным и читаемым.  \n{{< /details >}}"
  filepath = "get-employee-by-tabnomer"

[[tasks]]
  id = 4
  question = "Фильтр по фамилии"
  answer = "**Условие задачи**\n\n📌 Дан список строк, содержащих полные ФИО (фамилия, имя, отчество).  \nНужно:\n- Выделить фамилии\n- Оставить только те, длина которых больше **3 символов**\n- Отсортировать результат **в алфавитном порядке**\n- Вывести список\n\n### Код:\n\n```java\nimport java.util.*;\n\npublic class Main {\n    public static void main(String[] args) {\n        var fios = List.of(\n            \"Петров Петр Петрович\",\n            \"Иванов Иван Иванович\",\n            \"Алексеев Алексей Алексеевич\",\n            \"Васильев Василий Васильевич\",\n            \"Сидоров Сидор Сидорович\",\n            \"Николаев Николай Николаевич\",\n            \"Андреев Андрей Андреевич\"\n        );\n    }\n}\n````\n\n{{< hint warning >}}\nСпойлеры к решению\n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Метод `split(\" \")` разобьет строку на части (разделитель — пробел)  \n💡 `full.split(\" \")[0]` достанет **фамилию** (первая часть)  \n💡 Условие `surname.length() > 3` проверяет длину фамилии  \n💡 `sorted()` сортирует в алфавитном порядке  \n💡 `toList()` собирает поток в итоговый список  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nList<String> out = fios.stream()\n                .map(fio -> fio.split(\" \")[0])             // берём фамилию\n                .filter(surname -> surname.length() > 3)   // фильтруем\n                .sorted()                                  // сортируем\n                .toList();\n\n```\n\n{{< /details >}}"
  filepath = "filter-sort-surnames"

[[tasks]]
  id = 5
  question = "Палиндром с помощью Stream API"
  answer = "**Условие задачи:**  \nНаписать метод, который проверяет, является ли строка палиндромом.  \nУсловие: использовать **Stream API**, решение в один стрим.  \nСтрока может содержать буквы (разного регистра), цифры, знаки препинания. Нужно учитывать только буквы и цифры.  \n\n\nПримеры:\n- `\"A man, a plan, a canal: Panama\"` → `true`\n- `\"I love work in IT\"` → `false`\n\n{{< hint warning >}}\n**Спойлеры к решению**\n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Сначала очистить строку от всего, кроме букв и цифр.  \n💡 Привести её к нижнему регистру.  \n💡 Использовать `IntStream.range(0, n/2)` для проверки символов.  \n💡 `allMatch` помогает убедиться, что все пары совпали.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\nМы приводим строку к нормальной форме: убираем ненужные символы и делаем строчные буквы.  \nЗатем запускаем один стрим `IntStream.range(0, len/2)` и проверяем симметричные пары символов.  \nЕсли все совпадают — строка палиндром. ✅\n\n\n```java\npackage app;\n\nimport java.util.stream.IntStream;\n\npublic class TaskPalindromeStream {\n\n    public static void main(String[] args) {\n        System.out.println(isPalindrome(\"A man, a plan, a canal: Panama\")); // true\n        System.out.println(isPalindrome(\"I love work in IT\")); // false\n    }\n\n    public static boolean isPalindrome(String s) {\n        String filtered = s.replaceAll(\"[^A-Za-z0-9]\", \"\").toLowerCase();\n        return IntStream.range(0, filtered.length() / 2)\n                .allMatch(i -> filtered.charAt(i) == filtered.charAt(filtered.length() - 1 - i));\n    }\n}\n```\n\n{{< /details >}}"
  filepath = "palindrome-stream"

[[tasks]]
  id = 6
  question = "Stream API — удвоенные нечётные числа"
  answer = "**Условие задачи:**  \n🔥 Дан массив натуральных чисел от 0 до 100. С помощью **Stream API** нужно получить коллекцию удвоенных нечетных чисел.  \n\nПример:  \nВход: `[0, 1, 2, 3, 4, 5]`  \nВыход: `[2, 6, 10]`\n\n{{< hint warning >}}\n**Спойлеры к решению**\n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Используй `IntStream.rangeClosed(0, 100)` для генерации чисел.  \n💡 Чтобы оставить только нечетные — `.filter(n -> n % 2 != 0)`.  \n💡 Чтобы удвоить — `.map(n -> n * 2)`.  \n💡 Чтобы собрать в коллекцию — `.boxed().collect(Collectors.toList())`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.List;\nimport java.util.stream.Collectors;\nimport java.util.stream.IntStream;\n\npublic class TaskStreamOddDoubled {\n    public static void main(String[] args) {\n        List<Integer> result = IntStream.rangeClosed(0, 100)\n                .filter(n -> n % 2 != 0)\n                .map(n -> n * 2)\n                .boxed()\n                .collect(Collectors.toList());\n\n        System.out.println(result);\n    }\n}\n```\n\nМы генерируем числа от 0 до 100 через `IntStream.rangeClosed`.  \nОтбираем нечетные фильтром.  \nПрименяем `map` для удвоения каждого числа.  \nДальше преобразуем к объектам (`.boxed()`) и собираем в список. ✅  \n\n{{< /details >}}"
  filepath = "odd-doubled"

[[tasks]]
  id = 7
  question = "Уникальные значения на складах"
  answer = "**Условие задачи:**  \n📌 Дана карта складов `Map<String, List<String>> storage`, где ключ — имя склада, а значение — список телефонов/номеров.  \nНужно с помощью **Stream API** вывести все **уникальные значения** (номера), присутствующие на складах.\n\n**Код:**\n\n```java\nMap<String, List<String>> storage = new HashMap<>();\nstorage.put(\"s1\", Arrays.asList(\"555-1123\", \"555-3389\"));\nstorage.put(\"s2\", Arrays.asList(\"555-1123\", \"555-5264\"));\nstorage.put(\"s3\", Arrays.asList(\"555-6654\", \"555-3242\"));\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `values()` у `Map`, чтобы получить коллекцию всех списков.  \n💡 Примените `flatMap(...)`, чтобы развернуть `List<List<String>>` в `Stream<String>`.  \n💡 Метод `distinct()` оставит только уникальные значения.  \n💡 Итог можно собрать в `Set` или просто вывести через `forEach(System.out::println)`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nstorage.values().stream()            // Stream<List<String>>\n    .flatMap(List::stream)           // Stream<String>\n    .distinct()                      // убираем дубликаты\n    .forEach(System.out::println);   // выводим уникальные значения\n```\n\n**Вывод:**\n\n```\n555-1123\n555-3389\n555-5264\n555-6654\n555-3242\n```\n\n🧠 **Пояснение:**\n\n- `flatMap(List::stream)` разворачивает все списки из `Map` в один поток строк.\n\n- `distinct()` автоматически удаляет повторяющиеся элементы.\n\n- Альтернатива — собрать результат в множество:\n\n\n```java\nSet<String> uniqueNumbers = storage.values().stream()\n    .flatMap(Collection::stream)\n    .collect(Collectors.toSet());\n```\n\n{{< /details >}}"
  filepath = "unique-values-in-storages"

[[tasks]]
  id = 8
  question = "Пройти по коллекции и вывести уникальные значения городов"
  answer = "**Условие задачи:**  \n📌 Дан список объектов `City`. Нужно:\n\n1. Пройти по коллекции и вывести значения.\n\n2. Создать **уникальную коллекцию строк** (имена городов) через Stream API.\n\n\n**Код:**\n\n```java\npublic class Main {\n    public static void main(String[] args) {\n        List<City> cities = getCity();\n        // Код сюда\n    }\n\n    private static List<City> getCity() {\n        return List.of(\n                new City(\"msk\"),\n                new City(\"msk\"),\n                new City(\"spb\"),\n                new City(\"ekb\")\n        );\n    }\n\n    public class City {\n        private String name;\n\n        public City(String name) {\n            this.name = name;\n        }\n\n        public String getName() {\n            return name;\n        }\n    }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для вывода — простой `forEach`.  \n💡 Для уникальных значений:  \n • нужно извлечь `city.getName()`,  \n • вызвать `distinct()`,  \n • собрать в `Set` или `List`.  \n💡 Чтобы сохранить порядок — используйте `Collectors.toCollection(LinkedHashSet::new)`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\npublic class Main {\n    public static void main(String[] args) {\n        List<City> cities = getCity();\n\n        // 1. Пройти по коллекции и вывести значения\n        cities.stream()\n                .map(City::getName)\n                .forEach(System.out::println);\n\n        // 2. Уникальная коллекция строк (через Stream API)\n        Set<String> uniqueNames = cities.stream()\n                .map(City::getName)              // достаем строковые значения\n                .distinct()                      // убираем дубликаты\n                .collect(Collectors.toCollection(LinkedHashSet::new));  // сохраняем порядок\n\n        System.out.println(\"Уникальные города:\");\n        uniqueNames.forEach(System.out::println);\n    }\n\n    private static List<City> getCity() {\n        return List.of(\n                new City(\"msk\"),\n                new City(\"msk\"),\n                new City(\"spb\"),\n                new City(\"ekb\")\n        );\n    }\n\n    public static class City {\n        private final String name;\n        public City(String name) { this.name = name; }\n        public String getName() { return name; }\n    }\n}\n```\n\n**Результат вывода:**\n\n```\nmsk\nmsk\nspb\nekb\nУникальные города:\nmsk\nspb\nekb\n```\n\n**Почему `LinkedHashSet`?**\n\n- `Set` обеспечивает уникальность.\n\n- `LinkedHashSet` дополнительно сохраняет порядок появления элементов — удобно для UI/логов.\n\n\n{{< /details >}}"
  filepath = "unique-cities-streams"

[[tasks]]
  id = 9
  question = "Поиск человека по имени (Stream API)"
  answer = "**Условие задачи:**  \n📌 Дан класс `Person` с полями `name` и `age`.  \nНужно реализовать метод, который **ищет человека по имени** и возвращает `Optional<Person>`.  \nРешение удобнее сделать через **Stream API**.\n\n**Код:**\n\n```java\nclass Person {\n    String name;\n    Integer age;\n}\n\nOptional<Person> findPersonByName(List<Person> persons, String name) {\n    // ...\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используй `stream()` + `filter(...)`.  \n💡 Для получения одного элемента подойдёт `findFirst()`.  \n💡 Лучше сравнивать строки через `Objects.equals(...)`, чтобы избежать `NullPointerException`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.List;\nimport java.util.Objects;\nimport java.util.Optional;\n\nOptional<Person> findPersonByName(List<Person> persons, String name) {\n    return persons.stream()\n            .filter(p -> Objects.equals(p.name, name))\n            .findFirst();\n}\n```\n\n{{< /details >}}"
  filepath = "find-person-by-name-stream"

[[tasks]]
  id = 10
  question = "Получить список наименований книг по каждому автору"
  answer = "**Условие задачи:**  \n📌 Есть коллекция `Book`, где:\n\n- `author` — автор\n\n- `names` — список названий книг\n\n\nНужно:\n\n1. Получить **мапу** вида  \n   `author -> список названий книг`\n\n2. ⭐ _Задача со звёздочкой_:  \n   вывести **уникальные** наименования книг для каждого автора.\n\n\n**Код:**\n\n```java\nimport java.util.List;\nimport java.util.Set;\n\npublic class Main {\n\n    private record Book(String author, List<String> names) { }\n\n    public static void main(String[] args) {\n\n        Set<Book> books = Set.of(\n                new Book(\"Author1\", List.of(\"Name1\")),\n                new Book(\"Author1\", List.of(\"Name2\")),\n                new Book(\"Author2\", List.of(\"Name3\")),\n                new Book(\"Author2\", List.of(\"Name4\", \"Name3\")),\n                new Book(\"Author3\", List.of(\"Name5\"))\n        );\n    }\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Нужно сгруппировать данные по `author` → `Collectors.groupingBy`.  \n💡 Так как у одного `Book` может быть **несколько названий**, потребуется `flatMap`.  \n💡 Для уникальности можно собрать данные в `Set`.  \n💡 Тип результата: `Map<String, Set<String>>` — самый логичный вариант.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n### ⭐ Вариант с уникальными названиями (рекомендуемый)\n\n```java\nimport java.util.Map;\nimport java.util.Set;\nimport java.util.stream.Collectors;\n\nMap<String, Set<String>> booksByAuthor =\n        books.stream()\n             .collect(Collectors.groupingBy(\n                     Book::author,\n                     Collectors.flatMapping(\n                             book -> book.names().stream(),\n                             Collectors.toSet()\n                     )\n             ));\n```\n\n**Результат:**\n\n```\nAuthor1 -> [Name1, Name2]\nAuthor2 -> [Name3, Name4]\nAuthor3 -> [Name5]\n```\n\n---\n\n### Вариант без уникальности (если требуется просто список)\n\n```java\nimport java.util.Map;\nimport java.util.List;\nimport java.util.stream.Collectors;\n\nMap<String, List<String>> booksByAuthor =\n        books.stream()\n             .collect(Collectors.groupingBy(\n                     Book::author,\n                     Collectors.flatMapping(\n                             book -> book.names().stream(),\n                             Collectors.toList()\n                     )\n             ));\n```\n\n---\n\n### 🧠 Краткое объяснение (как на собеседовании)\n\n- Я группирую `Book` по автору.\n\n- Так как названия лежат в `List<String>`, использую `flatMapping`, чтобы «расплющить» вложенные списки.\n\n- Для задачи со звёздочкой собираю в `Set`, чтобы убрать дубликаты (`Name3` у `Author2`).\n\n\n**Сложность:**\n\n- Время: `O(n)`\n\n- Память: `O(n)`\n\n\n{{< /details >}}"
  filepath = "books-by-author-streams"

[[tasks]]
  id = 11
  question = "Вывести строку в обратном порядке, каждую вторую букву"
  answer = "**Условие задачи:**  \n📌 Дан `String`.  \nНужно:\n\n- вывести строку **в обратном порядке**,\n\n- взять **каждую вторую букву**,\n\n- использовать **Stream API**,\n\n- **не использовать `reverse()`**,\n\n- **без дополнительных внешних структур данных**,\n\n- один конвейер вычислений.\n\n\n**Код:**\n\n```java\nString s = \"Spring Boot!\";\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Можно стримить индексы строки.  \n💡 Для разворота — идти от `length - 1` к `0`.  \n💡 Каждая вторая буква — фильтр по индексу.  \n💡 `mapToObj` → `charAt`.  \n💡 `forEach` или `collect`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nString result =\n        Stream.iterate(s.length() - 1, i -> i >= 0, i -> i - 2)\n              .map(s::charAt)\n              .map(String::valueOf)\n              .collect(Collectors.joining());\n\nSystem.out.println(result);\n```\n\n{{< /details >}}"
  filepath = "reverse-every-second-char"

[[tasks]]
  id = 12
  question = "Фильтрация и группировка имён"
  answer = "**Условие задачи:**\n\n```text\n     * Есть список строк с именами пользователей. Необходимо:\n     * Выбрать имена, начинающиеся с буквы «А».\n     * Сгруппировать имена по длине.\n     * Вернуть результат в виде Map<Integer, List<String>>, где ключ — длина имени, значение — список имен такой длины.\n     *\n     * Пример входных данных:\n     * [\"Анна\", \"Александр\", \"Андрей\", \"Антон\", \"Борис\", \"Богдан\", \"Мария\", \"Максим\", \"Артём\"]\n     *\n     * Ожидаемый результат:\n     * {4=[Анна], 5=[Антон, Артём], 6=[Андрей], 9=[Александр]}\n     */\n    public static Map<Integer, List<String>> processNames(List<String> names) {\n        return null;\n    }\n}\n```\n\n**Код:**\n\n```java\npublic class Main {\n\n    public static void main(String[] args) {\n        List<String> names = List.of(\"Анна\", \"Александр\", \"Андрей\", \"Антон\", \"Борис\", \"Богдан\", \"Мария\", \"Максим\", \"Артём\");\n        System.out.println(processNames(names));\n    }\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `stream()`.  \n💡 Отбор по первой букве — через `filter(...)`.  \n💡 Группировка выполняется с помощью `Collectors.groupingBy(...)`.  \n💡 Длина строки берётся через `String::length`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nimport java.util.List;\nimport java.util.Map;\nimport java.util.stream.Collectors;\n\npublic static Map<Integer, List<String>> processNames(List<String> names) {\n    return names.stream()\n            .filter(name -> name.startsWith(\"А\"))\n            .collect(Collectors.groupingBy(String::length));\n}\n```\n\n{{< /details >}}"
  filepath = "group-names"

[[tasks]]
  id = 13
  question = "Получить список без первых и последних трёх элементов"
  answer = "**Условие задачи:**  \n📌 Есть `List<String>` произвольной длины.  \nНужно **за одну стрим-операцию (один конвейер)** получить список:\n\n- без **первых 3 элементов**,\n\n- без **последних 3 элементов**.\n\n\n**Исходные данные (пример):**\n\n```java\nList<String> list = List.of(\n    \"a\",\"b\",\"c\",\"d\",\"e\",\"f\",\"g\",\"h\",\"i\",\"j\"\n);\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для пропуска первых элементов используется `skip(n)`.  \n💡 Для ограничения количества элементов используется `limit(n)`.  \n💡 Количество элементов после обрезки можно вычислить как  \n`list.size() - 6`.  \n💡 Весь код должен быть **в одном stream-конвейере**.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n```java\nList<String> result = list.stream()\n        .skip(3)\n        .limit(Math.max(0, list.size() - 6))\n        .toList();\n```\n\n{{< /details >}}"
  filepath = "skip-limit"

[[tasks]]
  id = 14
  question = "Найти средний возраст мужчин в списке"
  answer = "**Условие задачи:**  \n📌 Дан класс `Person` с полями `name`, `age`, `sex`. В `main` создаётся список `persons` и стрим. Нужно написать код, который найдёт **средний возраст всех мужчин** из списка.\n\n**Код:**\n\n```java\nList<Person> persons =\n        Arrays.asList(\n    new Person(\"\"Alice\"\", 25, \"\"female\"\"),\n    new Person(\"\"Bob\"\", 30, \"\"male\"\"),\n    new Person(\"\"Eve\"\", 35, \"\"female\"\"),\n    new Person(\"\"Jack\"\", 28, \"\"male\"\"));\ndouble averageAgeOfMales = persons.stream()\n````\n\n📌 **Пример 1:**  \nВход:  \n`persons = [(\"Alice\", 25, \"female\"), (\"Bob\", 30, \"male\"), (\"Eve\", 35, \"female\"), (\"Jack\", 28, \"male\")]`\n\nВыход:  \n`29.0`\n\n📌 **Пример 2:**  \nВход:  \n`persons = [(\"Bob\", 20, \"male\"), (\"Tom\", 40, \"male\")]`\n\nВыход:  \n`30.0`\n\n📌 **Пример 3:**  \nВход:  \n`persons = [(\"Alice\", 25, \"female\"), (\"Eve\", 35, \"female\")]`\n\nВыход:  \n`OptionalDouble.empty`\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `filter(...)` для отбора по `sex.equalsIgnoreCase(\"male\")`.  \n💡 Примените `mapToInt(Person::getAge)`, чтобы получить `IntStream`.  \n💡 Вызов `average()` вернёт `OptionalDouble`, учитывающий отсутствие элементов.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```java\nOptionalDouble averageAgeOfMales = persons.stream()\n    .filter(p -> p.getSex().equalsIgnoreCase(\"male\"))\n    .mapToInt(Person::getAge)\n    .average();\n```\n\n{{< /details >}}"
  filepath = "average-age-males"

