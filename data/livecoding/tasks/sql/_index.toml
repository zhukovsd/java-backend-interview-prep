[[tasks]]
  id = 1
  question = "Найди id юнитов, которые были проданы на сумму более 1000 рублей после 10:00 сегодняшнего дня. > \"2024-06-03 10:00\""
  answer = "```sql\n-- Создание таблицы Unit\nCREATE TABLE Unit (\n    Id INT PRIMARY KEY,\n    Price DECIMAL(10, 2)\n);\n\n-- Создание таблицы Sales\nCREATE TABLE Sales (\n    Id INT PRIMARY KEY,\n    Unit_id INT,\n    Sale_time TIMESTAMP,\n    FOREIGN KEY (Unit_id) REFERENCES Unit(Id)\n);\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Нужно выбрать `Unit.Id`, у которых сумма продаж превышает `1000` рублей.\n- Для фильтрации использовать `SUM(Price) > 1000` и `Sale_time > '2024-06-03 10:00'`.\n- Объединяем таблицы через `JOIN` по `Unit.Id = Sales.Unit_id`.\n- Используем `GROUP BY Unit_id`, чтобы агрегировать суммы.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT u.Id \nFROM Unit u\nJOIN Sales s ON u.Id = s.Unit_id\nWHERE s.Sale_time > '2024-06-03 10:00'\nGROUP BY u.Id\nHAVING SUM(u.Price) > 1000;\n```\n\nЭтот SQL-запрос выбирает идентификаторы юнитов (`Id`), у которых сумма продаж после 10:00 превышает 1000 рублей. ✅\n{{< /details >}}"
  filepath = "units-sold-after-time"

[[tasks]]
  id = 2
  question = "Написать SQL-запрос, чтобы вывести пользователей, у которых более одного автомобиля?"
  answer = "```sql\nCREATE TABLE USER (\n    id INT,\n    name VARCHAR(50)\n);\n\nINSERT INTO USER (id, name) VALUES\n(1, 'Ivan'),\n(2, 'Oleg'),\n(3, 'Anna'),\n(4, 'Ivan'),\n(5, 'Ted');\n\nCREATE TABLE CAR (\n    id INT,\n    model VARCHAR(50)\n);\n\nINSERT INTO CAR (id, model) VALUES\n(4422, 'Opel 1'),\n(4523, 'BMV 5'),\n(4612, 'VW'),\n(4853, 'BMV 6');\n\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Нам нужно **посчитать количество машин** у каждого пользователя.\n- Используем `GROUP BY user_id` для группировки по пользователям.\n- Применяем `HAVING COUNT(*) > 1`, чтобы оставить только тех, у кого **больше одной машины**.\n- Убедимся, что таблица `CAR` связана с `USER`, добавив `user_id` в `CAR`.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nДобавляем внешний ключ, если его нет:\n\n```sql\nALTER TABLE CAR ADD COLUMN user_id INT;\nALTER TABLE CAR ADD FOREIGN KEY (user_id) REFERENCES USER(id);\n```\n\nЗапрос для поиска пользователей с более чем одной машиной:\n\n```sql\nSELECT u.id, u.name, COUNT(c.id) AS car_count\nFROM USER u\nJOIN CAR c ON u.id = c.user_id\nGROUP BY u.id, u.name\nHAVING COUNT(c.id) > 1;\n```\n\n🔹 **Как это работает?**\n\n- `JOIN` объединяет таблицы `USER` и `CAR` по `user_id`.\n- `GROUP BY u.id, u.name` группирует данные по пользователям.\n- `COUNT(c.id)` считает количество машин у каждого пользователя.\n- `HAVING COUNT(c.id) > 1` оставляет только пользователей с **двумя и более машинами**.\n\n**Выход:**\n\n```\nid | name  | car_count\n----------------------\n1  | Ivan  | 2\n```\n\nЗначит, **у пользователя \"Ivan\" больше одной машины**. 🚗🚗\n{{< /details >}}"
  filepath = "multiple-cars-users"

[[tasks]]
  id = 3
  question = "Написать SQL-запрос для вывода имен студентов и университетов, где имена студентов начинаются на букву C?"
  answer = "{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n- Для решения задачи нужно использовать SQL **`LIKE`** с шаблоном, чтобы фильтровать имена студентов, начинающиеся на букву \"C\".\n- Чтобы получить имена студентов и университетов, необходимо использовать **`JOIN`** для объединения двух таблиц: одной для студентов и другой для университетов.\n- Пример запроса будет зависеть от структуры таблиц, предположим, что есть таблицы **students** (студенты) и **universities** (университеты).\n- Нам нужно соединить таблицу студентов с таблицей университетов по какому-то общему ключу, например, по **university_id**.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nПредположим, у нас есть две таблицы:\n\n```sql\nCREATE TABLE universities (\n    id INT PRIMARY KEY,\n    name VARCHAR(100)\n);\n\nCREATE TABLE students (\n    id INT PRIMARY KEY,\n    name VARCHAR(100),\n    university_id INT,\n    FOREIGN KEY (university_id) REFERENCES universities(id)\n);\n```\n\nЗапрос для вывода имен студентов и университетов, где имя студента начинается на \"C\":\n\n```sql\nSELECT s.name AS student_name, u.name AS university_name\nFROM students s\nJOIN universities u ON s.university_id = u.id\nWHERE s.name LIKE 'C%';\n```\n\n **Объяснение:**\n\n1. **`SELECT s.name AS student_name, u.name AS university_name`** — выбираем имена студентов и университетов.\n2. **`FROM students s`** — начинаем с таблицы студентов.\n3. **`JOIN universities u ON s.university_id = u.id`** — выполняем соединение с таблицей университетов по полю **university_id**.\n4. **`WHERE s.name LIKE 'C%'`** — фильтруем студентов, чьи имена начинаются на букву \"C\". Символ **`%`** означает любое количество символов после \"C\".\n\n **Ключевые моменты:**\n\n- Мы используем **`JOIN`** для объединения таблиц.\n- **`LIKE 'C%'`** позволяет фильтровать имена студентов, начинающиеся на \"C\".\n- Структура таблиц и ключи могут изменяться в зависимости от реальных данных, но основная логика запроса останется такой же.\n{{< /details >}}"
  filepath = "students-names-c"

[[tasks]]
  id = 4
  question = "Выбери профили, у которых больше 10 постов"
  answer = "```sql\n-- Таблица profile\nCREATE TABLE profile (\n    id BIGSERIAL PRIMARY KEY,\n    nickname VARCHAR,\n    registered_at TIMESTAMP\n);\n\n-- Таблица post\nCREATE TABLE post (\n    id BIGSERIAL PRIMARY KEY,\n    owner_id BIGINT REFERENCES profile (id),\n    body TEXT,\n    inserted_at TIMESTAMP,\n    likes_count INT\n);\n\n-- Таблица subscription_count\nCREATE TABLE subscription_count (\n    profile_id BIGINT REFERENCES profile (id) UNIQUE,\n    followers_count INT,\n    following_count INT\n);\n\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n📝 Нужно **подсчитать количество постов** у каждого пользователя и выбрать тех, у кого их больше 10.  \n🔗 Для этого **соединяем таблицу `profile` с `post` по `id`**.  \n📊 Используем **`GROUP BY` и `HAVING`** для фильтрации.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT p.id, p.nickname\nFROM profile p\nJOIN post po ON p.id = po.owner_id\nGROUP BY p.id, p.nickname\nHAVING COUNT(po.id) > 10;\n```\n\n📌 **Объяснение:**\n\n- **Соединяем `profile` и `post`** по `id` (соответствует `owner_id` в `post`).\n- **Группируем по `p.id, p.nickname`**, чтобы считать посты каждого профиля.\n- **Фильтруем `HAVING COUNT(po.id) > 10`**, оставляя только тех, у кого больше 10 постов.\n\n🔥 **Преимущества:**  \n✅ Эффективный **подсчет через `COUNT`**  \n✅ **Фильтрация на уровне запроса**, а не в коде  \n✅ **Простая адаптация** (можно добавить другие условия, например, по дате) 🚀\n{{< /details >}}"
  filepath = "profiles-more-than-10-posts"

[[tasks]]
  id = 5
  question = "Даны две таблицы Persosn и Payments. Один-ко-многим. Справа описание. Напишите запрос, который выводит name и value"
  answer = "```\nДаны две таблицы :\nPersons co списком работников\n\nid name\n1 Petya\n2 Vasya\n3 Kolya\n\nPayments с зарплатными начислениями ежемесячно\n\nid persons_id value\n1 1 10\n2 1 20\n3 3 15\n\n```\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n📝 Нужно **объединить две таблицы** (`Persons` и `Payments`) по `persons_id`.  \n🔗 Используем **`JOIN`** для связи.  \n📊 Выводим **имя (`name`) и сумму `value` для каждого платежа**.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT p.name, pay.value\nFROM Persons p\nJOIN Payments pay ON p.id = pay.persons_id;\n```\n\n📌 **Объяснение:**\n\n- **`JOIN Persons p ON p.id = pay.persons_id`** связывает таблицы по `id`.\n- **Выбираем `p.name` и `pay.value`** – имя работника и его зарплату.\n\n🔥 **Вывод результата**:\n\n|name|value|\n|---|---|\n|Petya|10|\n|Petya|20|\n|Kolya|15|\n\n✅ **Простой и эффективный запрос** 🚀\n{{< /details >}}"
  filepath = "persons-payments"

[[tasks]]
  id = 6
  question = "Необходимо написать sql запрос, который вернет минимальную и максимальную зарплату по всем отделам среди не уволенных сотрудников"
  answer = "```\nВ базе данных есть две таблицы: \"\"units\"\" - подразделения компании и \"\"employees\"\" - сотрудники компании\nunits:\nid int // Primary Key\nname text // (название unit)\nemployees:\nid int // Primary Key\nunit_id int // Foreign Key -> units::id\nsalary numeric // (зарплата)\nfired boolean // (флаг уволен)\n\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n🔗 Нужно **объединить** таблицы `units` и `employees` по `unit_id`.  \n⚡ Отфильтровать **не уволенных** сотрудников (`fired = FALSE`).  \n📊 Использовать **`GROUP BY`**, чтобы агрегировать зарплаты по отделам.  \n📈 **`MIN()` и `MAX()`** помогут найти минимальную и максимальную зарплату.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT \n    u.id AS unit_id,\n    u.name AS unit_name,\n    MIN(e.salary) AS min_salary,\n    MAX(e.salary) AS max_salary\nFROM units u\nJOIN employees e ON u.id = e.unit_id\nWHERE e.fired = FALSE\nGROUP BY u.id, u.name;\n```\n\n📌 **Объяснение:**\n\n- **`JOIN employees e ON u.id = e.unit_id`** – связываем сотрудников с их отделами.\n- **`WHERE e.fired = FALSE`** – исключаем уволенных сотрудников.\n- **`MIN(e.salary)` и `MAX(e.salary)`** – вычисляем минимальную и максимальную зарплаты.\n- **`GROUP BY u.id, u.name`** – группируем данные по отделам.\n\n🔥 **Вывод примера:**\n\n|unit_id|unit_name|min_salary|max_salary|\n|---|---|---|---|\n|1|IT|50000|150000|\n|2|HR|40000|90000|\n\n✅ **Готово!** 🚀\n{{< /details >}}"
  filepath = "min-max-salary"

[[tasks]]
  id = 7
  question = "Вывести id классов, у которых нет ни одного студента (без подзапросов)?"
  answer = "```\n\"Есть 2 таблицы student и class\nstudent:\nid - автоинкрементный первичный ключ,\nclass_id - id класса в котором числится студент\nclass:\nid - автоинкрементный первичный ключ\nНужно написать запрос для вывода id классов,\nу которых нет ни одного студента еще.\nОграничения: Запрос надо написать без использования подзапросов.\"\n\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n🎯 Нужно выбрать классы, в которых **нет студентов**.  \n🔗 Таблицы **`class`** и **`student`** связаны через `class_id`.  \n🛑 Важно **отфильтровать** те классы, у которых `student.id IS NULL`.  \n📊 Используем **`LEFT JOIN`**, чтобы увидеть классы **без соответствий** в `student`.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT c.id \nFROM class c\nLEFT JOIN student s ON c.id = s.class_id\nWHERE s.id IS NULL;\n```\n\n📌 **Объяснение:**\n\n- **`LEFT JOIN`** – соединяет все классы и подставляет `NULL` в `s.id`, если студентов нет.\n- **`WHERE s.id IS NULL`** – выбираем только те классы, в которых студентов **нет**.\n\n✅ **Готово!** 🚀\n{{< /details >}}"
  filepath = "empty-classes"

[[tasks]]
  id = 8
  question = "Получить id пользователей, потративших более 1 000 000 рублей (без подзапросов)?"
  answer = "```\nПредставим, что у нас есть свой магазин. К нам приходят люди и покупают у нас что-то. Мы храним всю историю покупок всех пользователей в таблице в базе данных. Таблица выглядит следующим образом:\norders:\nid - автоинкрементный первичный ключ,\nuser_id - идентификатор пользователя\namount - сумма покупки которую совершил пользователь\n\nМы оперируем только этой одной таблицей и считаем, что других таблиц нет. Требуется написать SQL запрос для получения идентификаторов всех пользователей, которые совершили покупки за все время на сумму больше чем на 1 000 000 рублей.\nОграничения: Запрос надо написать без использования подзапросов.\n\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n📊 Нужно найти **пользователей**, чья общая сумма покупок **больше 1 000 000**.  \n🔗 Таблица `orders` содержит **user_id** и **amount** (сумма покупки).  \n🧮 Нам нужно **суммировать** `amount` по каждому `user_id`.  \n🚀 Используем **`GROUP BY`** для группировки и **`HAVING`** для фильтрации.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT user_id \nFROM orders\nGROUP BY user_id\nHAVING SUM(amount) > 1000000;\n```\n\n📌 **Объяснение:**\n\n- **`GROUP BY user_id`** – группируем заказы по `user_id`.\n- **`SUM(amount)`** – считаем общую сумму покупок каждого пользователя.\n- **`HAVING SUM(amount) > 1000000`** – отбираем только тех, кто **потратил больше миллиона**.\n\n✅ **Готово!** 🛍🔥\n{{< /details >}}"
  filepath = "big-spenders"

[[tasks]]
  id = 9
  question = "БД таблица users, два столбца: id number autoincrement unique, name varchar not unique. Написать запрос, чтобы вывелись имена, которые встречаются 2 и более раз"
  answer = "{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n🔎 Нужно найти имена, которые встречаются **2 и более раз** в таблице `users`.  \n📊 Мы будем группировать по полю `name` и фильтровать по количеству таких значений.  \n🚀 Для подсчета количества будем использовать **`COUNT(name)`**.  \n📌 Для фильтрации количества используем **`HAVING`**.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT name\nFROM users\nGROUP BY name\nHAVING COUNT(name) >= 2;\n```\n\n📌 **Объяснение:**\n\n- **`GROUP BY name`** – группируем по имени, чтобы подсчитать количество одинаковых значений.\n- **`COUNT(name)`** – считаем количество повторений каждого имени.\n- **`HAVING COUNT(name) >= 2`** – выбираем только те имена, которые встречаются **2 и более раз**.\n\n✅ **Готово!** 🎉\n{{< /details >}}"
  filepath = "duplicate-names"

[[tasks]]
  id = 10
  question = "Выбрать всех клиентов, у которых больше трех заказов с ценой > 10"
  answer = "```\nCustomer\n- Id\n- name\n\nOrder\n- Id\n- customer_id\n- Price\n\n```\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n🔍 Мы должны выбрать всех клиентов, которые сделали **более трех заказов**, где **цена** каждого заказа больше **10**.  \n📊 Для этого нужно группировать заказы по **`customer_id`** и подсчитывать количество заказов с ценой выше 10.  \n📌 Используем **`HAVING`** для фильтрации по количеству заказов.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT o.customer_id, c.name\nFROM Order o\nJOIN Customer c ON o.customer_id = c.Id\nWHERE o.Price > 10\nGROUP BY o.customer_id, c.name\nHAVING COUNT(o.Id) > 3;\n```\n\n📌 **Объяснение:**\n\n- **`JOIN`** соединяет таблицы **`Order`** и **`Customer`** по полю **`customer_id`**.\n- **`WHERE o.Price > 10`** фильтрует только те заказы, где цена больше 10.\n- **`GROUP BY o.customer_id, c.name`** группирует по **`customer_id`** и имени клиента.\n- **`HAVING COUNT(o.Id) > 3`** выбирает только тех клиентов, у которых больше 3 заказов с ценой больше 10.\n\n✅ **Задача решена!** 🎯\n{{< /details >}}"
  filepath = "customers-multiple-orders"

[[tasks]]
  id = 11
  question = "Написать запрос.Всего 10 пользователей. В выводе 5 пользователей в статусе Новый, 3 пользователя в статусе Работает. Куда делось еще 2 пользователя?"
  answer = "```\nСколько пользователей в каком статусе?\nРезультат должен быть в виде: Название статуса, Количество пользователей в этом статусе\n\nUser\nid\nname\nstatus_id\n\nStatus\nid\nname\n\n```\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n📊 Задача требует подсчета количества пользователей для каждого статуса.  \n🔍 Мы можем использовать **`JOIN`** для объединения таблиц **`User`** и **`Status`**, чтобы получить информацию о пользователях и их статусах.  \n🔑 Используем **`GROUP BY`** для группировки по статусу и подсчета количества пользователей в каждом статусе.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT s.name AS status_name, COUNT(u.id) AS user_count\nFROM User u\nJOIN Status s ON u.status_id = s.id\nGROUP BY s.name;\n```\n\n📌 **Объяснение:**\n\n- **`JOIN`** соединяет таблицы **`User`** и **`Status`** по полю **`status_id`**.\n- **`GROUP BY s.name`** группирует по названию статуса.\n- **`COUNT(u.id)`** подсчитывает количество пользователей в каждом статусе.\n\n📊 **Результат:**\n\n- В выводе будут отображены статусы с количеством пользователей в этих статусах. Если пользователи не попали в вывод, это может означать, что они имеют статус, не представленный в запросе. Возможно, они имеют статус, который не был учтен в подсчете (например, был удален или имеет другой статус, не указанный в выводе).\n\n🎯 **Задача решена!**\n{{< /details >}}"
  filepath = "missing-users"

[[tasks]]
  id = 12
  question = "Покажите название компании, название отдела и количество сотрудников в отделе"
  answer = "**Условие задачи:**  \n🔍 **Написать SQL-запрос, который покажет название компании, название отдела и количество сотрудников в этом отделе.**\n\n```sql\nCREATE table if not exists company (\n    id uuid primary key,\n    name_ varchar NOT NULL\n);\n\nCREATE table if not exists department (\n    id uuid primary key,\n    name_ varchar NOT NULL,\n    company_id uuid NOT NULL,\n    CONSTRAINT department_fk FOREIGN KEY (company_id) REFERENCES company(id)\n);\n\nCREATE table if not exists employee (\n    id uuid primary key,\n    name_ varchar NOT NULL,\n    department_id uuid NOT NULL,\n    CONSTRAINT employee_fk FOREIGN KEY (department_id) REFERENCES department(id)\n);\n\ninsert into company (id, name_) values(1, 'Company 1') ON CONFLICT DO NOTHING;\ninsert into company (id, name_) values(2, 'Company 2') ON CONFLICT DO NOTHING;\ninsert into company (id, name_) values(3, 'Company 3') ON CONFLICT DO NOTHING;\n\ninsert into department (id, name_, company_id) values(1, 'Department 1', 1) ON CONFLICT DO NOTHING;\ninsert into department (id, name_, company_id) values(2, 'Department 2', 1) ON CONFLICT DO NOTHING;\ninsert into department (id, name_, company_id) values(3, 'Department 3', 2) ON CONFLICT DO NOTHING;\n\ninsert into employee (id, name_, department_id) values(1, 'Employee 1', 1) ON CONFLICT DO NOTHING;\ninsert into employee (id, name_, department_id) values(2, 'Employee 2', 2) ON CONFLICT DO NOTHING;\ninsert into employee (id, name_, department_id) values(3, 'Employee 3', 3) ON CONFLICT DO NOTHING;\n\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Нужно использовать `JOIN` для соединения таблиц `company`, `department` и `employee`.  \n💡 Используйте `COUNT(*)` для подсчета количества сотрудников в каждом отделе.  \n💡 Группировка `GROUP BY` поможет сгруппировать результаты по компании и отделу.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT \n    c.name_ AS company_name,\n    d.name_ AS department_name,\n    COUNT(e.id) AS employee_count\nFROM company c\nJOIN department d ON c.id = d.company_id\nLEFT JOIN employee e ON d.id = e.department_id\nGROUP BY c.name_, d.name_\nORDER BY c.name_, d.name_;\n```\n\n✅ **Объяснение решения:**\n\n- Соединяем `company` и `department` по `company_id`.\n- Используем `LEFT JOIN`, чтобы учесть отделы без сотрудников.\n- `COUNT(e.id)` считает количество сотрудников в каждом отделе.\n- `GROUP BY` группирует данные по названию компании и отдела.\n- `ORDER BY` сортирует результат по компании и отделу.\n\n🚀 **Теперь запрос выдаст список всех компаний, их отделов и количество сотрудников в каждом отделе!** 🔥\n{{< /details >}}"
  filepath = "company-department-employee-count"

[[tasks]]
  id = 13
  question = "Пользователь и его машины: связь в базе данных"
  answer = "**Условие задачи:**  \n🔍 **Создать структуру базы данных, где один пользователь может владеть несколькими машинами, а каждая машина принадлежит только одному пользователю.**\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 В `CAR` должна быть внешняя связь (`FOREIGN KEY`) с `USER`, указывающая на владельца.  \n💡 Каждый `USER` может иметь несколько записей в `CAR`, но каждая `CAR` должна быть привязана к одному `USER`.  \n💡 Можно использовать `JOIN`, чтобы получить информацию о пользователях и их автомобилях.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Создаем таблицу пользователей\nCREATE TABLE USER (\n    id INT PRIMARY KEY,\n    name VARCHAR(50) NOT NULL\n);\n\n-- Заполняем таблицу пользователей\nINSERT INTO USER (id, name) VALUES\n(1, 'Ivan'),\n(2, 'Oleg'),\n(3, 'Anna'),\n(4, 'Ivan'),\n(5, 'Ted');\n\n-- Создаем таблицу автомобилей\nCREATE TABLE CAR (\n    id INT PRIMARY KEY,\n    model VARCHAR(50) NOT NULL,\n    user_id INT NOT NULL,\n    FOREIGN KEY (user_id) REFERENCES USER(id) ON DELETE CASCADE\n);\n\n-- Заполняем таблицу автомобилей\nINSERT INTO CAR (id, model, user_id) VALUES\n(4422, 'Opel 1', 1),\n(4523, 'BMW 5', 2),\n(4612, 'VW', 3),\n(4853, 'BMW 6', 4);\n\n-- Запрос для получения списка пользователей и их машин\nSELECT \n    u.id AS user_id, \n    u.name AS user_name, \n    c.id AS car_id, \n    c.model AS car_model\nFROM USER u\nLEFT JOIN CAR c ON u.id = c.user_id\nORDER BY u.id;\n```\n\n✅ **Объяснение решения:**\n\n- Создаем таблицу `USER`, где `id` — первичный ключ.\n- Создаем таблицу `CAR`, где `user_id` — внешний ключ, связывающий машину с пользователем.\n- Добавляем `ON DELETE CASCADE`, чтобы при удалении пользователя удалялись и его машины.\n- `LEFT JOIN` позволяет вывести всех пользователей, даже если у них нет машины.\n- `ORDER BY u.id` упорядочивает результат по пользователям.\n\n🚀 **Теперь можно легко получать информацию о пользователях и их машинах!** 🔥\n{{< /details >}}"
  filepath = "user-car-relationship"

[[tasks]]
  id = 14
  question = "Поиск пользователей, у которых больше одной машины"
  answer = "**Условие задачи:**  \n🚗 **Вывести имена пользователей, у которых более одного автомобиля.**\n\n```sql\n-- Создаем таблицу USER\nCREATE TABLE USER (\n    id INT PRIMARY KEY,\n    name VARCHAR(50) NOT NULL\n);\n\n-- Вставляем данные в таблицу USER\nINSERT INTO USER (id, name) VALUES\n(1, 'Ivan'),\n(2, 'Oleg'),\n(3, 'Anna'),\n(4, 'Ivan'),\n(5, 'Ted');\n\n-- Создаем таблицу CAR\nCREATE TABLE CAR (\n    id INT PRIMARY KEY,\n    model VARCHAR(50) NOT NULL,\n    user_id INT NOT NULL,\n    FOREIGN KEY (user_id) REFERENCES USER(id)\n);\n\n-- Вставляем данные в таблицу CAR\nINSERT INTO CAR (id, model, user_id) VALUES\n(4422, 'Opel 1', 1),\n(4523, 'BMV 5', 2),\n(4612, 'VW', 3),\n(4853, 'BMV 6', 4);\n```\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Нам нужно сгруппировать данные по `user_id`.  \n💡 Используем `HAVING` для фильтрации пользователей, у которых количество автомобилей (`COUNT(user_id)`) больше 1.  \n💡 Присоединяем таблицу `USER`, чтобы получить имена.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT u.name \nFROM USER u\nJOIN CAR c ON u.id = c.user_id\nGROUP BY u.id, u.name\nHAVING COUNT(c.id) > 1;\n```\n\n✅ **Объяснение решения:**\n\n- Используем `JOIN`, чтобы соединить пользователей и их автомобили.\n- Группируем результат по `user_id`, так как нам нужно считать количество машин у каждого пользователя.\n- `HAVING COUNT(c.id) > 1` фильтрует только тех, у кого машин больше одной.\n\n🔥 Теперь запрос вернет список пользователей, у которых больше одного автомобиля! 🚀\n{{< /details >}}"
  filepath = "users-multiple-cars"

[[tasks]]
  id = 15
  question = "Товары с максимальной ценой в каждой категории товаров"
  answer = "**Условие задачи:**  \n📊 **Составить SQL-запрос, который выводит наименования товаров с максимальной ценой в каждой категории.**\n\n📌 **Таблица `Prices` (данные о товарах):**\n\n- `Name` – название товара\n- `Category` – категория товара\n- `Price` – цена товара\n\n🚀 **Требуется вернуть:**\n\n- `Category`\n- `Name` (товар с максимальной ценой в категории)\n- `Price` (максимальная цена в категории)\n\n\n```text\nДана таблица Prices в БД.\nName        Category             Price\n--------------------------------------\nАпельсин    Фрукты               50\nМандарин    Фрукты               45\nЯблоко      Фрукты               30\nОгурец      Овощи                35\nТомат       Овощи                40\nКартофель   Овощи                25\nМолоко      Молочные продукты    30\nТворог      Молочные продукты    40\n\n\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Для каждой категории находим **максимальную цену** с помощью `MAX(Price)`.  \n💡 Затем выбираем товары, у которых `Price` равно найденному максимуму.  \n💡 Используем `JOIN` или `WHERE` с подзапросом.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT p1.Category, p1.Name, p1.Price\nFROM Prices p1\nWHERE p1.Price = (\n    SELECT MAX(p2.Price) \n    FROM Prices p2 \n    WHERE p1.Category = p2.Category\n);\n```\n\n✅ **Объяснение решения:**\n\n- Подзапрос `SELECT MAX(p2.Price) FROM Prices p2 WHERE p1.Category = p2.Category` находит **максимальную цену в каждой категории**.\n- Основной запрос выбирает **товары с этой максимальной ценой**.\n- Если в категории несколько товаров с одинаковой максимальной ценой, они **все попадут в результат**.\n\n🔥 Теперь запрос вернет товары с самой высокой ценой в каждой категории! 🚀\n{{< /details >}}"
  filepath = "max-price-by-category"

[[tasks]]
  id = 16
  question = "Поиск клиентов в базе данных по INN и KPP"
  answer = "**Условие задачи:**  \n📌 **Написать SQL-запрос для поиска всех клиентов по `inn` и `kpp` в таблице `KF_ADAPTER_R_CLIENT`.**\n\n- Используется **простая выборка** по одной таблице.\n- В таблице `KF_ADAPTER_R_CLIENT` есть информация о клиентах, включая `inn` (ИНН) и `kpp` (КПП).\n\n\n```sql\nCREATE TABLE KF_ADAPTER_R_CLIENT (\n    id SERIAL PRIMARY KEY,\n    abs_id VARCHAR(255),\n    branch_id VARCHAR(255),\n    abs_branch_id VARCHAR(255),\n    short_name VARCHAR(255),\n    inn VARCHAR(12),\n    kpp VARCHAR(9),\n    sign_count INT,\n    deleted BOOLEAN\n);\n\nCREATE TABLE KF_ADAPTER_R_DELEGATE (\n    id SERIAL PRIMARY KEY,\n    client_id INT,\n    abs_id VARCHAR(255),\n    user_id VARCHAR(255),\n    full_name VARCHAR(255),\n    phone VARCHAR(15),\n    sign_role VARCHAR(50),\n    deleted BOOLEAN,\n    FOREIGN KEY (client_id) REFERENCES KF_ADAPTER_R_CLIENT(id)\n);\n\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Для поиска клиентов используем `WHERE`.  \n💡 `inn` и `kpp` могут иметь разные значения, поэтому проверяем их **совместно**.  \n💡 Если нужно искать клиентов **с определенными значениями**, используем `=`.  \n💡 Если необходимо найти клиентов с **похожими значениями**, используем `LIKE`.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT * \nFROM KF_ADAPTER_R_CLIENT \nWHERE inn = '7701234567' \nAND kpp = '770101001';\n```\n\n✅ **Объяснение решения:**\n\n- Запрос выбирает **все колонки** (`*`) из таблицы `KF_ADAPTER_R_CLIENT`.\n- Фильтрация выполняется по точному совпадению **ИНН** и **КПП** (`WHERE inn = ... AND kpp = ...`).\n- Если **нужен поиск по частичному совпадению**, можно использовать `LIKE`:\n\n```sql\nSELECT * \nFROM KF_ADAPTER_R_CLIENT \nWHERE inn LIKE '770%' \nAND kpp LIKE '7701%';\n```\n\n🔥 Теперь можно находить клиентов по `inn` и `kpp` быстро и просто! 🚀\n{{< /details >}}"
  filepath = "find-clients-by-inn-kpp"

[[tasks]]
  id = 17
  question = "Делегаты клиентов: найти по INN/KPP, вывести имя и телефон"
  answer = "**Условие задачи:**  \n📌 **Написать SQL-запрос для получения списка делегатов (`KF_ADAPTER_R_DELEGATE`) по `inn` и `kpp` из таблицы `KF_ADAPTER_R_CLIENT`.**\n\n- Необходимо вывести только `full_name` (полное имя) и `phone` (телефон).\n- Таблицы связаны по `client_id`.\n\n\n```sql\nCREATE TABLE KF_ADAPTER_R_CLIENT (\n    id SERIAL PRIMARY KEY,\n    abs_id VARCHAR(255),\n    branch_id VARCHAR(255),\n    abs_branch_id VARCHAR(255),\n    short_name VARCHAR(255),\n    inn VARCHAR(12),\n    kpp VARCHAR(9),\n    sign_count INT,\n    deleted BOOLEAN\n);\n\nCREATE TABLE KF_ADAPTER_R_DELEGATE (\n    id SERIAL PRIMARY KEY,\n    client_id INT,\n    abs_id VARCHAR(255),\n    user_id VARCHAR(255),\n    full_name VARCHAR(255),\n    phone VARCHAR(15),\n    sign_role VARCHAR(50),\n    deleted BOOLEAN,\n    FOREIGN KEY (client_id) REFERENCES KF_ADAPTER_R_CLIENT(id)\n);\n\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Связь между таблицами идет по **client_id**.  \n💡 Для соединения таблиц используем `JOIN`.  \n💡 Фильтруем данные по `inn` и `kpp` из таблицы `KF_ADAPTER_R_CLIENT`.  \n💡 Если необходимо исключить удаленных (`deleted = TRUE`), добавляем соответствующий фильтр.\n\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT d.full_name, d.phone \nFROM KF_ADAPTER_R_DELEGATE d\nJOIN KF_ADAPTER_R_CLIENT c ON d.client_id = c.id\nWHERE c.inn = '7701234567' \nAND c.kpp = '770101001'\nAND d.deleted = FALSE;\n```\n\n✅ **Объяснение решения:**\n\n- **`JOIN`** связывает таблицы `KF_ADAPTER_R_CLIENT` и `KF_ADAPTER_R_DELEGATE` по `client_id`.\n- **Фильтр по `inn` и `kpp`** выбирает только клиентов с указанными значениями.\n- **`d.deleted = FALSE`** исключает удаленных делегатов.\n- **Выбираем только нужные поля**: `full_name` и `phone`.\n\n🔥 Теперь можно получать список делегатов по ИНН и КПП! 🚀\n{{< /details >}}"
  filepath = "find-delegates-by-inn-kpp"

[[tasks]]
  id = 18
  question = "Топ-10 телефонов, получивших больше всего SMS"
  answer = "**Условие задачи:**  \n📌 **Написать SQL-запрос для получения номеров телефонов (`phone`), которые получили более одной SMS.**\n\n- Отсортировать список по убыванию количества сообщений.\n- Оставить только **топ-10** номеров с наибольшим количеством полученных SMS.\n\n```sql\ntable: sms\nid   | phone      | message\n1    | 9876552222 | some message\n2    | 9876552222 | some message\n3    | 9876552234 | another message\n\n```\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Используй `GROUP BY`, чтобы сгруппировать данные по `phone`.  \n💡 `HAVING COUNT(*) > 1` поможет отфильтровать только те номера, у которых более одной SMS.  \n💡 `ORDER BY COUNT(*) DESC` обеспечит сортировку от большего количества к меньшему.  \n💡 `LIMIT 10` позволит оставить только топ-10 номеров.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT phone, COUNT(*) AS sms_count\nFROM sms\nGROUP BY phone\nHAVING COUNT(*) > 1\nORDER BY sms_count DESC\nLIMIT 10;\n```\n\n✅ **Объяснение решения:**\n\n- **`GROUP BY phone`** – группируем записи по номерам телефонов.\n- **`COUNT(*) AS sms_count`** – считаем количество сообщений для каждого номера.\n- **`HAVING COUNT(*) > 1`** – фильтруем только те номера, у которых больше одной SMS.\n- **`ORDER BY sms_count DESC`** – сортируем по убыванию количества сообщений.\n- **`LIMIT 10`** – оставляем только 10 самых популярных получателей.\n\n🔥 Теперь можно быстро найти топ-10 номеров, получивших больше всего SMS! 📲🚀\n{{< /details >}}"
  filepath = "top-sms-recipients"

[[tasks]]
  id = 19
  question = "Пользователи без заказов"
  answer = "**Условие задачи:**  \n📌 **Написать SQL-запрос для получения всех `id` пользователей из таблицы `users`, у которых отсутствуют заказы в таблице `orders`.**  \n\n- Таблица `users` содержит поле `id`.  \n- Таблица `orders` содержит поля `userId` и `orderId`.  \n- Задача — найти всех пользователей, у которых нет связанных записей в `orders`.\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Для решения задачи можно использовать конструкцию `LEFT JOIN` и фильтровать по NULL.  \n💡 Альтернативное решение — применить условие `NOT EXISTS` для исключения пользователей с заказами.  \n💡 Оба подхода позволяют корректно выбрать пользователей, у которых нет записей в таблице `orders`.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Решение 1: Использование LEFT JOIN\nSELECT u.id\nFROM users u\nLEFT JOIN orders o ON u.id = o.userId\nWHERE o.userId IS NULL;\n\n-- Решение 2: Использование NOT EXISTS\nSELECT u.id\nFROM users u\nWHERE NOT EXISTS (\n    SELECT 1 \n    FROM orders o \n    WHERE o.userId = u.id\n);\n````\n\n✅ **Объяснение решения:**\n\n- **Решение 1:**  \n    Запрос выполняет LEFT JOIN таблицы `users` с таблицей `orders`. Если для пользователя не найдено соответствующей записи, значение `o.userId` будет NULL, что и используется в условии WHERE для выборки таких пользователей.\n    \n- **Решение 2:**  \n    Используется подзапрос с конструкцией `NOT EXISTS`, который проверяет отсутствие записей в таблице `orders` для каждого пользователя из таблицы `users`.\n    \n\n🔥 Теперь можно эффективно находить всех пользователей без заказов! {{< /details >}}"
  filepath = "users-without-orders"

[[tasks]]
  id = 20
  question = "Получение последних N новостей и всех их комментариев"
  answer = "**Условие задачи:**  \n📌 **Написать один SQL-запрос, который вернёт N последних новостей из таблицы `news` вместе со всеми их комментариями из таблицы `comments`.**  \n\n- Таблица `news` имеет поля: `id` (integer auto_increment).  \n- Таблица `comments` имеет поля: `id` (integer auto_increment), `news_id` (integer).  \n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Можно воспользоваться подзапросом, который выбирает последние N новостей, а затем выполнить LEFT JOIN с таблицей `comments` для получения всех комментариев к выбранным новостям.  \n💡 Альтернативный вариант — использовать CTE (Common Table Expression) для отбора последних новостей, а затем присоединить к ним комментарии.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Решение 1: Использование подзапроса с LEFT JOIN\nSELECT n.*, c.*\nFROM (\n    SELECT *\n    FROM news\n    ORDER BY id DESC\n    LIMIT N  -- подставьте нужное количество новостей\n) n\nLEFT JOIN comments c ON n.id = c.news_id;\n\n-- Решение 2: Использование CTE (Common Table Expression)\nWITH latest_news AS (\n    SELECT *\n    FROM news\n    ORDER BY id DESC\n    LIMIT N  -- подставьте нужное количество новостей\n)\nSELECT ln.*, c.*\nFROM latest_news ln\nLEFT JOIN comments c ON ln.id = c.news_id;\n````\n\n✅ **Объяснение решения:**\n\n- **Решение 1:**\n    \n    - Подзапрос `n` выбирает последние N записей из таблицы `news`, сортируя их по убыванию `id`.\n        \n    - LEFT JOIN с таблицей `comments` позволяет получить все комментарии, относящиеся к каждой новости.\n        \n- **Решение 2:**\n    \n    - CTE `latest_news` определяется для выбора последних N новостей.\n        \n    - Основной запрос присоединяет комментарии по полю `news_id`, связывая их с новостями из CTE.\n        \n\n🔥 Оба решения позволяют получить нужные данные одним запросом, эффективно комбинируя новости и их комментарии! {{< /details >}}"
  filepath = "n-last-news-with-comments"

[[tasks]]
  id = 21
  question = "Выгрузка всех новостей с комментариями при большом объеме данных"
  answer = "**Условие задачи:**  \n📌 **Необходимо получить все записи из таблицы `news` и соответствующие комментарии из таблицы `comments`, даже при большом объеме данных.**  \n\n- Таблица `news` содержит новости (`id` — автоинкремент).  \n- Таблица `comments` содержит комментарии (`news_id` ссылается на `news.id`).  \n- Допустим, данных **очень много**, важно избежать перегрузки.\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Используй **постраничную выборку (pagination)**, чтобы обрабатывать данные частями.  \n💡 Важно делать **LEFT JOIN**, чтобы не потерять новости без комментариев.  \n💡 Можно использовать **потоковую обработку** или **batch-загрузку** на стороне кода.  \n💡 В PostgreSQL можно использовать `FETCH NEXT`, в MySQL — `LIMIT` и `OFFSET`.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Пример базового запроса с LEFT JOIN\nSELECT n.*, c.*\nFROM news n\nLEFT JOIN comments c ON n.id = c.news_id;\n````\n\n✅ **Как сделать выгрузку эффективной при большом объеме данных:**\n\n1. **Использовать постраничную загрузку:**\n    \n\n```sql\n-- Пример с LIMIT и OFFSET\nSELECT n.*, c.*\nFROM news n\nLEFT JOIN comments c ON n.id = c.news_id\nORDER BY n.id\nLIMIT 1000 OFFSET 0; -- на следующей итерации OFFSET будет 1000, затем 2000 и т.д.\n```\n\n2. **Использовать потоковую обработку на сервере (например, JDBC или ORM):**\n    \n\n```java\nPreparedStatement stmt = connection.prepareStatement(\n    \"SELECT n.*, c.* FROM news n LEFT JOIN comments c ON n.id = c.news_id ORDER BY n.id\",\n    ResultSet.TYPE_FORWARD_ONLY,\n    ResultSet.CONCUR_READ_ONLY\n);\nstmt.setFetchSize(1000);\nResultSet rs = stmt.executeQuery();\n```\n\n3. **Использовать выгрузку по диапазону `id` (например, `WHERE n.id BETWEEN ...`), чтобы избежать OFFSET.**\n    \n\n```sql\nSELECT n.*, c.*\nFROM news n\nLEFT JOIN comments c ON n.id = c.news_id\nWHERE n.id BETWEEN 10001 AND 11000\nORDER BY n.id;\n```\n\n🔥 Таким образом, даже при большом количестве строк можно **гибко управлять производительностью и ресурсами**, не перегружая систему. {{< /details >}}"
  filepath = "export-news-with-comments"

[[tasks]]
  id = 22
  question = "Топ-3 посетителя по числу визитов"
  answer = "**Условие задачи:**  \n📌 Есть таблица `visits(visit_id, visitor_name, timestamp)`.  \nНеобходимо вывести имена трёх посетителей, у которых наибольшее количество записей в таблице (визитов).\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Используйте `GROUP BY visitor_name` для подсчёта визитов по каждому человеку.  \n💡 Отсортируйте результат по убыванию количества визитов (`COUNT(*) DESC`).  \n💡 Примените `LIMIT 3` для выборки трех записей.  \n💡 Альтернативно можно воспользоваться оконной функцией `ROW_NUMBER()` или `RANK()`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Решение 1: GROUP BY + ORDER BY + LIMIT\nSELECT\n  visitor_name,\n  COUNT(*) AS visit_count\nFROM visits\nGROUP BY visitor_name\nORDER BY visit_count DESC\nLIMIT 3;\n```\n\n```sql\n-- Решение 2: Оконная функция ROW_NUMBER()\nSELECT visitor_name, visit_count\nFROM (\n  SELECT\n    visitor_name,\n    COUNT(*) OVER (PARTITION BY visitor_name) AS visit_count,\n    ROW_NUMBER() OVER (\n      PARTITION BY visitor_name\n      ORDER BY COUNT(*) OVER (PARTITION BY visitor_name) DESC\n    ) AS rn\n  FROM visits\n) t\nWHERE rn = 1\nGROUP BY visitor_name, visit_count\nORDER BY visit_count DESC\nLIMIT 3;\n```\n\n{{< /details >}}"
  filepath = "top-3-visitors-by-visit-count"

[[tasks]]
  id = 23
  question = "Названия и цены услуг, проданных с 1 января 2021 по следующую неделю"
  answer = "**Условие задачи:**  \n📌 Есть таблицы:  \n- **Services** (`id`, `name`, `cost`, `price`, `group_id`)  \n- **Groups** (`id`, `name`)  \n- **Orders** (`id`, `datetime`, `srv_id`)  \n\nНеобходимо вывести **название** и **розничную цену** (`price`) для всех услуг, которые продавались **1 января 2021 и в течение следующей недели**.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Соедините **Orders** с **Services** по `srv_id = Services.id`.  \n💡 Отфильтруйте по диапазону дат: от `'2021-01-01'` до `'2021-01-08'` (включительно).  \n💡 Используйте `DISTINCT`, чтобы каждая услуга выводилась единожды, даже если была продана несколько раз.  \n💡 Альтернативный вариант — сначала выбрать `srv_id` по фильтру дат, а затем присоединить **Services** через `IN` или `EXISTS`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Решение 1: JOIN + DISTINCT + диапазон дат\nSELECT DISTINCT s.name,\n       s.price\nFROM Services s\nJOIN Orders o ON o.srv_id = s.id\nWHERE o.datetime >= '2021-01-01'\n  AND o.datetime <  '2021-01-09';\n```\n\n```sql\n-- Решение 2: Использование подзапроса с IN\nSELECT s.name,\n       s.price\nFROM Services s\nWHERE s.id IN (\n    SELECT o.srv_id\n    FROM Orders o\n    WHERE o.datetime BETWEEN '2021-01-01' AND '2021-01-08'\n);\n```\n\n{{< /details >}}"
  filepath = "services-january-2021-week"

[[tasks]]
  id = 24
  question = "Группы без услуг"
  answer = "**Условие задачи:**  \n📌 Есть таблицы:  \n- **Services** (`id`, `name`, `cost`, `price`, `group_id`)  \n- **Groups** (`id`, `name`)  \n\nНеобходимо вывести **названия групп**, в которых **нет ни одной услуги**.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте **LEFT JOIN** между `Groups` и `Services`, а в `WHERE` проверяйте `NULL` в полях `Services`.  \n💡 Альтернативно, примените **NOT EXISTS** с подзапросом, проверяющим отсутствие услуг в группе.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Решение 1: LEFT JOIN + фильтрация по NULL  \nSELECT g.name  \nFROM Groups g  \nLEFT JOIN Services s ON g.id = s.group_id  \nWHERE s.id IS NULL;\n\n-- Решение 2: NOT EXISTS  \nSELECT g.name  \nFROM Groups g  \nWHERE NOT EXISTS (  \n    SELECT 1  \n    FROM Services s  \n    WHERE s.group_id = g.id  \n);\n```\n\n{{< /details >}}"
  filepath = "groups-without-services"

[[tasks]]
  id = 25
  question = "Таблицы для авторов и книг (многие-ко-многим)"
  answer = "**Условие задачи:**  \n📌 Есть две сущности: **Авторы** и **Книги**.  \nКаждый автор может иметь много книг, и каждая книга может иметь много авторов (отношение «многие-ко-многим»).  \nНеобходимо описать структуру таблиц для реализации такой связи.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 В классической реляционной модели многие-ко-многим реализуется через **промежуточную (junction) таблицу**.  \n💡 Основные таблицы — `authors` и `books` — содержат информацию об авторах и книгах соответственно.  \n💡 Junction-таблица хранит пары `(author_id, book_id)`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Основная таблица авторов\nCREATE TABLE authors (\n    id   SERIAL PRIMARY KEY,\n    name VARCHAR(255) NOT NULL\n);\n\n-- Основная таблица книг\nCREATE TABLE books (\n    id    SERIAL PRIMARY KEY,\n    title VARCHAR(255) NOT NULL\n);\n\n-- Промежуточная таблица для связи многие-ко-многим\nCREATE TABLE author_book (\n    author_id INT NOT NULL,\n    book_id   INT NOT NULL,\n    PRIMARY KEY (author_id, book_id),\n    FOREIGN KEY (author_id) REFERENCES authors(id),\n    FOREIGN KEY (book_id)   REFERENCES books(id)\n);\n```\n\n{{< /details >}}"
  filepath = "authors-books"

[[tasks]]
  id = 26
  question = "Рыбы с суммарным уловом на дату d менее n"
  answer = "**Условие задачи:**  \n📌 Есть таблицы:  \n- **fish** (`id`, `name`)  \n- **catch** (`id`, `fish_id`, `dt`, `quantity`)  \n\nНеобходимо вывести **наименования рыб**, для которых **суммарный улов** на указанную дату `d` **меньше** чем `n`.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Фильтр по дате делается в `WHERE dt = :d`.  \n💡 Суммарный улов считаем через `SUM(quantity)` и группировку по `fish_id`.  \n💡 Используйте `HAVING SUM(quantity) < :n` для первой реализации.  \n💡 Во втором варианте можно применить **подзапрос** либо **LEFT JOIN** и фильтрацию по агрегату.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n-- Решение 1: GROUP BY + HAVING  \n```sql\nSELECT f.name\nFROM fish f\nJOIN catch c ON f.id = c.fish_id\nWHERE c.dt = :d\nGROUP BY f.name\nHAVING SUM(c.quantity) < :n;\n```\n\n-- Решение 2: Подзапрос в WHERE\n\n```sql\nSELECT f.name\nFROM fish f\nWHERE (\n    SELECT COALESCE(SUM(c.quantity), 0)\n    FROM catch c\n    WHERE c.fish_id = f.id\n      AND c.dt = :d\n) < :n;\n```\n\n{{< /details >}}"
  filepath = "fish-with-catch-less-than"

[[tasks]]
  id = 27
  question = "Пользователи без поездок"
  answer = "**Условие задачи:**  \n📌 Есть таблицы:  \n\n```sql\n\ncreate table users (\n    id int8 primary key,\n    name text,\n    email text\n);\n\ncreate table trips (\n    id int8 primary key,\n    scooter int8,\n    user_id int8,\n    started_at timestamptz,\n    finished_at timestamptz\n);\n\ncreate table pauses (\n    id int8 primary key,\n    trip_id int8,\n    started_at timestamptz,\n    finished_at timestamptz\n);\n\n```\n\nНужно вывести `id` всех пользователей, у которых нет ни одной поездки в таблице `trips`.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `LEFT JOIN` между `users` и `trips`, фильтруя по `trips.user_id IS NULL`.  \n💡 Альтернативно, примените `NOT EXISTS` с подзапросом, проверяющим отсутствие записей в `trips` для каждого пользователя.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Решение 1: LEFT JOIN + фильтрация по NULL\nSELECT u.id\nFROM users u\nLEFT JOIN trips t ON u.id = t.user_id\nWHERE t.user_id IS NULL;\n\n-- Решение 2: NOT EXISTS\nSELECT u.id\nFROM users u\nWHERE NOT EXISTS (\n    SELECT 1\n    FROM trips t\n    WHERE t.user_id = u.id\n);\n```\n\n{{< /details >}}"
  filepath = "users-without-trips"

[[tasks]]
  id = 28
  question = "Имена, встречающиеся более 5 раз"
  answer = "**Условие задачи:**  \n📌 Есть таблица `students(name text, \"group\" text, cource bigint)` в PostgreSQL.  \nНеобходимо посчитать и вывести те `name`, которые в таблице встречаются более 5 раз.\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Используйте `GROUP BY name` для агрегирования по имени.  \n💡 Примените `HAVING COUNT(*) > 5` для фильтрации групп с более чем 5 вхождениями.  \n💡 Альтернативное решение — воспользоваться оконной функцией `COUNT(*) OVER (PARTITION BY name)` и обернуть в подзапрос с фильтром.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Решение 1: GROUP BY + HAVING\nSELECT name\nFROM students\nGROUP BY name\nHAVING COUNT(*) > 5;\n\n-- Решение 2: Оконная функция + DISTINCT\nSELECT DISTINCT name\nFROM (\n    SELECT\n        name,\n        COUNT(*) OVER (PARTITION BY name) AS name_count\n    FROM students\n) t\nWHERE name_count > 5;\n```\n\n{{< /details >}}"
  filepath = "names-occurring-more-than-5"

[[tasks]]
  id = 29
  question = "Самые повторяющиеся значения `value`"
  answer = "**Условие задачи:**  \n📌 Есть таблица с колонками `key` и `value`:\n```text\nkey | value\n----+-------\n1   | sdfs\n2   | dsfg\n3   | sdfs\n```\n\nНеобходимо найти самое часто встречающееся значение в колонке `value`.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `GROUP BY value` для подсчёта количества вхождений каждого значения.  \n💡 Отсортируйте результат по убыванию счётчика (`COUNT(*) DESC`) и возьмите первую строку (`LIMIT 1`).  \n💡 Альтернативно примените оконную функцию `ROW_NUMBER()` или `RANK()`, чтобы выбрать значение с максимальным количеством.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Решение 1: GROUP BY + ORDER BY + LIMIT\nSELECT value\nFROM your_table\nGROUP BY value\nORDER BY COUNT(*) DESC\nLIMIT 1;\n\n-- Решение 2: Оконная функция RANK()\nSELECT value\nFROM (\n    SELECT\n        value,\n        RANK() OVER (ORDER BY COUNT(*) DESC) AS rnk\n    FROM your_table\n    GROUP BY value\n) t\nWHERE rnk = 1;\n```\n\n{{< /details >}}"
  filepath = "most-frequent-value"

[[tasks]]
  id = 30
  question = "Выбор пяти верхних записей"
  answer = "**Условие задачи:**  \n📌 Есть таблица с колонками `key` и `value`:  \n```text\nkey | value\n----+-------\n1   | sdfs\n2   | dsfg\n3   | sdfs\n…   | …\n```\n\nНеобходимо выбрать **первые 5 записей** из этой таблицы.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 В MySQL и PostgreSQL используйте `LIMIT 5`.  \n💡 В стандарте SQL можно применить `FETCH FIRST 5 ROWS ONLY`.  \n💡 В SQL Server используется `TOP 5`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Решение 1 (MySQL, PostgreSQL):\nSELECT *\nFROM your_table\nLIMIT 5;\n\n-- Решение 2 (ANSI SQL):\nSELECT *\nFROM your_table\nFETCH FIRST 5 ROWS ONLY;\n\n-- Решение 3 (SQL Server):\nSELECT TOP 5 *\nFROM your_table;\n```\n\n{{< /details >}}"
  filepath = "select-top-5"

[[tasks]]
  id = 31
  question = "Машины розового цвета и количество по цветам"
  answer = "**Условие задачи:**  \n📌 Есть таблицы:  \n\n```sql\nCREATE TABLE colors (\n    id INT NOT NULL PRIMARY KEY,\n    name VARCHAR(50),\n    UNIQUE(name)\n);\n\nCREATE TABLE cars (\n    id INT NOT NULL PRIMARY KEY,\n    name VARCHAR(50),\n    color_id INT,\n    FOREIGN KEY (color_id) REFERENCES colors(id)\n);\n```\n\n1. Вывести список всех машин розового цвета.  \n2. Посчитать количество машин для каждого цвета и вывести в формате: название цвета и количество машин.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для первой задачи используйте `JOIN` и фильтрацию по `colors.name = 'pink'`.  \n💡 Для второй — агрегируйте по `colors.name` с помощью `GROUP BY` и `COUNT(*)`.  \n💡 Не забудьте применять `LEFT JOIN`, если нужно включить цвета без машин (опционально).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- 1. Список машин розового цвета\nSELECT c.name AS car_name\nFROM cars c\nJOIN colors col ON c.color_id = col.id\nWHERE col.name = 'pink';\n\n-- 2. Количество машин по каждому цвету\nSELECT col.name    AS color,\n       COUNT(c.id) AS car_count\nFROM colors col\nLEFT JOIN cars c ON c.color_id = col.id\nGROUP BY col.name\nORDER BY col.name;\n```\n\n{{< /details >}}"
  filepath = "pink-cars-and-color-count"

[[tasks]]
  id = 32
  question = "Отделы с числом сотрудников и сотрудники с окладом выше руководителя"
  answer = "**Условие задачи:**  \n📌 Есть таблицы \n\n```sql \n-- Модель данных\n-- Отдел:\nCREATE TABLE department (\n    id          INTEGER     NOT NULL, -- идентификатор отдела\n    name        VARCHAR(128) NOT NULL, -- название отдела\n    PRIMARY KEY (id)\n);\n\n-- Сотрудник:\nCREATE TABLE employee (\n    id          INTEGER     NOT NULL, -- идентификатор сотрудника\n    department_id INTEGER   NOT NULL, -- идентификатор отдела\n    manager_id  INTEGER,              -- идентификатор начальника\n    name        VARCHAR(128) NOT NULL, -- имя сотрудника\n    salary      DECIMAL     NOT NULL, -- оклад сотрудника\n    PRIMARY KEY (id),\n    FOREIGN KEY (department_id) REFERENCES department(id),\n    FOREIGN KEY (manager_id) REFERENCES employee(id)\n);\n\n\n```\n\n1. Вывести список отделов в алфавитном порядке с количеством их сотрудников.  \n2. Вывести список сотрудников, чей оклад больше, чем у их непосредственного руководителя.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 Для первой задачи используйте `LEFT JOIN` или `JOIN` между `department` и `employee`, агрегируйте по `department.name`, `COUNT(employee.id)` и сортируйте по имени отдела.  \n💡 Для второй задачи выполните самосоединение `employee` как `e` и `manager`, сопоставляя `e.manager_id = manager.id`, и отфильтруйте по условию `e.salary > manager.salary`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- 1. Список отделов и количество сотрудников\nSELECT\n  d.name         AS department_name,\n  COUNT(e.id)    AS employee_count\nFROM department d\nLEFT JOIN employee e\n  ON e.department_id = d.id\nGROUP BY d.name\nORDER BY d.name;\n\n-- 2. Сотрудники с окладом выше, чем у непосредственного руководителя\nSELECT\n  e.name         AS employee_name,\n  e.salary       AS employee_salary,\n  m.name         AS manager_name,\n  m.salary       AS manager_salary\nFROM employee e\nJOIN employee m\n  ON e.manager_id = m.id\nWHERE e.salary > m.salary;\n```\n\n{{< /details >}}"
  filepath = "departments-and-high-salary-employees"

[[tasks]]
  id = 33
  question = "Строки, соответствующие любому шаблону"
  answer = "**Условие задачи:**  \n📌 Есть две таблицы:  \n- `t1(str)` – содержит строки  \n- `t2(mask)` – содержит шаблоны для `LIKE`  \n\nНеобходимо выбрать все строки из `t1`, которые соответствуют хотя бы одному шаблону из `t2` с помощью `SQL LIKE`.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `JOIN` по условию `t1.str LIKE t2.mask`, чтобы отфильтровать подходящие строки.  \n💡 Можно удалить дубликаты с помощью `DISTINCT`, если одна строка подходит под несколько шаблонов.  \n💡 Вариант с `EXISTS` помогает избежать дублирования и читабелен для проверки \"хотя бы одного\" шаблона.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Решение 1: JOIN + DISTINCT\nSELECT DISTINCT t1.str\nFROM t1\nJOIN t2\n  ON t1.str LIKE t2.mask;\n\n-- Решение 2: EXISTS\nSELECT t1.str\nFROM t1\nWHERE EXISTS (\n    SELECT 1\n    FROM t2\n    WHERE t1.str LIKE t2.mask\n);\n```\n\n{{< /details >}}"
  filepath = "match-strings-with-masks"

[[tasks]]
  id = 34
  question = "Пользователи с более чем одной покупкой в день"
  answer = "**Условие задачи:**  \n📌 Есть таблица `T1(date, user_id)` с датами покупок пользователей.  \nНеобходимо найти все случаи, когда пользователь совершил **более одной** покупки **в тот же день**, и вывести пары `(date, user_id)`.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `GROUP BY date, user_id` для агрегации покупок каждого пользователя по дате.  \n💡 Примените `HAVING COUNT(*) > 1` для фильтрации только тех групп, где покупок больше одной.  \n💡 Альтернативно — оконная функция `COUNT(*) OVER (PARTITION BY date, user_id)` и фильтрация по этому полю.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Решение 1: GROUP BY + HAVING\nSELECT \n    date,\n    user_id\nFROM T1\nGROUP BY \n    date, \n    user_id\nHAVING COUNT(*) > 1;\n\n-- Решение 2: Оконная функция\nSELECT DISTINCT\n    date,\n    user_id\nFROM (\n    SELECT\n        date,\n        user_id,\n        COUNT(*) OVER (PARTITION BY date, user_id) AS cnt\n    FROM T1\n) sub\nWHERE cnt > 1;\n```\n\n{{< /details >}}"
  filepath = "multiple-purchases-per-day"

[[tasks]]
  id = 35
  question = "Взаимные подписки (mutual follows)"
  answer = "**Условие задачи:**  \n📌 Есть таблица подписок в соцсети:\n```\n\nuser_id | follower_id  \n--------+------------  \n1 | 5  \n1 | 4  \n2 | 3  \n3 | 2  \n5 | 1\n\n```\n\nНужно найти пары пользователей, которые **фоловят друг друга** (не транзитивно), и вывести `(user_id, follower_id)`.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте **само-джойн** таблицы на условии обратной подписки: `t1.user_id = t2.follower_id AND t1.follower_id = t2.user_id`.  \n💡 Альтернативно можно применить двойной `EXISTS`: проверка, что для данной пары существует обратная запись.  \n💡 Не забудьте исключить дубликаты, чтобы не выводить одну и ту же пару дважды (например, `(5,1)` и `(1,5)` оба не нужны).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Решение 1: SELF JOIN\nSELECT DISTINCT t1.user_id,\n       t1.follower_id\nFROM follows t1\nJOIN follows t2\n  ON t1.user_id = t2.follower_id\n AND t1.follower_id = t2.user_id\nWHERE t1.user_id < t1.follower_id;\n\n-- Решение 2: EXISTS\nSELECT f1.user_id,\n       f1.follower_id\nFROM follows f1\nWHERE EXISTS (\n    SELECT 1\n    FROM follows f2\n    WHERE f2.user_id = f1.follower_id\n      AND f2.follower_id = f1.user_id\n)\nAND f1.user_id < f1.follower_id;\n```\n\n{{< /details >}}"
  filepath = "mutual-followers"

[[tasks]]
  id = 36
  question = "Папки с AVI-файлами и пустые папки"
  answer = "**Условие задачи:**  \n📌 Написать SQL-запрос, который выбрал бы **названия папок**, в которых есть хотя бы один файл с расширением `.avi`, **или** которые являются **пустыми** (не содержат ни одного файла).\n\n**Структура таблиц:**\n\n```sql\nCREATE TABLE folder (\n  id uuid PRIMARY KEY,\n  name text NOT NULL\n);\n\nCREATE TABLE file (\n  id uuid PRIMARY KEY,\n  name text NOT NULL,\n  folder_id uuid NOT NULL,\n  CONSTRAINT fk__file__folder_id FOREIGN KEY (folder_id) REFERENCES folder (id)\n);\n\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используем `LEFT JOIN` — чтобы получить и те папки, в которых **нет файлов вообще**.  \n💡 Для файлов с `.avi` используем фильтр `file.name LIKE '%.avi'`.  \n💡 Для определения пустых папок проверяем `file.id IS NULL`.  \n💡 Не забудьте использовать `DISTINCT`, если JOIN может дать дубликаты.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\nSELECT DISTINCT f.name\nFROM folder f\nLEFT JOIN file fi ON f.id = fi.folder_id\nWHERE fi.name LIKE '%.avi'\n   OR fi.id IS NULL;\n```\n\n✅ **Объяснение решения:**\n\n- `LEFT JOIN` соединяет папки с файлами (если они есть), оставляя строки для пустых папок.\n    \n- `fi.name LIKE '%.avi'` — выбираем папки с AVI-файлами.\n    \n- `fi.id IS NULL` — означает, что в папке нет ни одного файла.\n    \n- `DISTINCT` убирает возможные дубликаты, если в папке несколько AVI-файлов.\n    \n\n🔥 Один запрос — и у нас и видео, и пустота 😎  \n{{< /details >}}"
  filepath = "folders-with-avi-or-empty"

[[tasks]]
  id = 37
  question = "Отделы с количеством сотрудников"
  answer = "**Условие задачи:**  \n📌 Есть таблицы:\n- **dep** (`id`, `name`) — отделы\n- **emp** (`id`, `id_dep`, `fio`) — сотрудники, где `id_dep` ссылается на `dep.id`\n\nНеобходимо получить список **всех отделов** с количеством сотрудников в каждом. Если в отделе нет сотрудников, вывести `0`.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `LEFT JOIN`, чтобы включить отделы без сотрудников.  \n💡 Агрегируйте по `d.name` и примените `COUNT(e.id)`, он вернёт `0` для пустых групп.  \n💡 При необходимости сортируйте результат по имени отдела для удобства.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\nSELECT\n  d.name           AS department,\n  COUNT(e.id)      AS employee_count\nFROM dep d\nLEFT JOIN emp e\n  ON e.id_dep = d.id\nGROUP BY d.name\nORDER BY d.name;\n```\n\n{{< /details >}}"
  filepath = "department-employee-count"

[[tasks]]
  id = 38
  question = "Устранение дублирования записей из-за регистра в email"
  answer = "**Условие задачи:**  \n📌 Есть таблица `client_service` с колонками:\n- `client_id` — идентификатор клиента\n- `employee_email` — почта сотрудника, обслуживающего клиента\n\nИз-за разного регистра в `employee_email` (“User@domain.com” и “user@domain.com”) появляются дубликаты записей. Нужно написать SQL-решение, чтобы устранить задвоение.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Приведите `employee_email` к одному регистру (например, к нижнему) при выборке или в самой таблице.  \n💡 Для выборки без дубликатов после нормализации используйте `SELECT DISTINCT … LOWER(employee_email)`.  \n💡 Можно создать **уникальный индекс** по выражению `LOWER(employee_email)`, чтобы в будущем избежать вставки дублей с разным регистром.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- 1. Выборка без задвоения по разному регистру:\nSELECT DISTINCT\n  client_id,\n  LOWER(employee_email) AS employee_email_normalized\nFROM client_service;\n\n-- 2. Обновление существующих записей в таблице:\nUPDATE client_service\nSET employee_email = LOWER(employee_email);\n\n-- 3. Создание уникального индекса по нормализованному email:\n--    В PostgreSQL можно воспользоваться выражением:\nCREATE UNIQUE INDEX ux_client_service_email_ci\n  ON client_service (client_id, LOWER(employee_email));\n````\n\n✅ **Объяснение решения:**\n\n- **Нормализация регистра** через `LOWER(employee_email)` устраняет различия в регистре.\n\n- **SELECT DISTINCT** после нормализации вернёт по одному сочетанию клиент–почта.\n\n- **Обновление** таблицы и **уникальный индекс** не позволят вновь вставить дубли с разным регистром.  \n  {{< /details >}}"
  filepath = "deduplicate-client-email"

[[tasks]]
  id = 39
  question = "Эквивалент LEFT OUTER JOIN без использования OUTER JOIN"
  answer = "**Условие задачи:**  \n📌 Есть две таблицы `t1(A)` и `t2(B)`.  \nИсходный запрос:\n```sql\nSELECT *\nFROM t1\nLEFT OUTER JOIN t2\n  ON t1.A = t2.B;\n````\n\nНеобходимо переписать его эквивалентно **без** использования `LEFT OUTER JOIN`.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Разбейте на два подзапроса:\n\n1. **INNER JOIN** для совпадающих строк.\n\n2. Строки из `t1`, для которых нет совпадений в `t2`.  \n   💡 Объедините их с помощью `UNION ALL`.  \n   💡 Для второго подзапроса используйте `NOT EXISTS` или `NOT IN`.  \n   {{< /details >}}\n\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Вариант 1: INNER JOIN + UNION ALL + NOT EXISTS\nSELECT t1.A, t2.B\nFROM t1\nJOIN t2\n  ON t1.A = t2.B\n\nUNION ALL\n\nSELECT t1.A, NULL AS B\nFROM t1\nWHERE NOT EXISTS (\n    SELECT 1\n    FROM t2\n    WHERE t2.B = t1.A\n);\n```\n\n```sql\n-- Вариант 2: INNER JOIN + UNION ALL + NOT IN\nSELECT t1.A, t2.B\nFROM t1\nJOIN t2\n  ON t1.A = t2.B\n\nUNION ALL\n\nSELECT t1.A, NULL AS B\nFROM t1\nWHERE t1.A NOT IN (\n    SELECT t2.B\n    FROM t2\n);\n```\n\n{{< /details >}}"
  filepath = "leftjoin-equivalent"

[[tasks]]
  id = 40
  question = "Второй по величине оклад"
  answer = "**Условие задачи:**  \n📌 Есть таблица `Employee(id, email, salary)`. Нужно получить **второй по величине** уникальный `salary`.\n\n```text\nWe have table Employee with columns: id, email, salary. \nHow would you get the second highest salary?\n```\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Первый вариант — найти максимальный `salary` меньше, чем максимальный в таблице, через подзапрос.  \n💡 Второй вариант — использовать оконную функцию `DENSE_RANK()` по `salary` в порядке убывания и выбрать ранг = 2.  \n💡 Не забудьте учесть повторяющиеся оклады: нужны **уникальные** значения.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Вариант 1: Подзапрос\nSELECT MAX(salary) AS second_highest_salary\nFROM Employee\nWHERE salary < (\n    SELECT MAX(salary) \n    FROM Employee\n);\n\n-- Вариант 2: Оконная функция\nSELECT salary AS second_highest_salary\nFROM (\n    SELECT\n        salary,\n        DENSE_RANK() OVER (ORDER BY salary DESC) AS rnk\n    FROM Employee\n) t\nWHERE rnk = 2;\n````\n\n{{< /details >}}"
  filepath = "second-highest-salary"

[[tasks]]
  id = 41
  question = "Поиск дублированных email"
  answer = "**Условие задачи:**  \n📌 Есть таблица `Employee(id, email, salary)`, в которой некоторые `email` повторяются. Нужно найти все `email`, встречающиеся более одного раза.\n\n```text\nEmployee table with columns: id, email, salary. \nWe have duplicated emails. How could we find all duplicated emails?\n\n\nemail\n-----\na\nb\nc\na\n```\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `GROUP BY email` и фильтрацию `HAVING COUNT(*) > 1`.  \n💡 Альтернативно можно применить оконную функцию `COUNT() OVER (PARTITION BY email)` для подсчёта вхождений.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\n-- Вариант 1: GROUP BY + HAVING\nSELECT email\nFROM Employee\nGROUP BY email\nHAVING COUNT(*) > 1;\n\n-- Вариант 2: Оконная функция + DISTINCT\nSELECT DISTINCT email\nFROM (\n    SELECT\n        email,\n        COUNT(*) OVER (PARTITION BY email) AS cnt\n    FROM Employee\n) sub\nWHERE cnt > 1;\n````\n\n{{< /details >}}"
  filepath = "duplicated-emails"

[[tasks]]
  id = 42
  question = "Число сотрудников с одинаковой зарплатой в каждом департаменте"
  answer = "**Условие задачи:**  \n📌 Есть таблицы `department(id, name)` и `employee(id, surname, name, salary, department_id)`.  \nНеобходимо вывести для каждого департамента и каждой зарплаты количество сотрудников, имеющих эту зарплату.\n\n```sql\nCREATE TABLE department (\n    id   BIGSERIAL PRIMARY KEY,\n    name VARCHAR(255) NOT NULL\n);\n\nCREATE TABLE employee (\n    id             BIGSERIAL,\n    surname        VARCHAR(255) NOT NULL,\n    name           VARCHAR(255) NOT NULL,\n    salary         BIGINT NOT NULL,\n    department_id  BIGINT NOT NULL REFERENCES department(id)\n);\n````\n\n**Желаемый результат:**\n\n```\ndep_name     | salary | count\n-------------+--------+------\nDep_name_1   |   1000 |    3\nDep_name_1   |   2000 |    4\nDep_name_2   |   2000 |   30\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Соедините `department` и `employee` по `department_id`.  \n💡 Используйте `GROUP BY d.name, e.salary` и `COUNT(*)`.  \n💡 В альтернативном варианте можно применить оконную функцию `COUNT(*) OVER (PARTITION BY department_id, salary)`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Решение 1: GROUP BY\nSELECT\n    d.name   AS dep_name,\n    e.salary,\n    COUNT(*) AS count\nFROM department d\nJOIN employee e\n  ON e.department_id = d.id\nGROUP BY\n    d.name,\n    e.salary\nORDER BY\n    d.name,\n    e.salary;\n\n-- Решение 2: Оконная функция + DISTINCT\nSELECT DISTINCT\n    d.name     AS dep_name,\n    e.salary,\n    COUNT(*) OVER (PARTITION BY e.department_id, e.salary) AS count\nFROM department d\nJOIN employee e\n  ON e.department_id = d.id\nORDER BY\n    dep_name,\n    salary;\n```\n\n{{< /details >}}"
  filepath = "salary-count-per-department"

[[tasks]]
  id = 43
  question = "Статистика по отделам"
  answer = "**Условие задачи:**  \n📌 Есть таблицы `Employees(EmployeeID, Name, DepartmentID, Salary)` и `Departments(DepartmentID, DepartmentName)`.  \nНеобходимо для каждого отдела вывести:\n- название отдела,\n- количество сотрудников в отделе,\n- среднюю зарплату (округлённую до 2 знаков),\n- максимальную зарплату,\n- минимальную зарплату.\n\nОтсортировать результат по количеству сотрудников в отделе по убыванию.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `LEFT JOIN`, чтобы включить отделы без сотрудников (если нужно).  \n💡 Агрегируйте по `d.DepartmentName` с помощью `COUNT()`, `AVG()`, `MAX()`, `MIN()`.  \n💡 Для округления средней зарплаты примените функцию `ROUND(..., 2)`.  \n💡 Сортируйте по нужной колонке через `ORDER BY employee_count DESC`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n```sql\nSELECT\n    d.DepartmentName    AS department_name,\n    COUNT(e.EmployeeID) AS employee_count,\n    ROUND(AVG(e.Salary), 2) AS average_salary,\n    MAX(e.Salary)       AS max_salary,\n    MIN(e.Salary)       AS min_salary\nFROM Departments d\nLEFT JOIN Employees e\n  ON e.DepartmentID = d.DepartmentID\nGROUP BY\n    d.DepartmentName\nORDER BY\n    employee_count DESC;\n````\n\n{{< /details >}}"
  filepath = "department-stats"

[[tasks]]
  id = 44
  question = "Оптимизация медленного SQL‑запроса"
  answer = "**Условие задачи:**  \n📌 Есть таблицы `customers` и `orders`:\n```sql\nCREATE TABLE customers\n(\n    customer_id        NUMERIC(15) PRIMARY KEY,\n    name               VARCHAR(100),\n    email              VARCHAR(100) UNIQUE,\n    registration_date  TIMESTAMP,\n    premium_member     BOOLEAN\n);\n\nCREATE TABLE orders\n(\n    order_id       NUMERIC(15) PRIMARY KEY,\n    customer_id    NUMERIC(15) REFERENCES customers(customer_id),\n    order_date     TIMESTAMP,\n    total_amount   DECIMAL(12, 2),\n    status         VARCHAR(20)\n);\n````\n\nМедленно отрабатывает запрос:\n\n```sql\nSELECT c.name,\n       c.email,\n       o.order_id,\n       o.order_date,\n       o.total_amount\nFROM customers c\nJOIN orders o ON c.customer_id = o.customer_id\nWHERE o.status = 'Processing'\n  AND c.premium_member = TRUE\nORDER BY o.order_date DESC;\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Определите **бизнес‑логику**: выбираем все заказы со статусом “Processing” только у премиум‑клиентов, сортируя по дате последнего заказа.  \n💡 Проверьте план выполнения (`EXPLAIN ANALYZE`) – ищутся ли полные сканы по таблицам?  \n💡 Добавьте **композитные индексы** по колонкам, участвующим в `WHERE` и `JOIN`, и включите в них поле для сортировки:\n\n```sql\nCREATE INDEX idx_orders_status_date ON orders(status, order_date DESC, customer_id);\nCREATE INDEX idx_customers_premium ON customers(premium_member, customer_id);\n```\n\n💡 Рассмотрите **покрывающие индексы** или **materialized view** для часто повторяющихся запросов.  \n💡 Убедитесь, что статистика таблиц актуальна (`ANALYZE`).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n1. **Понять бизнес‑смысл запроса**\n\n    - Мы хотим отобразить все **текущие (Processing)** заказы только у **премиум‑пользователей**, отсортированные от самых свежих.\n\n2. **Изучить план выполнения**\n\n    ```sql\n    EXPLAIN ANALYZE\n    SELECT …;\n    ```\n\n    - Если видим `Seq Scan` по таблице `orders` или `customers` → недостаточно индексов.\n\n3. **Создать индексы**\n\n    - На таблицу `orders`:\n\n        ```sql\n        CREATE INDEX idx_orders_status_date\n          ON orders(status, order_date DESC, customer_id);\n        ```\n\n      Это позволит фильтровать по статусу и сразу выдавать результаты в нужном порядке, а затем давать `customer_id` для `JOIN`.\n\n    - На таблицу `customers`:\n\n        ```sql\n        CREATE INDEX idx_customers_premium\n          ON customers(premium_member, customer_id);\n        ```\n\n      Чтобы быстро выбрать только премиум‑клиентов и затем выполнить `JOIN` по `customer_id`.\n\n4. **Перепроверить план**\n\n    - После создания индексов убедитесь, что `EXPLAIN ANALYZE` показывает `Index Scan` вместо `Seq Scan`.\n\n5. **Дополнительные оптимизации**\n\n    - Если данные редко меняются, можно создать **материализованное представление**:\n\n        ```sql\n        CREATE MATERIALIZED VIEW mv_processing_premium AS\n        SELECT c.name, c.email, o.order_id, o.order_date, o.total_amount\n        FROM customers c\n        JOIN orders o ON c.customer_id = o.customer_id\n        WHERE o.status = 'Processing'\n          AND c.premium_member = TRUE;\n        CREATE INDEX ON mv_processing_premium(order_date DESC);\n        ```\n\n    - **Регулярно обновлять** материализованное представление (`REFRESH MATERIALIZED VIEW`).\n\n6. **Заключение**\n\n    - Правильно подобранные индексы и анализ плана выполнения устраняют полные сканирования таблиц и значительно ускоряют запрос на продакшене.  \n      {{< /details >}}"
  filepath = "refactor-slow-query"

[[tasks]]
  id = 45
  question = "Сотрудник с максимальной зарплатой в каждом департаменте"
  answer = "**Условие задачи:**  \n📌 Есть таблицы `departments(id, name)` и `employees(id, name, department_id, salary)`.  \nНеобходимо для каждого департамента вывести:\n- название департамента (`department`),\n- имя сотрудника (`employee`),\n- его зарплату (`salary`),\n  где сотрудник имеет **максимальную** зарплату в своём департаменте.\n\n```sql\nCREATE TABLE departments (\n    id   INT PRIMARY KEY,\n    name VARCHAR(100)\n);\n\nCREATE TABLE employees (\n    id             INT PRIMARY KEY,\n    name           VARCHAR(100),\n    department_id  INT REFERENCES departments(id),\n    salary         NUMERIC(10,2)\n);\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте оконную функцию `ROW_NUMBER()` или `RANK()` для нумерации сотрудников в каждом департаменте по убыванию зарплаты.  \n💡 В подзапросе или CTE вычислите номер строки в разрезе `department_id`, сортируя по `salary DESC`.  \n💡 Затем выберите только те записи, где номер строки = 1.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nWITH ranked_emps AS (\n    SELECT\n        d.name AS department,\n        e.name AS employee,\n        e.salary,\n        ROW_NUMBER() OVER (\n            PARTITION BY e.department_id \n            ORDER BY e.salary DESC\n        ) AS rn\n    FROM employees e\n    JOIN departments d\n      ON e.department_id = d.id\n)\nSELECT\n    department,\n    employee,\n    salary\nFROM ranked_emps\nWHERE rn = 1\nORDER BY department;\n```\n\n{{< /details >}}"
  filepath = "top-employee-per-department"

[[tasks]]
  id = 46
  question = "Проектирование таблиц «Продукты» и «Наличие товаров по магазинам»"
  answer = "**Условие задачи:**  \n📌 Необходимо спроектировать структуру таблиц для сети магазинов, чтобы обеспечить:\n1. Какие товары есть в том или ином магазине.\n2. В каких магазинах есть тот или иной товар.\n3. Общее количество каждого товара по всем магазинам.\n4. Информацию об отсутствующих товарах в конкретном магазине.\n\n**Код:**\n\n```sql\n-- Основная таблица магазинов\nCREATE TABLE store (\n    id   BIGSERIAL PRIMARY KEY,\n    name TEXT       NOT NULL\n);\n\n-- Таблица товаров\nCREATE TABLE product (\n    id          BIGSERIAL PRIMARY KEY,\n    name        TEXT       NOT NULL,\n    sku         TEXT       UNIQUE NOT NULL,  -- артикул\n    description TEXT\n);\n\n-- Промежуточная таблица наличия товара в магазине\nCREATE TABLE store_inventory (\n    store_id   BIGINT NOT NULL\n        REFERENCES store(id),\n    product_id BIGINT NOT NULL\n        REFERENCES product(id),\n    quantity   INT    NOT NULL CHECK (quantity >= 0),\n    PRIMARY KEY (store_id, product_id)\n);\n````\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для связи «многие‑ко‑многим» между магазинами и товарами необходима **junction‑таблица** `store_inventory`.  \n💡 Поле `quantity` хранит текущее количество единиц товара в каждом магазине (может быть 0).  \n💡 Уникальный ключ `(store_id, product_id)` гарантирует отсутствие дублирующих записей.  \n💡 Таблица `product` содержит `sku` (артикул) для внешних интеграций и поиск.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Пример наполнения:\nINSERT INTO store (name) VALUES ('На опушке'), ('Речной');\n\nINSERT INTO product (name, sku, description)\nVALUES\n  ('Хлеб', 'BREAD-001', 'Батон белый'),\n  ('Молоко', 'MILK-001', '2.5% жирности'),\n  ('Яблоки', 'APPLE-001', 'Зеленые');\n\n-- Указываем наличие товаров в магазинах:\nINSERT INTO store_inventory (store_id, product_id, quantity)\nVALUES\n  (1, 1, 50),  -- в магазине 1 — 50 штук Хлеба\n  (1, 2, 30),  -- в магазине 1 — 30 штук Молока\n  (2, 2,  0),  -- в магазине 2 — нет Молока\n  (2, 3, 20);  -- в магазине 2 — 20 штук Яблок\n\n-- 1) Товары в конкретном магазине:\nSELECT p.name, si.quantity\nFROM store_inventory si\nJOIN product p ON p.id = si.product_id\nWHERE si.store_id = 1;\n\n-- 2) Магазины, где есть конкретный товар:\nSELECT s.name, si.quantity\nFROM store_inventory si\nJOIN store s ON s.id = si.store_id\nWHERE si.product_id = 2 AND si.quantity > 0;\n\n-- 3) Общее количество товара по всем магазинам:\nSELECT p.name,\n       SUM(si.quantity) AS total_quantity\nFROM product p\nLEFT JOIN store_inventory si ON si.product_id = p.id\nGROUP BY p.name;\n\n-- 4) Список магазинов, где товар отсутствует:\nSELECT s.name\nFROM store s\nLEFT JOIN store_inventory si\n  ON si.store_id = s.id AND si.product_id = 2\nWHERE COALESCE(si.quantity, 0) = 0;\n```\n\n{{< /details >}}"
  filepath = "design-product-inventory"

[[tasks]]
  id = 47
  question = "Сумма выручки по продавцам"
  answer = "🔥 Напишите SQL-запрос, который извлекает идентификаторы всех продавцов и общую сумму, заработанную каждым. В выборке должны быть и продавцы без заказов (с суммой 0). Результат отсортирован по id продавца.\n\n```sql\nCREATE TABLE Salespersons\n(\n        id SERIAL PRIMARY KEY,\n        name VARCHAR(20)\n);\n\nCREATE TABLE Customers\n(\n        id SERIAL PRIMARY KEY,\n        salesperson_id INT\n);\n\nCREATE TABLE Orders\n(\n        id SERIAL PRIMARY KEY,\n        customer_id INT,\n        price INT\n);\n\nTRUNCATE Orders;\nINSERT INTO Orders (customer_id, price)\nVALUES (8, 2480),\n        (6, 654),\n        (13, 2938),\n        ... (больше строк)\n        (2, 1548);\n\nINSERT INTO Salespersons (name)\nVALUES ('Stephanie'),\n        ('Rebecca'),\n        ('Deborah'),\n        ...\n        ('Maria');\n\nINSERT INTO Customers (salesperson_id)\nVALUES (5),\n        (4),\n        (8),\n        ...\n        (3);\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Начинай запрос от таблицы `Salespersons`, чтобы гарантировать наличие всех продавцов.  \n💡 Используй `LEFT JOIN` с `Customers` и `Orders`, чтобы не потерять продавцов без продаж.  \n💡 Для суммирования выручки применяй `SUM(o.price)`.  \n💡 Чтобы у продавцов без заказов не было `NULL`, используй `COALESCE(..., 0)`.  \n💡 Группировка должна быть по `s.id`, сортировка — `ORDER BY s.id`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT\n    s.id AS salesperson_id,\n    COALESCE(SUM(o.price), 0) AS total_earned\nFROM Salespersons s\nLEFT JOIN Customers c\n       ON c.salesperson_id = s.id\nLEFT JOIN Orders o\n       ON o.customer_id = c.id\nGROUP BY s.id\nORDER BY s.id;\n```\n\n{{< /details >}}"
  filepath = "salespersons-revenue"

[[tasks]]
  id = 48
  question = "Последняя запись по каждому col2"
  answer = "🔥 Есть таблица table1. В ней 4 колонки. col1 это первичный ключ. col2 это secondary_id (либо foreign key, мы знаем, что он связан с другой таблицей и не уникальный в этой таблице). col3 это amount (денежное состояние). col4 это системное поле date (change date, когда изменилось). Написать SELECT запрос, который для каждого разного col2 возвращает только строку, у которой самая последняя свежая date\n\n```text\ntable1\ncol1 pk\ncol2 sec_fk\ncol3 amount\ncol4 date\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Удобно использовать оконную функцию `ROW_NUMBER()` с разбиением по `col2` и сортировкой по `col4 DESC`.  \n💡 В PostgreSQL есть короткий вариант с `DISTINCT ON (col2)` и `ORDER BY col2, col4 DESC`.  \n💡 Добавьте индекс на `(col2, col4 DESC)` для ускорения.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}  \nВариант 1 (ANSI SQL, универсальный, через оконную функцию):\n\n```sql\nSELECT col1, col2, col3, col4\nFROM (\n  SELECT\n    t.*,\n    ROW_NUMBER() OVER (PARTITION BY col2 ORDER BY col4 DESC) AS rn\n  FROM table1 t\n) s\nWHERE s.rn = 1\nORDER BY col2;\n```\n\nВариант 2 (PostgreSQL, `DISTINCT ON`):\n\n```sql\nSELECT DISTINCT ON (t.col2)\n  t.col1, t.col2, t.col3, t.col4\nFROM table1 t\nORDER BY t.col2, t.col4 DESC;\n```\n\n{{< /details >}}"
  filepath = "latest-by-foreign-key"

[[tasks]]
  id = 49
  question = "Минимальная и максимальная зарплата по отделам среди неуволенных"
  answer = "**Условие задачи:**  \n📌 В базе данных есть две таблицы: \"units\" – подразделение компании и \"employees\" – сотрудники компании.\nunits:\nid primary key\nname (название unit)\nemployees:\nid primary key\nunit_id foreign key -> units::id\nsalary (зарплата)\nfired (флаг уволен true, false)\n\nНеобходимо написать sql запрос, который вернет минимальную\nи максимальную зарплату по каждому отделу среди неуволенных сотрудников. (unit_id)\n\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Отберитесь по признаку неуволенных: `WHERE fired = false` (или `= 0`, если BOOL хранится как int).  \n💡 Сгруппируйтесь по отделу: `GROUP BY unit_id` (и `u.name`, если нужен человекочитаемый вывод).  \n💡 Агрегируйте зарплаты: `MIN(salary)`, `MAX(salary)`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- Вариант 1: по идентификатору отдела\nSELECT\n    e.unit_id,\n    MIN(e.salary) AS min_salary,\n    MAX(e.salary) AS max_salary\nFROM employees e\nWHERE e.fired = false\nGROUP BY e.unit_id;\n```\n\n```sql\n-- Вариант 2: с названием отдела\nSELECT\n    u.id   AS unit_id,\n    u.name AS unit_name,\n    MIN(e.salary) AS min_salary,\n    MAX(e.salary) AS max_salary\nFROM units u\nJOIN employees e\n  ON e.unit_id = u.id\n AND e.fired = false\nGROUP BY u.id, u.name;\n```\n\n> Примечание: если хотите показывать **все** отделы даже без активных сотрудников, используйте `LEFT JOIN` и переносите условие `fired = false` в `ON`, а не в `WHERE`:\n\n```sql\nSELECT\n    u.id   AS unit_id,\n    u.name AS unit_name,\n    MIN(e.salary) AS min_salary,\n    MAX(e.salary) AS max_salary\nFROM units u\nLEFT JOIN employees e\n  ON e.unit_id = u.id\n AND e.fired = false\nGROUP BY u.id, u.name;\n-- Для отделов без неуволенных сотрудников min/max будут NULL\n```\n\n{{< /details >}}"
  filepath = "min-max-salary-by-unit_2"

[[tasks]]
  id = 50
  question = "Удаление дублей из таблицы emails"
  answer = "**Условие задачи:**  \n📌 В таблице `emails(id, email)` могут встречаться **дублирующиеся email-адреса**.  \nНужно написать SQL-запрос, который удаляет дубликаты, оставляя только **одну запись** для каждого уникального email.\n\n**Код:**\n\n```sql\nCREATE TABLE emails (\n    id INT,\n    email VARCHAR(30)\n);\n\nINSERT INTO emails(id, email)\nVALUES\n(1, 'aa@yandex.ru'),\n(2, 'bb@yandex.ru'),\n(3, 'aa@yandex.ru');\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Чтобы удалить дубли, сначала нужно определить, какая запись считается \"уникальной\" — например, с **минимальным id**.  \n💡 Можно использовать **CTE** с `ROW_NUMBER()` или подзапрос с `MIN(id)`.  \n💡 Убедитесь, что удаляете только дубли, а не все строки.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- ✅ Вариант 1. Через CTE и ROW_NUMBER()\nWITH duplicates AS (\n    SELECT \n        id,\n        ROW_NUMBER() OVER (PARTITION BY email ORDER BY id) AS rn\n    FROM emails\n)\nDELETE FROM emails\nWHERE id IN (\n    SELECT id FROM duplicates WHERE rn > 1\n);\n```\n\n```sql\n-- ✅ Вариант 2. Без CTE (через подзапрос)\nDELETE FROM emails\nWHERE id NOT IN (\n    SELECT MIN(id)\n    FROM emails\n    GROUP BY email\n);\n```\n\n> 🧠 **Пояснение:**\n>\n> - `GROUP BY email` группирует одинаковые адреса.\n>\n> - `MIN(id)` оставляет один экземпляр (с наименьшим id).\n>\n> - Все остальные строки с тем же email удаляются.\n>\n\nПосле выполнения останется:\n\n|id|email|\n|---|---|\n|1|[aa@yandex.ru](mailto:aa@yandex.ru)|\n|2|[bb@yandex.ru](mailto:bb@yandex.ru)|\n\n\n{{< /details >}}"
  filepath = "delete-duplicates-emails"

[[tasks]]
  id = 51
  question = "Оптимизация запроса с помощью индексов"
  answer = "**Условие задачи:**  \n📌 В приложении есть медленный запрос:\n\n```sql\nSELECT id, name\nFROM users\nWHERE name = 'Artem'\n  AND create_date = '2024-10-28'\n  AND status = 'ACTIVE';\n```\n\nНужно определить, на какие колонки следует добавить индекс, чтобы ускорить выполнение запроса.\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Индексы работают эффективно, если фильтры в `WHERE` ограничивают результат.  \n💡 Наиболее эффективно — **композитный индекс** (multi-column index), соответствующий порядку фильтров.  \n💡 Порядок колонок в индексе имеет значение: от более \"селективной\" (редко повторяющейся) к менее.  \n💡 Можно проверить план выполнения через `EXPLAIN`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\n-- ✅ Оптимальный вариант: создать составной индекс\nCREATE INDEX idx_users_name_create_date_status\n    ON users (name, create_date, status);\n```\n\n**Почему так:**\n\n- Запрос фильтрует сразу по трём полям.\n\n- Если `name` наиболее селективное (редко повторяется) — ставим его первым.\n\n- Если же, например, `status` всегда `'ACTIVE'`, а `create_date` равна сегодняшнему дню, то можно поменять порядок:\n\n\n```sql\n-- Альтернатива при иной селективности:\nCREATE INDEX idx_users_status_create_date_name\n    ON users (status, create_date, name);\n```\n\n**Дополнительно:**\n\n- Можно ограничить индекс только используемыми фильтрами:\n\n    ```sql\n    CREATE INDEX idx_users_name_create_date\n        ON users (name, create_date);\n    ```\n\n- Если запрос часто делает поиск только по `name`, можно добавить отдельный индекс:\n\n    ```sql\n    CREATE INDEX idx_users_name ON users(name);\n    ```\n\n\n**Итог:**  \n🚀 Добавляем **композитный индекс по фильтруемым колонкам**, порядок выбираем по частоте повторения значений.  \nИспользуем `EXPLAIN ANALYZE` для проверки, что оптимизатор реально применяет индекс.  \n{{< /details >}}"
  filepath = "add-index-for-slow-query"

[[tasks]]
  id = 52
  question = "Сотрудники, получающие зарплату выше своего руководителя"
  answer = "**Условие задачи:**  \n📌 В таблице `EMPLOYEE(ID, NAME, SALARY, DEPARTMENT_ID, CHIEF_ID)` нужно вывести **список сотрудников**, чья зарплата больше, чем у их **непосредственного руководителя** (`CHIEF_ID`).\n\n**Код:**\n\n```sql\nCREATE TABLE EMPLOYEE (\n    ID int,\n    NAME VARCHAR(256),\n    SALARY int,\n    DEPARTMENT_ID int,\n    CHIEF_ID int\n);\n\n-- Пример данных\n-- ID | NAME      | SALARY | DEPARTMENT_ID | CHIEF_ID\n-- ---+------------+--------+---------------+----------\n-- 1  | Иванов     | 150    | 1             | null\n-- 2  | Петров     | 250    | 1             | 1\n-- 3  | Сидоров    | 550    | 1             | 1\n-- 4  | Медведев   | 350    | 2             | 6\n-- 5  | Соколов    | 350    | 2             | 6\n-- 6  | Рыбников   | 150    | 2             | null\n-- 7  | Арбузов    | 450    | 3             | null\n-- 8  | Орехов     | 650    | 3             | 7\n-- 9  | Дынин      | 50     | 3             | 7\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте **self join** — соедините таблицу `EMPLOYEE` саму с собой.  \n💡 Условие соединения: `e.CHIEF_ID = c.ID`, где `c` — начальник.  \n💡 В `WHERE` оставьте только тех, у кого `e.SALARY > c.SALARY`.  \n💡 Исключите записи, где `CHIEF_ID IS NULL` — у них нет руководителя.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT \n    e.NAME       AS employee_name,\n    e.SALARY     AS employee_salary,\n    c.NAME       AS chief_name,\n    c.SALARY     AS chief_salary\nFROM EMPLOYEE e\nJOIN EMPLOYEE c\n  ON e.CHIEF_ID = c.ID\nWHERE e.SALARY > c.SALARY;\n```\n\n**Результат для примера данных:**\n\n|employee_name|employee_salary|chief_name|chief_salary|\n|---|---|---|---|\n|Петров|250|Иванов|150|\n|Сидоров|550|Иванов|150|\n|Медведев|350|Рыбников|150|\n|Соколов|350|Рыбников|150|\n|Орехов|650|Арбузов|450|\n\n🧠 **Пояснение:**\n\n- Таблица соединяется сама с собой, чтобы “достать” зарплату начальника.\n\n- Сравнение выполняется построчно: если `SALARY > CHIEF.SALARY`, строка попадает в результат.\n\n\n{{< /details >}}"
  filepath = "employees-higher-salary-than-chief"

[[tasks]]
  id = 53
  question = "Отделы, где число сотрудников не превышает трёх человек"
  answer = "**Условие задачи:**  \n📌 В таблице `EMPLOYEE(ID, NAME, SALARY, DEPARTMENT_ID, CHIEF_ID)` нужно вывести **список идентификаторов отделов**, где общее количество сотрудников **≤ 3**.\n\n**Код:**\n\n```sql\nCREATE TABLE EMPLOYEE (\n    ID int,\n    NAME VARCHAR(256),\n    SALARY int,\n    DEPARTMENT_ID int,\n    CHIEF_ID int\n);\n\n-- Пример данных:\n-- ID | NAME      | SALARY | DEPARTMENT_ID | CHIEF_ID\n-- ---+------------+--------+---------------+----------\n-- 1  | Иванов     | 150    | 1             | null\n-- 2  | Петров     | 250    | 1             | 1\n-- 3  | Сидоров    | 550    | 1             | 1\n-- 4  | Медведев   | 350    | 2             | 6\n-- 5  | Соколов    | 350    | 2             | 6\n-- 6  | Рыбников   | 150    | 2             | null\n-- 7  | Арбузов    | 450    | 3             | null\n-- 8  | Орехов     | 650    | 3             | 7\n-- 9  | Дынин      | 50     | 3             | 7\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `GROUP BY department_id`, чтобы сгруппировать сотрудников по отделам.  \n💡 Примените агрегат `COUNT(*)` для подсчёта числа работников в каждом отделе.  \n💡 Отберите отделы, где `COUNT(*) <= 3`.  \n💡 Можно добавить `ORDER BY department_id` для удобства просмотра.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT \n    department_id\nFROM EMPLOYEE\nGROUP BY department_id\nHAVING COUNT(*) <= 3\nORDER BY department_id;\n```\n\n**Результат для примера данных:**\n\n|department_id|\n|---|\n|1|\n|2|\n|3|\n\n🧠 **Пояснение:**\n\n- Все три отдела содержат ровно по 3 сотрудника, поэтому они выводятся.\n\n- Если в будущем появится отдел с 4+ сотрудниками, он будет исключён из результата.\n\n\n{{< /details >}}"
  filepath = "departments-with-few-employees"

[[tasks]]
  id = 54
  question = "Найти дубли email среди клиентов-мужчин"
  answer = "**Условие задачи:**  \n📌 В таблице `customers` появились дубликаты по полю `email`.  \nНужно:\n\n- искать дубли только среди записей, где `gender = 'male'`;\n\n- вывести 2 колонки:\n\n    - `email`\n\n    - `cnt` — количество встреч\n\n\n---\n\n### SQL-запрос\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Используем `WHERE gender = 'male'`, чтобы ограничить выборку.  \n💡 `GROUP BY email` позволяет сгруппировать одинаковые email.  \n💡 `HAVING COUNT(*) > 1` выводит только дубликаты.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT\n    email,\n    COUNT(*) AS cnt\nFROM customers\nWHERE gender = 'male'\nGROUP BY email\nHAVING COUNT(*) > 1;\n```\n\n{{< /details >}}"
  filepath = "find-email-duplicates"

[[tasks]]
  id = 55
  question = "Пример синтаксиса запроса с HAVING"
  answer = "**Условие задачи:**  \n📌 Есть таблица **Employees** с колонками:\n\n- `employee_name`\n\n- `salary`\n\n- `department_id`\n\n\nНужно показать **примерный синтаксис SQL-запроса с HAVING**.\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 `HAVING` применяется **после GROUP BY** и работает уже с агрегатами.  \n💡 Частый кейс — отбирать группы, где сумма/количество/среднее выше/ниже порога.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT \n    department_id,\n    COUNT(*) AS emp_count,\n    AVG(salary) AS avg_salary\nFROM Employees\nGROUP BY department_id\nHAVING AVG(salary) > 50000;\n```\n\n**Пояснение:**\n\n- `GROUP BY department_id` — группируем сотрудников по отделам.\n\n- `AVG(salary)` — считаем среднюю ЗП в каждом отделе.\n\n- `HAVING AVG(salary) > 50000` — фильтруем отделы, в которых средняя зарплата **больше 50 000**.\n\n\nЭто классический пример правильного использования `HAVING`.\n\n{{< /details >}}"
  filepath = "having-example"

[[tasks]]
  id = 56
  question = "Минимальная и максимальная зарплата по отделам среди неуволенных сотрудников"
  answer = "**Условие задачи:**  \n📌 Даны таблицы `units` и `employees`.  \nНужно написать SQL-запрос, который вернёт:\n\n- ID отдела,\n\n- минимальную зарплату,\n\n- максимальную зарплату  \n  — среди сотрудников, у которых `fired = false`.\n\n\n**Структура таблиц:**\n\n```\nunits:\n  id int PK\n  name text\n\nemployees:\n  id int PK\n  unit_id int FK → units.id\n  salary numeric\n  fired boolean\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"Подсказки\" close >}}  \n💡 Делаем `JOIN` таблиц по `unit_id`.  \n💡 Фильтруем только `fired = false`.  \n💡 Группируем по отделам (`GROUP BY`).  \n💡 Используем `MIN()` и `MAX()` для зарплат.  \n💡 Если нужно вернуть _все отделы_, используйте `LEFT JOIN`.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT\n    u.id AS unit_id,\n    u.name AS unit_name,\n    MIN(e.salary) AS min_salary,\n    MAX(e.salary) AS max_salary\nFROM units u\nJOIN employees e\n  ON e.unit_id = u.id\n AND e.fired = false\nGROUP BY u.id, u.name;\n```\n\n**Альтернативный вариант (если нужно показывать даже отделы без сотрудников):**\n\n```sql\nSELECT\n    u.id AS unit_id,\n    u.name AS unit_name,\n    MIN(e.salary) AS min_salary,\n    MAX(e.salary) AS max_salary\nFROM units u\nLEFT JOIN employees e\n  ON e.unit_id = u.id\n AND e.fired = false\nGROUP BY u.id, u.name;\n```\n\n{{< /details >}}"
  filepath = "min-max-salary-active-employees"

[[tasks]]
  id = 57
  question = "Минимальная и максимальная зарплата по отделам среди неуволенных сотрудников"
  answer = "**Условие задачи:**  \n📌 Нужно придумать SQL-пример, где одновременно используются `WHERE` и `HAVING`, и показать разницу.  \nЗапрос должен быть реалистичным и демонстрировать назначение каждого оператора.\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"Подсказки\" close >}}  \n💡 `WHERE` — фильтрует **строки до группировки**.  \n💡 `HAVING` — фильтрует **группы после GROUP BY**.  \n💡 Хороший пример: выбрать отделы, где работают только активные сотрудники (`WHERE`), и среди них оставить только те, где **средняя зарплата выше 50k** (`HAVING`).  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT \n    department_id,\n    AVG(salary) AS avg_salary,\n    COUNT(*) AS emp_count\nFROM employees\nWHERE status = 'ACTIVE'          -- фильтрация строк до группировки\nGROUP BY department_id\nHAVING AVG(salary) > 50000       -- фильтрация групп после группировки\n   AND COUNT(*) >= 3;            -- пример дополнительного условия\n```\n\n**Что делает запрос:**\n\n- `WHERE status = 'ACTIVE'`  \n  → из таблицы берём только активных сотрудников.\n\n- `GROUP BY department_id`  \n  → группируем активных сотрудников по отделам.\n\n- `HAVING AVG(salary) > 50000`  \n  → оставляем только те отделы, где средняя зарплата выше 50k.\n\n- `COUNT(*) >= 3`  \n  → и в отделе должно быть не менее трёх активных сотрудников.\n\n\nИтого: запрос показывает отделы с достаточно большим штатом и высокой средней зарплатой.\n\n{{< /details >}}"
  filepath = "having-vs-where-example"

[[tasks]]
  id = 58
  question = "Количество сотрудников по отделам и отделы с >3 сотрудниками с ЗП > 100к"
  answer = "**Условие задачи:**  \n📌 Даны таблицы `departments` и `employees`. Нужно:\n\n1. Написать SQL-запрос, который посчитает **количество работников в каждом подразделении**.\n\n2. Написать SQL-запрос, который найдёт **отделы, где работает больше трёх сотрудников с зарплатой более 100000**.\n\n\n**Код (схема и данные):**\n\n```sql\nCREATE TABLE departments (\n    id INT PRIMARY KEY,\n    name VARCHAR(100) NOT NULL\n);\n\nCREATE TABLE employees (\n    id INT PRIMARY KEY,\n    name VARCHAR(100) NOT NULL,\n    department_id INT REFERENCES departments(id),\n    salary INT NOT NULL\n);\n\n-- Заполнение таблицы отделов\nINSERT INTO departments (id, name) VALUES\n(1, 'Отдел ИТ'),\n(2, 'Отдел ИБ'),\n(3, 'HR');\n\n-- Заполнение таблицы сотрудников\nINSERT INTO employees (id, name, department_id, salary) VALUES\n(1, 'Иван Петров', 1, 120000),\n(2, 'Елена Сидорова', 1, 110000),\n(3, 'Алексей Иванов', 1, 105000),\n(4, 'Мария Кузнецова', 1, 95000),\n(5, 'Дмитрий Смирнов', 2, 150000),\n(6, 'Ольга Васильева', 2, 130000),\n(7, 'Сергей Миронов', 2, 80000),\n(8, 'Анна Жукова', 3, 115000),\n(9, 'Павел Белов', 3, 125000),\n(10, 'Наталья Воробьева', 3, 140000),\n(11, 'Артем Громов', 3, 98000),\n(12, 'Виктория Орлова', 1, 108000);\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для задачи 1:\n\n- Нужно сгруппировать сотрудников по отделам: `GROUP BY department_id` или по `departments.id`.\n\n- Если нужно показать отделы без сотрудников — используй `LEFT JOIN`.\n\n\n💡 Для задачи 2:\n\n- Сначала отфильтровать сотрудников с `salary > 100000`.\n\n- Потом сгруппировать по отделам.\n\n- И через `HAVING COUNT(*) > 3` оставить только отделы, где таких сотрудников больше трёх.  \n  {{< /details >}}\n\n\n{{< details \"Решение\" close >}}\n\n### 1. Количество работников в каждом подразделении\n\n```sql\nSELECT \n    d.id   AS department_id,\n    d.name AS department_name,\n    COUNT(e.id) AS employee_count\nFROM departments d\nLEFT JOIN employees e\n    ON e.department_id = d.id\nGROUP BY d.id, d.name\nORDER BY d.id;\n```\n\n> `LEFT JOIN` гарантирует, что отделы без сотрудников тоже попадут в результат (с `employee_count = 0`).\n\n---\n\n### 2. Отделы, где работает больше трёх сотрудников с зарплатой > 100000\n\n```sql\nSELECT \n    d.id   AS department_id,\n    d.name AS department_name,\n    COUNT(e.id) AS high_paid_count\nFROM departments d\nJOIN employees e\n    ON e.department_id = d.id\nWHERE e.salary > 100000\nGROUP BY d.id, d.name\nHAVING COUNT(e.id) > 3;\n```\n\n- `WHERE e.salary > 100000` — оставляем только сотрудников с ЗП > 100к.\n\n- `GROUP BY d.id, d.name` — группируем их по отделам.\n\n- `HAVING COUNT(e.id) > 3` — оставляем только те отделы, где **строго больше трёх** таких сотрудников.\n\n\n{{< /details >}}"
  filepath = "departments-employees-aggregation"

[[tasks]]
  id = 59
  question = "Схема БД для иерархического справочника организаций"
  answer = "**Условие задачи:**  \n📌 Нужно спроектировать структуру БД для **классического справочника организаций** с иерархией уровней (холдинг → управление → отдел → бюро и т.д.).  \nНужно ответить:\n\n- одну таблицу делаем или несколько?\n\n- какие столбцы понадобятся для хранения дерева вида:\n\n\n```text\nТН - Технологии\n  Управление ИБ\n    Отдел разработки решений ИБ\n      Бюро разработки\n      Бюро эксплуатации\n  Управление ИТ\n    Отдел ИТ\n    Отдел архитектуры\n\nТН - Дальний восток\n  РНУ\n    НПС 1\n    НПС 2\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для иерархии чаще всего используют **adjacency list**: у каждой строки есть `parent_id`.  \n💡 Можно сделать **одну таблицу** `org_unit`, где верхний уровень (ТН) имеет `parent_id = NULL`.  \n💡 Полезно хранить:  \n– `id`  \n– `parent_id`  \n– `name`  \n– тип или уровень (`type` / `level`)  \n– сортировку в рамках одного родителя (`sort_order`).  \n💡 Если нужно несколько организаций, можно добавить `root_id` или `tree_id`.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\nДля типового справочника я бы сделал **одну таблицу** с иерархией по `parent_id`:\n\n```sql\nCREATE TABLE org_units (\n    id           BIGINT PRIMARY KEY,          -- уникальный идентификатор узла\n    parent_id    BIGINT NULL,                 -- ссылка на родителя (NULL для корня)\n    name         VARCHAR(255) NOT NULL,       -- название: \"ТН - Технологии\", \"Управление ИБ\", \"НПС 1\" и т.п.\n    type         VARCHAR(50)  NOT NULL,       -- тип узла: 'HOLDING', 'REGION', 'DEPARTMENT', 'BUREAU', 'NPS' и т.д.\n    level        INT          NOT NULL,       -- уровень вложенности: 1,2,3,4...\n    code         VARCHAR(50),                 -- внутренний код подразделения (если нужен)\n    sort_order   INT          NOT NULL DEFAULT 0,  -- порядок внутри одного parent\n    is_active    BOOLEAN      NOT NULL DEFAULT TRUE, -- актуальность записи\n    created_at   TIMESTAMP    NOT NULL DEFAULT now(),\n    updated_at   TIMESTAMP    NOT NULL DEFAULT now()\n);\n\n-- Внешний ключ на родителя\nALTER TABLE org_units\n    ADD CONSTRAINT fk_org_units_parent\n    FOREIGN KEY (parent_id) REFERENCES org_units(id);\n```\n\n**Как это работает на вашем примере:**\n\n|id|parent_id|name|type|level|\n|---|---|---|---|---|\n|1|NULL|ТН - Технологии|HOLDING|1|\n|2|1|Управление ИБ|MANAGEMENT|2|\n|3|2|Отдел разработки решений ИБ|DEPT|3|\n|4|3|Бюро разработки|BUREAU|4|\n|5|3|Бюро эксплуатации|BUREAU|4|\n|6|1|Управление ИТ|MANAGEMENT|2|\n|7|6|Отдел ИТ|DEPT|3|\n|8|6|Отдел архитектуры|DEPT|3|\n|9|NULL|ТН - Дальний восток|HOLDING|1|\n|10|9|РНУ|MANAGEMENT|2|\n|11|10|НПС 1|NPS|3|\n|12|10|НПС 2|NPS|3|\n\n**Почему одной таблицы достаточно:**\n\n- Иерархия произвольной глубины — просто цепочка `parent_id`.\n\n- Не нужно плодить таблицы под каждый уровень (`holdings`, `departments`, `bureaus` и т.п.).\n\n- Легко добавлять новые уровни без миграций схемы (новое значение в `type`).\n\n- Запросы вида «все дочерние подразделения ТН - Технологии» строятся по `parent_id`/`level`/`type`.\n\n\n> Альтернатива: если хочется отделить _организацию в целом_ от _структурных единиц_,  \n> можно добавить таблицу `organizations` и в `org_units` хранить `organization_id`.  \n> Но для классического «дерева подразделений» часто достаточно одной `org_units`.\n\n{{< /details >}}"
  filepath = "org-directory-schema"

[[tasks]]
  id = 60
  question = "Проектирование базы изделий (ведомость состава / BOM)"
  answer = "**Условие задачи:**  \n📌 Нужно спроектировать схему БД для хранения состава изделия (BOM).  \nЕсть изделие и его состав:\n\n```text\n1 Датчик\n  2 Корпус 1 шт\n    3 Винт 8 шт\n  3 Винт 4 шт\n```\n\nЗадача: какие будут **таблицы** и **столбцы**, чтобы:\n\n- хранить все изделия/детали (нормативка);\n\n- хранить структуру: какое изделие из каких компонентов состоит и в каком количестве;\n\n- поддерживать повторное использование одной и той же детали (например, «Винт» в разных местах и в разном количестве).\n\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Обычно делаем **2 таблицы**:\n\n1. `items` — справочник изделий/деталей (что это за номенклатура).\n\n2. `bom` (bill of materials) — связи «родитель → компонент + количество».\n\n\n💡 В `bom` нужны:\n\n- `parent_item_id` — что собираем,\n\n- `component_item_id` — из чего,\n\n- `quantity` — сколько штук,\n\n- опционально `level` / `position` / `unit`.  \n  {{< /details >}}\n\n\n{{< details \"Решение\" close >}}\n\n### 1. Таблица изделий / деталей\n\n```sql\nCREATE TABLE items (\n    id           BIGINT PRIMARY KEY,           -- 1, 2, 3 ...\n    name         VARCHAR(255) NOT NULL,        -- \"Датчик\", \"Корпус\", \"Винт\"\n    item_code    VARCHAR(50),                  -- артикул / внутр. код (опционально)\n    item_type    VARCHAR(50),                  -- тип: 'ASSEMBLY', 'PART', 'RAW' и т.п.\n    unit         VARCHAR(20) NOT NULL DEFAULT 'шт', -- базовая единица измерения\n    is_active    BOOLEAN NOT NULL DEFAULT TRUE,\n    created_at   TIMESTAMP NOT NULL DEFAULT now(),\n    updated_at   TIMESTAMP NOT NULL DEFAULT now()\n);\n```\n\nПримеры данных для твоего случая:\n\n```text\nid | name    | item_type\n---+---------+----------\n1  | Датчик  | ASSEMBLY\n2  | Корпус  | ASSEMBLY\n3  | Винт    | PART\n```\n\n---\n\n### 2. Таблица структуры изделия (BOM)\n\n```sql\nCREATE TABLE bom (\n    id                BIGINT PRIMARY KEY,\n    parent_item_id    BIGINT NOT NULL,      -- изделие, которое собираем (например, \"Датчик\")\n    component_item_id BIGINT NOT NULL,      -- компонент (например, \"Корпус\", \"Винт\")\n    quantity          NUMERIC(12, 3) NOT NULL, -- количество компонента на 1 ед. родителя\n    unit              VARCHAR(20) NOT NULL DEFAULT 'шт', -- ед. измерения (шт, кг, м и т.п.)\n    position          INT,                 -- позиция в спецификации (для печатных форм)\n    level_hint        INT,                 -- опционально: уровень вложенности (1,2,3 ...)\n    CONSTRAINT fk_bom_parent\n        FOREIGN KEY (parent_item_id) REFERENCES items(id),\n    CONSTRAINT fk_bom_component\n        FOREIGN KEY (component_item_id) REFERENCES items(id)\n);\n```\n\nДанные для примера:\n\n```text\n-- Датчик состоит из:\n-- 1) Корпус 1 шт\n-- 2) Винт 4 шт\nINSERT INTO bom (id, parent_item_id, component_item_id, quantity, unit, position, level_hint)\nVALUES\n(1, 1, 2, 1,  'шт', 1, 1),   -- Датчик -> Корпус 1 шт\n(2, 1, 3, 4,  'шт', 2, 1);   -- Датчик -> Винт 4 шт\n\n-- Корпус состоит из:\n-- 3) Винт 8 шт\nINSERT INTO bom (id, parent_item_id, component_item_id, quantity, unit, position, level_hint)\nVALUES\n(3, 2, 3, 8, 'шт', 1, 2);    -- Корпус -> Винт 8 шт\n```\n\n**Как читается структура:**\n\n- `parent_item_id = 1 (\"Датчик\")`, `component_item_id = 2 (\"Корпус\")`, `quantity = 1` →  \n  На один датчик нужен один корпус.\n\n- `parent_item_id = 1 (\"Датчик\")`, `component_item_id = 3 (\"Винт\")`, `quantity = 4` →  \n  На один датчик нужно 4 винта «верхнего уровня».\n\n- `parent_item_id = 2 (\"Корпус\")`, `component_item_id = 3 (\"Винт\")`, `quantity = 8` →  \n  На один корпус нужно 8 винтов.\n\n\n---\n\n**Почему именно так:**\n\n- Одна таблица `items` — один раз описывает, _что_ это за деталь/изделие.\n\n- Таблица `bom` — описывает, _как_ одно изделие собирается из других (родитель → компоненты).\n\n- Одна и та же деталь (`Винт`, id=3) может фигурировать в разных BOM с разным количеством и на разных уровнях вложенности — это как раз то, что нужно для нормальной спецификации.\n\n\nТакой дизайн — классический для систем управления составом изделия (BOM/ERP/PLM).\n\n{{< /details >}}"
  filepath = "bom-products-schema"

[[tasks]]
  id = 61
  question = "Найти пользователей, которые летали только экономом"
  answer = "**Условие задачи:**  \n📌 Нужно выбрать **уникальные user_id**, которые **летали только по билетам класса ECONOMY**.  \nЕсли у пользователя **хотя бы один билет BUSINESS**, он **не должен попасть** в выборку.\n\n**Данные:**\n\n```\nticket_id | user_id | ticket_type | price\n-----------+---------+--------------+-------\n110        | 500     | 'ECONOMY'    | 10000\n220        | 600     | 'BUSINESS'   | 35000\n330        | 600     | 'ECONOMY'    | 15000\n440        | 750     | 'ECONOMY'    | 12000\n550        | 800     | 'BUSINESS'   | 40000\n660        | 750     | 'ECONOMY'    | 5000\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"Подсказки\" close >}}  \n💡 Нужно сгруппировать билеты по `user_id`.  \n💡 Пользователь годится, если `MIN(ticket_type) = MAX(ticket_type) = 'ECONOMY'`.  \n💡 Или: сгруппировать и проверить `COUNT(*) = COUNT(CASE WHEN ticket_type='ECONOMY' THEN 1 END)`.  \n💡 Или: исключить тех, у кого есть BUSINESS.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n### ✔️ Вариант 1 — через GROUP BY + HAVING\n\n```sql\nSELECT user_id\nFROM tickets\nGROUP BY user_id\nHAVING COUNT(*) = COUNT(CASE WHEN ticket_type = 'ECONOMY' THEN 1 END);\n```\n\n**Логика:**  \nЕсли общее число билетов = числу ECONOMY-билетов → других классов нет.\n\n---\n\n### ✔️ Вариант 2 — «запретить бизнес» (тоже верно)\n\n```sql\nSELECT user_id\nFROM tickets\nGROUP BY user_id\nHAVING SUM(CASE WHEN ticket_type = 'BUSINESS' THEN 1 ELSE 0 END) = 0;\n```\n\n---\n\n### ✔️ Вариант 3 — через NOT EXISTS\n\n```sql\nSELECT DISTINCT t1.user_id\nFROM tickets t1\nWHERE NOT EXISTS (\n    SELECT 1\n    FROM tickets t2\n    WHERE t2.user_id = t1.user_id\n      AND t2.ticket_type = 'BUSINESS'\n);\n```\n\n---\n\n### ✔️ Результат для данных из задания:\n\n|user_id|\n|---|\n|**500**|\n|**750**|\n\n- **500** — только ECONOMY\n\n- **750** — только ECONOMY\n\n- **600** — есть и ECONOMY, и BUSINESS → не подходит\n\n- **800** — только BUSINESS → тоже не подходит\n\n\n---\n\n{{< /details >}}"
  filepath = "users-only-economy"

[[tasks]]
  id = 62
  question = "Минимальная и максимальная зарплата по отделам среди неуволенных сотрудников"
  answer = "**Условие задачи:**  \n📌 В базе данных есть две таблицы:\n\n- `units` — подразделения компании\n\n- `employees` — сотрудники компании\n\n\nНужно написать SQL-запрос, который вернёт:\n\n- `unit_id`,\n\n- минимальную зарплату (`min_salary`),\n\n- максимальную зарплату (`max_salary`)\n\n\n👉 **Только среди сотрудников, у которых `fired = false`.**\n\n**Структура таблиц:**\n\n```\nunits:\n  id    -- primary key\n  name  -- название подразделения\n\nemployees:\n  id       -- primary key\n  unit_id  -- foreign key -> units.id\n  salary   -- зарплата\n  fired    -- флаг уволен (true / false)\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"Подсказки\" close >}}  \n💡 Нужно агрегировать данные по `unit_id`.  \n💡 Используйте `MIN(salary)` и `MAX(salary)`.  \n💡 Фильтрация по `fired = false` выполняется до агрегации.  \n💡 Если требуется вернуть только `unit_id`, можно не делать `JOIN` с `units`.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT\n    e.unit_id,\n    MIN(e.salary) AS min_salary,\n    MAX(e.salary) AS max_salary\nFROM employees e\nWHERE e.fired = false\nGROUP BY e.unit_id;\n```\n\n**Комментарий:**\n\n- `WHERE e.fired = false` — исключаем уволенных сотрудников.\n\n- `GROUP BY e.unit_id` — считаем агрегаты по каждому отделу.\n\n- `MIN` и `MAX` считают минимальную и максимальную зарплату внутри отдела.\n\n\n---\n\n**Если нужно дополнительно вывести название отдела:**\n\n```sql\nSELECT\n    u.id   AS unit_id,\n    u.name AS unit_name,\n    MIN(e.salary) AS min_salary,\n    MAX(e.salary) AS max_salary\nFROM units u\nJOIN employees e\n  ON e.unit_id = u.id\n AND e.fired = false\nGROUP BY u.id, u.name;\n```\n\n{{< /details >}}"
  filepath = "min-max-salary-by-unit-active"

[[tasks]]
  id = 63
  question = "Найти департаменты без сотрудников"
  answer = "**Условие задачи:**  \n📌 Есть две таблицы:\n\n- `Department(id, name)`\n\n- `Employee(id, salary, department_id)`\n\n\nНужно написать **SELECT**, который выведет **все департаменты, в которых нет ни одного сотрудника**.\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n---\n\n{{< details \"Подсказки\" close >}}  \n💡 Используйте `LEFT JOIN`, чтобы получить все департаменты.  \n💡 Отсутствие сотрудников определяется по `NULL` в полях из таблицы `Employee`.  \n💡 Альтернатива — `NOT EXISTS`.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n### Вариант 1 — через LEFT JOIN (самый популярный)\n\n```sql\nSELECT\n    d.id,\n    d.name\nFROM Department d\nLEFT JOIN Employee e\n    ON e.department_id = d.id\nWHERE e.id IS NULL;\n```\n\n**Почему работает:**\n\n- `LEFT JOIN` возвращает все департаменты.\n\n- Если сотрудников нет, поля `Employee` будут `NULL`.\n\n- `WHERE e.id IS NULL` оставляет только такие департаменты.\n\n\n---\n\n### Вариант 2 — через NOT EXISTS\n\n```sql\nSELECT\n    d.id,\n    d.name\nFROM Department d\nWHERE NOT EXISTS (\n    SELECT 1\n    FROM Employee e\n    WHERE e.department_id = d.id\n);\n```\n\n**Комментарий:**\n\n- Часто лучше оптимизируется планировщиком.\n\n- Явно отражает бизнес-смысл: «нет сотрудников».\n\n\n{{< /details >}}"
  filepath = "departments-without-employees"

[[tasks]]
  id = 64
  question = "Отделы по алфавиту с количеством сотрудников, где средняя зарплата > 90"
  answer = "**Условие задачи:**  \n📌 Нужно вывести список отделов **в алфавитном порядке** с:\n\n- названием отдела\n\n- количеством сотрудников в отделе\n\n\nИ отобрать только те отделы, где **средняя зарплата сотрудников > 90**.\n\n**Код:**\n\n```sql\n-- Отдел:\nCREATE TABLE department (\n    id      INTEGER       NOT NULL,\n    name    VARCHAR(128)  NOT NULL,\n    PRIMARY KEY (id)\n);\n\n-- Сотрудник:\nCREATE TABLE employee (\n    id             INTEGER       NOT NULL,\n    department_id  INTEGER       NOT NULL,\n    manager_id     INTEGER,\n    name           VARCHAR(128)  NOT NULL,\n    salary         DECIMAL       NOT NULL,\n    PRIMARY KEY (id),\n    FOREIGN KEY (department_id) REFERENCES department(id),\n    FOREIGN KEY (manager_id) REFERENCES employee(id)\n);\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Соединяем `department` и `employee` по `department_id`.  \n💡 Группируем по отделу (`GROUP BY d.id, d.name`).  \n💡 `COUNT(e.id)` — количество сотрудников.  \n💡 `HAVING AVG(e.salary) > 90` — фильтр по средней зарплате.  \n💡 `ORDER BY d.name` — алфавитный порядок.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT\n    d.name AS department_name,\n    COUNT(e.id) AS employees_count\nFROM department d\nJOIN employee e\n  ON e.department_id = d.id\nGROUP BY d.id, d.name\nHAVING AVG(e.salary) > 90\nORDER BY d.name;\n```\n\n{{< /details >}}"
  filepath = "departments-avg-salary-gt-90"

[[tasks]]
  id = 65
  question = "Департаменты с количеством сотрудников больше трёх"
  answer = "**Условие задачи:**  \n📌 Есть таблицы `department` и `users`.  \nНужно вывести **департаменты**, в которых **количество сотрудников больше 3**.\n\n**Схема данных:**\n\n```sql\nCREATE TABLE department (\n    department_id BIGINT PRIMARY KEY,\n    department_name VARCHAR(255)\n);\n\nCREATE TABLE users (\n    user_id BIGINT PRIMARY KEY,\n    full_name VARCHAR(255),\n    department_id BIGINT,\n    CONSTRAINT fk_department\n        FOREIGN KEY (department_id)\n        REFERENCES department(department_id)\n);\n```\n\n---\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Нужно посчитать количество сотрудников по каждому департаменту.  \n💡 Используем `GROUP BY department_id`.  \n💡 Фильтрация по количеству выполняется через `HAVING`, а не `WHERE`.  \n💡 Чтобы вывести название департамента — делаем `JOIN`.  \n{{< /details >}}\n\n---\n\n{{< details \"Решение\" close >}}\n\n```sql\nSELECT\n    d.department_id,\n    d.department_name,\n    COUNT(u.user_id) AS user_count\nFROM department d\nJOIN users u\n  ON u.department_id = d.department_id\nGROUP BY d.department_id, d.department_name\nHAVING COUNT(u.user_id) > 3;\n```\n\n{{< /details >}}"
  filepath = "departments-more-than-three-users"

