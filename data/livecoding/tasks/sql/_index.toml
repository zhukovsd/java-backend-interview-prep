  answer = "1.Необходимо написать запрос, чтобы выбрать всех сотрудников вместе с их зарплатными начислениями. 2.Выбрать сотрудников у которых сумма начислений > 15.\n\nДаны две таблицы :\nPersons со списком работников\n\nid    name\n1    Petya\n2    Vasya\n3    Kolya\n\nPayments с зарплатными начислениями ежемесячно.\n\nid    person_id    Value\n1         1                10\n2         1                20\n3         3                15\n\nСвязь между таблицами один ко многим, причем у сотрудника может быть несколько выплат либо не быть ни одной выплаты, если он только пришел в компанию"
