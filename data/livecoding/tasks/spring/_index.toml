  id = 1
  question = "Спроектировать и реализовать REST API для управления пользователем"
  answer = "**Описание**  \nНужно спроектировать и реализовать **REST API** для управления пользователями:\n\n- создать пользователя\n- получить пользователя по id\n- получить список пользователей\n- обновить пользователя\n- удалить пользователя\n\nВ рамках задания используем Spring Boot (без БД можно в памяти, но можно легко заменить на JPA).\n\n**Модель `User`:**\n\n```java\npublic class User {\n    private Long id;\n    private String name;\n    private String email;\n    private Integer age;\n\n    // getters/setters/constructors\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для REST API обычно делают `@RestController` и маппинги `POST/GET/PUT/DELETE`.  \n💡 Валидацию DTO удобно делать через `@Valid` + `@NotBlank/@Email/@Min`.  \n💡 Хранилище можно сделать на `ConcurrentHashMap<Long, User>` + генерация id через `AtomicLong`.  \n💡 Для ошибок хорошо вернуть `404` если не нашли, и `400` если валидация не прошла.  \n💡 Для ручных тестов удобно подготовить `.http` файлы (IDEA умеет выполнять).  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nНиже пример простого решения “в памяти” (без БД), но с корректными HTTP-статусами и DTO-валидацией.\n\n1. DTO + модель\n    \n\n```java\nimport jakarta.validation.constraints.Email;\nimport jakarta.validation.constraints.Min;\nimport jakarta.validation.constraints.NotBlank;\n\npublic class UserDto {\n    @NotBlank\n    private String name;\n\n    @Email\n    @NotBlank\n    private String email;\n\n    @Min(0)\n    private Integer age;\n\n    // getters/setters\n}\n```\n\n```java\npublic class User {\n    private Long id;\n    private String name;\n    private String email;\n    private Integer age;\n\n    public User() {}\n\n    public User(Long id, String name, String email, Integer age) {\n        this.id = id;\n        this.name = name;\n        this.email = email;\n        this.age = age;\n    }\n\n    // getters/setters\n}\n```\n\n2. Service (в памяти)\n    \n\n```java\nimport org.springframework.stereotype.Service;\n\nimport java.util.*;\nimport java.util.concurrent.ConcurrentHashMap;\nimport java.util.concurrent.atomic.AtomicLong;\n\n@Service\npublic class UserService {\n    private final Map<Long, User> storage = new ConcurrentHashMap<>();\n    private final AtomicLong idSeq = new AtomicLong(0);\n\n    public User create(UserDto dto) {\n        long id = idSeq.incrementAndGet();\n        User user = new User(id, dto.getName(), dto.getEmail(), dto.getAge());\n        storage.put(id, user);\n        return user;\n    }\n\n    public User getById(long id) {\n        User user = storage.get(id);\n        if (user == null) {\n            throw new NoSuchElementException(\"User not found: \" + id);\n        }\n        return user;\n    }\n\n    public List<User> getAll() {\n        return storage.values().stream()\n                .sorted(Comparator.comparing(User::getId))\n                .toList();\n    }\n\n    public User update(long id, UserDto dto) {\n        User existing = getById(id);\n        existing.setName(dto.getName());\n        existing.setEmail(dto.getEmail());\n        existing.setAge(dto.getAge());\n        storage.put(id, existing);\n        return existing;\n    }\n\n    public void delete(long id) {\n        if (storage.remove(id) == null) {\n            throw new NoSuchElementException(\"User not found: \" + id);\n        }\n    }\n}\n```\n\n3. Controller\n    \n\n```java\nimport jakarta.validation.Valid;\nimport org.springframework.http.HttpStatus;\nimport org.springframework.web.bind.annotation.*;\n\nimport java.util.List;\nimport java.util.NoSuchElementException;\n\n@RestController\n@RequestMapping(\"/api/users\")\npublic class UserController {\n\n    private final UserService service;\n\n    public UserController(UserService service) {\n        this.service = service;\n    }\n\n    @PostMapping\n    @ResponseStatus(HttpStatus.CREATED)\n    public User create(@Valid @RequestBody UserDto dto) {\n        return service.create(dto);\n    }\n\n    @GetMapping(\"/{id}\")\n    public User getById(@PathVariable long id) {\n        return service.getById(id);\n    }\n\n    @GetMapping\n    public List<User> getAll() {\n        return service.getAll();\n    }\n\n    @PutMapping(\"/{id}\")\n    public User update(@PathVariable long id, @Valid @RequestBody UserDto dto) {\n        return service.update(id, dto);\n    }\n\n    @DeleteMapping(\"/{id}\")\n    @ResponseStatus(HttpStatus.NO_CONTENT)\n    public void delete(@PathVariable long id) {\n        service.delete(id);\n    }\n\n    @ResponseStatus(HttpStatus.NOT_FOUND)\n    @ExceptionHandler(NoSuchElementException.class)\n    public String handleNotFound(NoSuchElementException e) {\n        return e.getMessage();\n    }\n}\n```\n\n4. .http файлы для ручных тестов API\n    \n\n`users-create.http`\n\n```http\nPOST http://localhost:8080/api/users\nContent-Type: application/json\n\n{\n  \"name\": \"Alice\",\n  \"email\": \"alice@mail.com\",\n  \"age\": 25\n}\n```\n\n`users-get.http`\n\n```http\nGET http://localhost:8080/api/users/1\n\nGET http://localhost:8080/api/users\n```\n\n`users-update.http`\n\n```http\nPUT http://localhost:8080/api/users/1\nContent-Type: application/json\n\n{\n  \"name\": \"Alice Updated\",\n  \"email\": \"alice.updated@mail.com\",\n  \"age\": 26\n}\n```\n\n`users-delete.http`\n\n```http\nDELETE http://localhost:8080/api/users/1\n```\n\n{{< /details >}}"
  filepath = "api-user-management"

[[tasks]]
  id = 2
  question = "Реализовать класс-сервис для работы с токенами с ограничением на количество использований"
  answer = "{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n\n- Для реализации сервиса с токенами нужно создать структуру данных, которая будет отслеживать количество использований токенов.\n- Можно использовать **HashMap** или **Redis** для хранения токенов с их статусами.\n- Нужно хранить:\n    - Токен (например, строка).\n    - Количество оставшихся использований для этого токена.\n- После использования токена количество оставшихся использований уменьшается.\n- Если количество использований исчерпано, токен становится невалидным.\n- Пример ограничения использования токенов:\n    - Токен может быть использован 5 раз.\n    - После пятого использования токен становится недействительным.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nПример реализации сервиса для работы с токенами:\n\n```java\nimport java.util.HashMap;\nimport java.util.Map;\n\n@Service\npublic class TokenService {\n\n    private final Map<String, Token> tokenStorage = new HashMap<>();\n    private final int maxUses = 5; // Максимальное количество использований токена\n\n    // Метод для создания токена\n    public String generateToken() {\n        String token = \"token-\" + System.currentTimeMillis();\n        tokenStorage.put(token, new Token(token, maxUses));\n        return token;\n    }\n\n    // Метод для использования токена\n    public boolean useToken(String token) {\n        Token tokenData = tokenStorage.get(token);\n        if (tokenData == null || tokenData.getRemainingUses() <= 0) {\n            return false; // Токен не существует или исчерпано количество использований\n        }\n        \n        // Уменьшаем количество оставшихся использований\n        tokenData.decreaseRemainingUses();\n        return true;\n    }\n\n    // Метод для проверки количества оставшихся использований\n    public int getRemainingUses(String token) {\n        Token tokenData = tokenStorage.get(token);\n        if (tokenData == null) {\n            return 0; // Токен не найден\n        }\n        return tokenData.getRemainingUses();\n    }\n\n    // Вспомогательный класс для представления токена\n    private static class Token {\n        private final String token;\n        private int remainingUses;\n\n        public Token(String token, int remainingUses) {\n            this.token = token;\n            this.remainingUses = remainingUses;\n        }\n\n        public String getToken() {\n            return token;\n        }\n\n        public int getRemainingUses() {\n            return remainingUses;\n        }\n\n        public void decreaseRemainingUses() {\n            this.remainingUses--;\n        }\n    }\n}\n```\n\n **Описание работы:**\n\n- В **TokenService** используется **Map** для хранения токенов, где ключом является сам токен, а значением — объект **Token**, который содержит информацию о токене и количестве оставшихся использований.\n- Метод **generateToken()** генерирует новый токен с максимальным количеством использований.\n- Метод **useToken(String token)** проверяет, был ли токен использован меньше максимального числа раз, и если да, то уменьшает оставшееся количество использований. Если токен исчерпан или не существует, метод возвращает **false**.\n- Метод **getRemainingUses(String token)** возвращает количество оставшихся использований для токена.\n- Вспомогательный класс **Token** инкапсулирует данные о токене и реализует логику уменьшения оставшихся использований.\n\n **Пример использования:**\n\n```java\npublic class Main {\n    public static void main(String[] args) {\n        TokenService tokenService = new TokenService();\n        \n        // Генерация токена\n        String token = tokenService.generateToken();\n        System.out.println(\"Generated token: \" + token);\n\n        // Проверка оставшихся использований\n        System.out.println(\"Remaining uses: \" + tokenService.getRemainingUses(token));\n\n        // Использование токена несколько раз\n        for (int i = 0; i < 6; i++) {\n            boolean result = tokenService.useToken(token);\n            System.out.println(\"Use token \" + (i+1) + \": \" + result);\n        }\n\n        // Проверка оставшихся использований после исчерпания\n        System.out.println(\"Remaining uses after attempts: \" + tokenService.getRemainingUses(token));\n    }\n}\n```\n\n **Ключевые моменты:**\n\n- **HashMap** используется для хранения токенов и их состояний (сколько раз их можно использовать).\n- При каждом использовании токена уменьшается его количество использований.\n- **Token** — это вспомогательный класс, который инкапсулирует логику работы с токенами.\n- Если количество использований токена исчерпано, токен становится невалидным.\n- Можно добавить дополнительную логику для удаления неактивных токенов по истечении срока действия или по количеству использований.\n{{< /details >}}"
  filepath = "token-limited-usage"

[[tasks]]
  id = 3
  question = "Спроектировать и реализовать REST API для управления договорами"
  answer = "**Описание**  \nСпроектировать REST Controller, который:\n\n- создаёт новый договор\n- возвращает договор по номеру договора\n\nВ описании задачи предоставить модель `Contract`.\n\n**Модель `Contract`:**\n\n```java\npublic class Contract {\n    private Long id;\n    private String number;     // номер договора (уникальный)\n    private String clientId;   // идентификатор клиента\n    private String status;     // например: NEW, ACTIVE, CLOSED\n    private java.time.Instant createdAt;\n\n    // getters/setters/constructors\n}\n```\n\n{{< hint warning >}}  \n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}  \n💡 Для создания договора обычно используют `POST /api/contracts`.  \n💡 Получение договора по номеру удобно сделать как `GET /api/contracts/{number}`.  \n💡 Лучше принимать на вход `ContractCreateDto`, а наружу отдавать `ContractResponseDto`.  \n💡 Номер договора стоит валидировать (`@NotBlank`) и сделать уникальным (если есть БД — unique constraint).  \n💡 Если договор не найден — возвращать `404 Not Found`.  \n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\nDTO:\n\n```java\nimport jakarta.validation.constraints.NotBlank;\n\npublic class ContractCreateDto {\n    @NotBlank\n    private String number;\n\n    @NotBlank\n    private String clientId;\n\n    // getters/setters\n}\n```\n\n```java\nimport java.time.Instant;\n\npublic class ContractResponseDto {\n    private Long id;\n    private String number;\n    private String clientId;\n    private String status;\n    private Instant createdAt;\n\n    // getters/setters/constructors\n}\n```\n\nService (in-memory пример):\n\n```java\nimport org.springframework.stereotype.Service;\n\nimport java.time.Instant;\nimport java.util.Map;\nimport java.util.NoSuchElementException;\nimport java.util.concurrent.ConcurrentHashMap;\nimport java.util.concurrent.atomic.AtomicLong;\n\n@Service\npublic class ContractService {\n    private final AtomicLong idSeq = new AtomicLong(0);\n    private final Map<String, Contract> byNumber = new ConcurrentHashMap<>();\n\n    public Contract create(ContractCreateDto dto) {\n        if (byNumber.containsKey(dto.getNumber())) {\n            throw new IllegalArgumentException(\"Contract number already exists: \" + dto.getNumber());\n        }\n\n        Contract contract = new Contract();\n        contract.setId(idSeq.incrementAndGet());\n        contract.setNumber(dto.getNumber());\n        contract.setClientId(dto.getClientId());\n        contract.setStatus(\"NEW\");\n        contract.setCreatedAt(Instant.now());\n\n        byNumber.put(contract.getNumber(), contract);\n        return contract;\n    }\n\n    public Contract getByNumber(String number) {\n        Contract c = byNumber.get(number);\n        if (c == null) {\n            throw new NoSuchElementException(\"Contract not found: \" + number);\n        }\n        return c;\n    }\n}\n```\n\nController:\n\n```java\nimport jakarta.validation.Valid;\nimport org.springframework.http.HttpStatus;\nimport org.springframework.web.bind.annotation.*;\n\nimport java.util.NoSuchElementException;\n\n@RestController\n@RequestMapping(\"/api/contracts\")\npublic class ContractController {\n\n    private final ContractService service;\n\n    public ContractController(ContractService service) {\n        this.service = service;\n    }\n\n    @PostMapping\n    @ResponseStatus(HttpStatus.CREATED)\n    public ContractResponseDto create(@Valid @RequestBody ContractCreateDto dto) {\n        Contract c = service.create(dto);\n        return toResponse(c);\n    }\n\n    @GetMapping(\"/{number}\")\n    public ContractResponseDto getByNumber(@PathVariable String number) {\n        Contract c = service.getByNumber(number);\n        return toResponse(c);\n    }\n\n    @ResponseStatus(HttpStatus.NOT_FOUND)\n    @ExceptionHandler(NoSuchElementException.class)\n    public String notFound(NoSuchElementException e) {\n        return e.getMessage();\n    }\n\n    @ResponseStatus(HttpStatus.CONFLICT)\n    @ExceptionHandler(IllegalArgumentException.class)\n    public String conflict(IllegalArgumentException e) {\n        return e.getMessage();\n    }\n\n    private static ContractResponseDto toResponse(Contract c) {\n        ContractResponseDto dto = new ContractResponseDto();\n        dto.setId(c.getId());\n        dto.setNumber(c.getNumber());\n        dto.setClientId(c.getClientId());\n        dto.setStatus(c.getStatus());\n        dto.setCreatedAt(c.getCreatedAt());\n        return dto;\n    }\n}\n```\n\n`.http` ручные тесты:\n\n`contracts-create.http`\n\n```http\nPOST http://localhost:8080/api/contracts\nContent-Type: application/json\n\n{\n  \"number\": \"CNTR-2026-0001\",\n  \"clientId\": \"client-123\"\n}\n```\n\n`contracts-get.http`\n\n```http\nGET http://localhost:8080/api/contracts/CNTR-2026-0001\n```\n\nКлючевые моменты:\n\n1. `POST /api/contracts` создаёт договор и возвращает `201 Created`.\n    \n2. `GET /api/contracts/{number}` возвращает договор по номеру, иначе `404`.\n    \n3. DTO отделяют вход/выход от внутренней модели.\n    \n4. Проверка уникальности номера даёт `409 Conflict`.\n    \n\n{{< /details >}}"
  filepath = "http-post-contract"

[[tasks]]
  id = 4
  question = "Реализовать REST API для поиска обуви с фильтрацией"
  answer = "**Условие задачи:**  \n👞 **Разработай сервис для поиска обуви!**  \nТебе нужно создать **REST API** с эндпоинтом `POST /api/v1/search`, который принимает запрос с фильтрами и возвращает список подходящих товаров.\n\n🔍 **Фильтрация обуви:**\n\n- **Сапоги** → цвет **красный** или **зелёный**, цена **от 5000 до 20000**.\n- **Туфли** → цена **меньше 10000**.\n\n📩 **Пример запроса:**\n\n```json\n{\n    \"type\": \"сапоги\",\n    \"color\": [\"красный\", \"зелёный\"],\n    \"minPrice\": 5000,\n    \"maxPrice\": 20000\n}\n```\n\n📤 **Пример ответа:**\n\n```json\n[\n    {\n        \"type\": \"сапоги\",\n        \"color\": \"красный\",\n        \"price\": 15000,\n        \"url\": \"https://example.com/shoe1\"\n    },\n    {\n        \"type\": \"сапоги\",\n        \"color\": \"зелёный\",\n        \"price\": 18000,\n        \"url\": \"https://example.com/shoe2\"\n    }\n]\n```\n\n\n\n{{< hint warning >}}\n**Спойлеры к решению**  \n{{< /hint >}}\n\n{{< details \"Подсказки\" close >}}\n💡 **Используй Spring Boot + Spring Data JPA** для работы с БД.  \n💡 **Создай сущность `Shoe`** с полями `type`, `color`, `price`, `url`.  \n💡 **Напиши DTO-классы** для запроса и ответа.  \n💡 **Используй `JpaRepository`** и напиши кастомный метод для поиска.  \n💡 **Контроллер должен принимать JSON-запрос** и возвращать список обуви.\n{{< /details >}}\n\n{{< details \"Решение\" close >}}\n\n📌 **1. Создаём сущность `Shoe`**\n\n```java\nimport jakarta.persistence.*;\nimport lombok.Data;\n\n@Entity\n@Data\npublic class Shoe {\n    @Id\n    @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private Long id;\n    private String type;\n    private String color;\n    private Double price;\n    private String url;\n}\n```\n\n📌 **2. Создаём DTO для запроса**\n\n```java\nimport lombok.Data;\nimport java.util.List;\n\n@Data\npublic class ShoeSearchRequest {\n    private String type;\n    private List<String> color;\n    private Double minPrice;\n    private Double maxPrice;\n}\n```\n\n📌 **3. Создаём DTO для ответа**\n\n```java\nimport lombok.Data;\n\n@Data\npublic class ShoeResponse {\n    private String type;\n    private String color;\n    private Double price;\n    private String url;\n}\n```\n\n📌 **4. Репозиторий с кастомным запросом**\n\n```java\nimport org.springframework.data.jpa.repository.JpaRepository;\nimport org.springframework.data.jpa.repository.Query;\nimport org.springframework.data.repository.query.Param;\nimport java.util.List;\n\npublic interface ShoeRepository extends JpaRepository<Shoe, Long> {\n\n    @Query(\"SELECT s FROM Shoe s WHERE \" +\n           \"(:type IS NULL OR s.type = :type) AND \" +\n           \"(COALESCE(:colors, NULL) IS NULL OR s.color IN :colors) AND \" +\n           \"(s.price BETWEEN :minPrice AND :maxPrice)\")\n    List<Shoe> searchShoes(@Param(\"type\") String type,\n                           @Param(\"colors\") List<String> colors,\n                           @Param(\"minPrice\") Double minPrice,\n                           @Param(\"maxPrice\") Double maxPrice);\n}\n```\n\n📌 **5. Сервисный слой**\n\n```java\nimport org.springframework.stereotype.Service;\nimport java.util.List;\nimport java.util.stream.Collectors;\n\n@Service\npublic class ShoeService {\n    private final ShoeRepository shoeRepository;\n\n    public ShoeService(ShoeRepository shoeRepository) {\n        this.shoeRepository = shoeRepository;\n    }\n\n    public List<ShoeResponse> searchShoes(ShoeSearchRequest request) {\n        List<Shoe> shoes = shoeRepository.searchShoes(\n                request.getType(),\n                request.getColor(),\n                request.getMinPrice() != null ? request.getMinPrice() : 0,\n                request.getMaxPrice() != null ? request.getMaxPrice() : Double.MAX_VALUE\n        );\n\n        return shoes.stream().map(shoe -> {\n            ShoeResponse response = new ShoeResponse();\n            response.setType(shoe.getType());\n            response.setColor(shoe.getColor());\n            response.setPrice(shoe.getPrice());\n            response.setUrl(shoe.getUrl());\n            return response;\n        }).collect(Collectors.toList());\n    }\n}\n```\n\n📌 **6. Контроллер**\n\n```java\nimport org.springframework.web.bind.annotation.*;\nimport java.util.List;\n\n@RestController\n@RequestMapping(\"/api/v1/search\")\npublic class ShoeController {\n    private final ShoeService shoeService;\n\n    public ShoeController(ShoeService shoeService) {\n        this.shoeService = shoeService;\n    }\n\n    @PostMapping\n    public List<ShoeResponse> searchShoes(@RequestBody ShoeSearchRequest request) {\n        return shoeService.searchShoes(request);\n    }\n}\n```\n\n---\n\n🚀 **Что получилось?**  \n✅ **Чистая архитектура**: Контроллер, сервис, репозиторий, DTO.  \n✅ **Гибкий поиск**: Можно искать не только по заданным условиям, но и добавлять новые фильтры.  \n✅ **Использование `Spring Data JPA`** для удобного запроса к БД.\n{{< /details >}}"
  filepath = "shoes-service"

