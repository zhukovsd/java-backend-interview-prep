[[questions]]
  id = 1
  question = "Что такое ООП?"
  answer = "это парадигма программирования, центральное место в которой занимает объект. Программа - совокупность объектов (экземпляров класса). Класс - шаблон для создания объекта, характеризующийся полями и методами"
  popularity = 3.83

[[questions]]
  id = 2
  question = "Плюсы и минусы ООП"
  answer = "Плюсы:\n\n- разделение на модули-классы, каждый из которых отвечает за отдельную часть работы\n- удобство декомпозиции объектов реального мира на модели в коде (код легко читается и быстро пишется)\n- возможность переиспользования кода (экономия времени на однотипных функциях)\n- возможность создавать расширяемые системы (extensible systems), это отличает ООП от других парадигм программирования\n\nМинусы:\n\n- снижение производительности приложений, рост потребляемой памяти (\"размазывание\" логики по множеству объектов -> увеличение ссылок друг на друга)"
  popularity = 0.35

[[questions]]
  id = 3
  question = "Принципы ООП (наследование, инкапсуляция, полиморфизм, абстракция)"
  answer = "**Наследование** - принцип расширения возможностей базового (родительского класса) дочерним с возможностью переиспользовать и/или переопределить методы родителя.\n\n**Инкапсуляция** - принцип \"упаковки\" и сокрытия внутренних свойств и логики поведения объекта от пользователя. При этом пользователю предоставляются API - внешние ручки для взаимодействия.\n\n**Полиморфизм** (от лат. \"поли\" - много и \"морф\" - форма) - это способность объектов принимать разные \"формы\", т.е. объект одного может выступать как объект другого класса (за счёт наследования или реализации интерфейса).\n  + динамический (рантайм) - достигается путём переопределения методов в подклассах (`@Override` в Java), решение о том, какая именная реализация метода будет вызвана, принимается во время выполнения программы\n  + статический (на этапе компиляции) - достигается путём перегрузки методов (разные сигнатуры метода с одним именем) или использованием дженериков\n  \n**Абстракция** - это выделение общих свойств сущностей в отдельный класс."
  popularity = 10.1

[[questions]]
  id = 4
  question = "Класс, объект, интерфейс"
  answer = "**Класс** - это шаблон/спецификация, по которым должен создаваться объект, описание его свойств и методов. Состоит из:\n- методов (в т.ч. конструктора)\n- полей\n**Объект** - экземпляр класса.\n**Интерфейс** - контракт/спецификация, которой должен следовать реализующий класс и, соответственно, объекты этого класса."
  popularity = 0.35

[[questions]]
  id = 5
  question = "Ассоциация, агрегация, композиция"
  answer = "**Ассоциация** - означает, что объекты двух классов могут ссылаться один на другой, иметь связь друг с другом. Один класс включает в себя другой класс в качестве одного из полей.\nАгрегация и композиция являются частными случаями ассоциации. \n\n**Агрегация** - отношение, когда один объект является частью другого (двигатель поставили в одну машину, потом в другую).\n\n**Композиция** - это более жёсткое отношение, когда объект не только является частью другого объекта, но и вообще не может принадлежать кому-то (страница принадлежит только одной книге)."
  popularity = 1.05

[[questions]]
  id = 6
  question = "Статическое и динамическое связывание"
  answer = "**Связывание** - процесс, в ходе которого программа решает, какой метод или переменная должна быть вызвана или использована. Связывание бывает:\n  - Раннее статическое.  Если метод известен компилятору, то происходит на этапе компиляции. Применяется для дженериков, перегруженных, `private`, `final` и `static` методов. Используются не объекты, а информация о типе, то есть ссылка\n  -  Позднее динамическое. Происходит во время выполнения программы JVM. Используется для абстрактных и переопределенных методов\n "
  popularity = 1.05

[[questions]]
  id = 7
  question = "Является – «is a», имеет – «has a»"
  answer = "**Наследование** («is a» - ЯВЛЯТЕТСЯ) - обобщение/расширение, очень сильная связь.\n**Ассоциация** («has a» ИМЕЕТ) - объекты имеют ссылки друг на друга\n"
  popularity = 0.35
