[[questions]]
  id = 4
  question = "Расскажите про принцип PECS"
  answer = "Producer Extends, Consumer - Super:\n- если мы объявили wildcard с `extends`, то это **producer**. Он только «продюсирует», предоставляет элемент из контейнера, а сам ничего не принимает\n- если же мы объявили wildcard с `super`, то это **consumer**. Он только принимает, а предоставить ничего не может\n\nДля совмещения обеих возможностей необходимо использовать конкретный тип, а не wildcard.\n\n{{< figure src=\"/pecs.png\" title=\"\" >}}\n\nАльтернативным вариантом является применение паттерна wildcard capture.\nНа примере ниже для реверсирования коллекции с wildcard мы создаем обобщенный метод `rev`. Он объявлен с переменной типа `T`. Этот метод принимает список типов `T`, и мы можем сделать сет. При вызове метода `reverse(List<?> list)` в качестве аргумента передается список каких-то объектов (например, строк или целых чисел). Если мы можем захватить тип этих объектов и присвоить его переменной типа `X`, то можем заключить, что `T` является `X`.\n```java\npublic static void reverse(List<?> list) {\n  rev(list);\n}\n\nprivate static <T> void rev(List<T> list) {\n        List<T> tmp = new ArrayList<>(list);\n        for (int i = 0; i < list.size(); i++) {\n    list.set(i, tmp.get(list.size()-i-1));\n        }\n}\n```\n"
  popularity = 4.18

[[questions]]
  id = 5
  question = "Расскажите про класс Optional"
  answer = "Optional - класс-обертка. Он помогает избежать ошибок, связанных с null\n\n**Что делает `Optional.flatMap()`?**\n`Optional.flatMap()` используется для работы с вложенными объектами `Optional`, помогая избежать двойной обёртки, т.е. убирает вложенность: превращает  `Optional<Optional<T>>` в `Optional<T>`\n```java\nOptional<String> getNestedValue(Optional<Optional<String>> nestedOpt) {\n    return nestedOpt.flatMap(opt -> opt);\n}\n```\nИспользовать `map`, если функция возвращает нужный вам объект, или `flatMap`, если функция возвращает `Optional` объект\n"
  popularity = 4.53

[[questions]]
  id = 6
  question = "Что такое стирание типов (Type Erasure) в Java Generics"
  answer = "JVM не хранит информацию о параметризованных типах в рантайме. Все операции с дженериками преобразуются в операции с “сырыми типами” (raw types) на этапе компиляции (стирание типов)\n\n**Что такое стирание типов?**\nСтирание типов (Type Erasure) - процесс, при котором информация о дженериках удаляется во время компиляции. JVM видит только “сырой” тип\n\n**Generics. Можно ли получить тип в рантайме?**\nВ общем случае нет. В Java используется **стирание типов** (Type Erasure), что означает, что информация о параметризованных типах удаляется после компиляции. На этапе выполнения JVM работает только с “сырыми типами”\n\n**Исключение:** Можно сохранить информацию о типах с помощью рефлексии или через использование классов-обёрток\n\nПример с `TypeToken`:\n```java\nimport java.lang.reflect.Type;\nimport com.google.gson.reflect.TypeToken;\n\nType type = new TypeToken<List<String>>(){}.getType();\nSystem.out.println(type); // java.util.List<java.lang.String>\n```\n\nТабличка терминов по теме\n\n| **Термин**                                  | **Расшифровка**                                                                                                              |\n| ------------------------------------------- | ---------------------------------------------------------------------------------------------------------------------------- |\n| Дженерик-типы (generic types)               | Дженерик-класс или дженерик-интерфейс с одним или несколькими параметрами в заголовке                                        |\n| Параметризованный тип (parameterized types) | Вызов дженерик-типа. Для дженерик-типа `List<E>` параметризованным типом будет, например, `List<Integer>`                    |\n| Параметр типа (type parameter)              | Используются при объявлении дженерик-типов. Для List`<E>` E - это параметр типа                                              |\n| Аргумент типа (type argument)               | Тип объекта, который может использоваться вместо параметра типа. Например, для List`<Integer>` `Integer` - это аргумент типа |\n| Wildcard                                    | Обозначается символом «?» - неизвестный тип                                                                                  |\n| Ограниченный wildcard (bounded wildcard)    | Ограниченный сверху  `<? extends Citrus>` снизу - `<? super Orange>`                                                         |\n| Сырой тип (raw type)                        | Имя дженерик-типа без аргументов типа. Для `List<E>` сырой тип - это `List`                                                  |\n| Универсальный параметр                      | <T>, <E> и т.д. в объявлении классов, интерфейсов, методов                                                                   |"
  popularity = 3.48
