[[questions]]
  id = 27
  question = "Что можно изменить в сигнатуре метода при переопределении? Можно ли менять модификаторы (throws и т. п.)?"
  answer = "Согласно спецификации Java, сигнатура состоит из имени метода, списка параметров и их типов (порядок типов важен). Сюда не входит возвращаемое значение, модификатор доступа и перечисление выбрасываемых исключений.\n\nПоэтому именно в самой сигнатуре при переопределении методов ничего менять нельзя.\nМожно:\n- расширить уровень доступа\n- сузить тип возвращаемого значения\n- не указывать исключения, которые были объявлены в родительском классе\n- добавить новые исключения, которые являются наследниками родительского, либо те, что наследуются от RuntimeException"
