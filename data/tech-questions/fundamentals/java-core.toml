  answer = "String в Java - это объект. Сравнение через оператор `==` сравнивает строки по ссылкам объектов - если ссылки равны, то строки равны, в остальных случаях не равны. Нужно использовать `equals()` и производные методы для сравнения содержимого.\n\nКласс String - immutable из-за модификатора final и отсутствия сеттера. При редактировании строк будет создаваться новая строка."
