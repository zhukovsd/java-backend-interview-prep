  question = "Что такое аннотация? Зачем нужна? Как создать свою аннотацию?"
  answer = "Аннотация - это механизм пометки классов, методов и полей дополнительной информацией для компилятора, инструментов разработки и фреймворков\n\n**Основные аннотации в Java**  \n\n|Аннотация|Описание|\n|---|---|\n|`@Override`|Проверяет, что метод переопределяет метод суперкласса.|\n|`@Deprecated`|Отмечает метод/класс устаревшим, чтобы не использовать его в будущем.|\n|`@SuppressWarnings`|Подавляет определенные предупреждения компилятора.|\n|`@FunctionalInterface`|Показывает, что интерфейс является функциональным (с одним абстрактным методом).|\n|`@SafeVarargs`|Подавляет предупреждения о небезопасных операциях с аргументами переменной длины (varargs).|\n|`@Native`|Используется для констант, предназначенных для взаимодействия с нативным кодом.|\n\n**Метаданные аннотаций (`Retention`, `Target`)**  \nКогда мы создаем свою аннотацию, важно понимать, как она будет использоваться. Это задается с помощью **мета-аннотаций**:\n\n|Аннотация|Описание|\n|---|---|\n|`@Retention`|Определяет, на каком этапе жизненного цикла аннотация доступна (SOURCE, CLASS, RUNTIME).|\n|`@Target`|Указывает, к чему можно применять аннотацию (методы, поля, классы и т. д.).|\n|`@Documented`|Включает аннотацию в Javadoc.|\n|`@Inherited`|Наследуется ли аннотация подклассами.|\n|`@Repeatable`|Позволяет применять одну и ту же аннотацию несколько раз.|\n\n**Как создать свою аннотацию?**\n```java\nimport java.lang.annotation.*;\n\n@Retention(RetentionPolicy.RUNTIME)\n@Target(ElementType.METHOD)\n@interface MyAnnotation {\n    String value();\n    int count() default 1;\n}\n\nclass Example {\n    @MyAnnotation(value = \"Hello\", count = 3)\n    public void test() {\n        System.out.println(\"Метод с аннотацией\");\n    }\n}\n```\n\n**Чтение аннотации с помощью рефлексии**\n```java\nimport java.lang.reflect.Method;\n\npublic class Main {\n    public static void main(String[] args) throws Exception {\n        Method method = Example.class.getMethod(\"test\");\n        MyAnnotation annotation = method.getAnnotation(MyAnnotation.class);\n        System.out.println(\"value: \" + annotation.value());  // \"Hello\"\n        System.out.println(\"count: \" + annotation.count());  // 3\n    }\n}\n```\n\n**Где используются аннотации в реальных проектах?**\nLombok, JUnit, Spring\n"
  popularity = 3.83

[[questions]]
  id = 47
  question = "Переопределение и перегрузка методов"
  answer = "**Переопределение метода** - это замена реализации метода класса-родителя в классе-наследнике. Правила\n- метод должен иметь точно такое же имя, тип возвращаемого значения и аргументы.;\n- метод в родительском классе не должен быть private;\n- должен происходить в наследуемом классе;\n- аннотация `@Override` рекомендуется (не обязательна, но помогает избежать ошибок).\n\n**Перегрузка метода** - это создание в классе нескольких методов с одним именем, но различными сигнатурами. Правила:\n- имена методов одинаковые;\n- различие - в количестве, типах или порядке аргументов (любая комбинация этих способов);\n- возвращаемый тип может быть любым, но не используется для различия перегрузки."
  popularity = 4.88

[[questions]]
  id = 48
  question = "ClassLoader в Java"
  answer = "ClassLoader (загрузчик классов) - это специальный компонент JVM, предназначенный для загрузки классов в память во время выполнения программы. Загружает классы, соблюдая иерархию и принцип делегирования.\n\nИерархия загрузчиков:\n1. Bootstrap - загружает базовые классы (`java.lang.*`, `java.util.*`)\n2. Platform (Extension до Java 9) - загружает модули платформы\n3. Application/System - загружает классы из classpath\n4. Custom - зависит от реализации\n\nПринцип делегирования - перед тем как загрузить класс, загрузчик обращается в вышестоящему по иерархии и спрашивает, не загрузил ли он уже такой класс, чтобы не загружать класс дважды."
  popularity = 3.48

[[questions]]
  id = 49
  question = "В чем разница сравнений по equals и \"==\"?"
  answer = "Оператор `==` сравнивает ссылки на объекты.\nМетод `equals()` сравнивает объекты по содержимому, если правильно переопределён, потому что по умолчанию (наследуется от `Object`) реализация метода сводится к\n```java\npublic boolean equals(Object obj) {  \n\treturn (this == obj);  \n}\n```"
  popularity = 3.14
