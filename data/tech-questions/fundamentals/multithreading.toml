[[questions]]
  id = 1
  question = "Что такое многопоточность?"
  answer = "Возможность программы выполнять несколько блоков одновременно\n\n---\n**Что такое поток?**\nПоток (thread) - это независимая единица исполнения инструкций в рамках одной программы. Потоки позволяют выполнять несколько задач одновременно, используя возможности многоядерных процессоров\n\n**Основные характеристики потока**:\n1. Поток выполняется в рамках одного процесса и использует его память\n2. У каждого потока есть своё выполнение\n3. Имеет доступ к общей памяти\n\n**Зачем нужны потоки?**\nПотоки нужны для реализации многозадачности, то есть выполнения нескольких операций одновременно. Это особенно полезно для:\n1. увеличения производительности на многоядерных процессорах\n2. улучшения отзывчивости программ (например, в GUI приложения можно выполнять долгие операции в фоновом потоке, чтобы интерфейс не зависал)\n3. асинхронной обработки (например, чтение/запись файлов, работа с сетью)\n"
  popularity = 1.39

[[questions]]
  id = 2
  question = "Чем процесс отличается от потока?"
  answer = "**Процесс** - независимый экземпляр выполняемой программы со своими выделенными системой ресурсами\n**Поток (Thread/нить)** - способ выполнения процесса, определяющий последовательность исполнения кода в процессе. Поток всегда создаётся в контексте какого-либо процесса"
  popularity = 3.14

[[questions]]
  id = 3
  question = "Чем Thread отличается от Runnable? Когда использовать Thread, а когда Runnable?"
  answer = "**Thread** - класс, представляющий собой надстройку над физическим потоком/нитью. Используется, когда нужно управлять непосредственно состоянием потока\n**Runnable** - функциональный интерфейс, реализации которого представляют собой абстракцию над задачей (код, набор инструкций), которая может быть выполнена внутри потока. Используется как задача для исполнения, может быть передана нескольким потокам, более гибок\n"
  popularity = 0.35

[[questions]]
  id = 4
  question = "Что такое монитор? Как реализован в Java?"
  answer = "Монитор - механизм синхронизации в Java. Каждый объект, наследующийся от Object неявно имеет монитор. Когда какой-либо поток захватывает монитор (через блок `synchronized`), то остальные потоки не могут взаимодействовать с этим объектом пока монитор не будет освобождён захватившим потоком\n"
  popularity = 1.74

[[questions]]
  id = 5
  question = "Что такое синхронизация? Какие способы синхронизации существуют в Java?"
  answer = "Синхронизация (потоков) - это механизм координации доступа нескольких потоков с целью предотвратить Race Condition и обеспечить согласованность памяти. Достигается через блокировки и области видимости\n\n**Системная синхронизация**\nВ Java оператор `synchronized(obj)` привязывает блок кода к определённому потоку, захватывая монитор объекта `obj` и исключая доступ к нему других потоков в этот момент. Если этот поток должен ожидать выполнения каких-то условий, то он должен вызвать у `obj` метод `wait()` - работа потока приостанавливается (он “засыпает”), он отпускает захваченный монитор.\nДругой поток может вызвать на этом же объекте метод `notify()`, предварительно захватив его монитор, в результате чего ждущий на `obj` поток «просыпается» и продолжает своё выполнение\n\n**ВАЖНО**:\n- методы `wait()` и `notify()` не синхронизированы, поэтому их можно вызвать только внутри `synchronized`-блока. В противном случае в рантайме будет выброшено `IllegalMonitorException: current thread is not owner`\n- после вызова `notify()` спящий поток “просыпается” не ранее, чем поток, вызвавший `notify()` , выйдет из блока synchronized (т.е. только после того, как им будет отпущен монитор)\n```java\npublic class Counter {\n    private int count;\n    public synchronized void increment() { \n        count++;\n    }\n}\n\nэквивалентно\n\npublic class Counter {\n    private int count;\n    public void increment() { \n\t\t    synchronized (this) {\n\t        count++;\n        }\n    }\n}\n```\n\nОсобенности `syncronized` в зависимости от места объявления:\n- блок кода - необходимо явно указывать объект синхронизации в круглых скобках\n- нестатический метод - синхронизация на экземпляре (`this`)\n- статический метод - синхронизация на объекте класса  (`ClassName.class`), т.е. синхронизация происходит на уровне класса и распространяется на все экземпляры\n\n**Метод `Thread.join()`**\nПоток вызвавший этот метод будет ждать до тех пор, пока объект, у которого был вызван этот метод не закончит свое выполнение\n```java\npublic static void main(String[] args) {\n        SimpleThread simpleThread = new SimpleThread();\n        simpleThread.start();\n        try {\n            simpleThread.join(); //До тех пор, пока этот поток не завершит свою работу - мы не пойдем дальше\n        } catch (InterruptedException e) {\n            throw new RuntimeException(e);\n        }\n        System.out.println(Thread.currentThread().getName());\n    }\n```\n\n**Классы из пакета `java.util.concurrent`**\n`ReentrantLock`, `Semaphore`, `CyclicBarrier`. Концепция данного подхода заключается в использовании атомарных операций и переменных\n\n[Статья на хабре про виды синхронизаторов java.util.concurrent](https://habr.com/ru/articles/277669/)\n"
  popularity = 15.33

[[questions]]
  id = 6
  question = "Что такое FutureTask?"
  answer = "`Future` - это интерфейс, отражающий результат асинхронного выполнения задачи, предоставляет методы для работы с асинхронными результатами. Используется в комбинации с `ExecutorService` или другими асинхронными API\n\n`FutureTask` - это базовая реализация интерфейса `Future`. Позволяет выполнять задачу асинхронно, а затем получить её результат или обработать исключения. Если задача ещё не закончена, попытка получить результат приостановит (заблокирует) выполнение, пока задача не завершится\nРеализует интерфейс `RunnableFuture`, который объединяет функциональность интерфейсов `Runnable` и `Future`\n"
  popularity = 2.44

[[questions]]
  id = 7
  question = "Что такое CompletableFuture?"
  answer = "`CompletableFuture` - это расширенная реализация интерфейса `Future`, которая добавляет возможность функционального программирования и работы с несколькими асинхронными задачами\n\n**Сравнение `FutureTask`, `Future` и `CompletableFuture`**\n\n|**Особенность**|**FutureTask**|**CompletableFuture**|\n|---|---|---|\n|Асинхронное выполнение|Да|Да|\n|Получение результата|`get()`|Неблокирующие методы (`thenApply`)|\n|Отмена задачи|Да|Да|\n|Композиция задач|Нет|Да (`thenCombine`, `allOf`, `anyOf`)|\n|Функциональный стиль|Нет|Да|\n|Сложность|Простая|Расширенная функциональность|\n\n1. `Future` - интерфейс для асинхронных операций, с базовыми методами (`get`, `cancel`)\n2. `FutureTask` - комбинация `Runnable` и `Future`, используется для выполнения асинхронных задач вручную\n3. `CompletableFuture` - современный и мощный инструмент для асинхронного программирования с поддержкой композиции и функционального стиля\n"
  popularity = 5.57

[[questions]]
  id = 8
  question = "Что такое ExecutorService?"
  answer = "`ExecutorService` - это интерфейс, определяющий сервис для работы с асинхронными задачами, т.е. контракт для сервиса, который управляет пулом асинхронных задач.\n"
  popularity = 6.97

[[questions]]
  id = 9
  question = "Как работать с коллекциями в многопоточном программировании?"
  answer = "- Превратить обычную коллекцию в синхронизированную, с помощью Collections.synchronized()\n    `List<String> list = Collections.synchronizedList(new ArrayList<>())`\n- Использование Concurrent-коллекций\n    - `CopyOnWriteArrayList`, `CopyOnWriteArraySet`\n    - Неблокирующие хеш-таблицы (`ConcurrentHashMap`, `ConcurrentSkipListMap`, ConcurrentSkipListSet`)`\n    - Неблокирующие очереди (`ConcurrentLinkedQueue` и `ConcurrentLinkedDeque`)\n\n**Почему мы должны использовать потокобезопасные коллекции?**\nКогда несколько потоков одновременно обращаются к одной и той же коллекции, возможно возникновение **состояния гонки (race condition)**, приводящих к следующим проблемам:\n1. **искажение данных** - одновременная модификация может нарушить целостность данных\n2. **исключения** - например, `ConcurrentModificationException`, когда один поток перебирает коллекцию, а другой изменяет её структуру\n3. **непредсказуемое поведение** - результат работы программы становится нестабильным\n\n**CopyOnWriteCollections. Что это? Как происходит запись?**\nЭто потокобезопасные коллекции (`CopyOnWriteArrayList`, `CopyOnWriteArraySet`). Как происходит запись:\n- При добавлении элемента создается копия всей коллекции с добавленным изменением\n- После завершения операции, оригинальная коллекция заменяется на новую копию, а все другие потоки продолжают работать со старой версией, пока новая не станет доступной\n_Прим.: стоит использовать, когда в программе много операций чтения_\n\n**ConcurrentHashMap. Что это? Как происходит запись?**\nЭто потокобезопасная реализация хеш-таблицы. Как происходит запись:\n- хеширование ключа - сначала вычисляется хеш-код ключа, что бы определить, в какой бакет хеш-таблицы попадет этот элемент\n- блокировка бакета - блокируется только тот бакет, в который будет добавлен элемент (если бакет пустой, то применяется CAS-вставка без блокировки)\n- добавление элемента - элемент добавляется, блокировка с бакета снимается\n\n_Прим_.: _на самом деле блокируется не бакет (т.к. это вообще абстракция), а первый его элемент_\n_Прим.2: до Java 8 ConcurrentHashMap делил внутреннюю таблицу на сегменты (Segment[]). Каждый сегмент представлял собой небольшую хэш-таблицу с отдельной блокировкой (ReentrantLock). Когда поток записывал данные, блокировался только сегмент, содержащий нужный ключ. Это позволяло нескольким потокам одновременно работать с разными сегментами. Устаревший механизм сегментов усложнял архитектуру и ограничивал параллелизм, поэтому был упразднён._\n"
  popularity = 4.88

