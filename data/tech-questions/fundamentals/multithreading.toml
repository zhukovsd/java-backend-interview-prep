[[questions]]
  id = 14
  question = "Atomic vs Volatile. Что это и когда использовать?"
  answer = "`Atomic` классы (AtomicInteger, AtomicLong, и т.д.) предоставляют возможность совершать неатомарные операции с примитивами (инкремент, декремент, сравнение и замена) атомарно. Они используют механизмы Compare-And-Swap (CAS) для обеспечения безопасности операции над переменными в многопоточной среде без явной синхронизации. Могут повышать быстродействие за счёт отсутствия явной синхронизации и реализации CAS на уровне архитектуры процессора\n\n`volatile` - ключевое слово, которое гарантирует, что значение переменной всегда будет читаться из главной памяти, а не из кэша потока. Каждый поток будет видеть актуальное значение `volatile` переменной, но если два потока одновременно изменяют переменную, могут возникнуть проблемы\n\n**Когда что использовать?**\n- `volatile` - когда достаточно гарантировать только видимость изменений (например, для флагов завершения или состояния)\n- `Atomic` - когда требуется атомарность (инкремент, сравнение и установка значений)\n\n**Сравнение** `volatile` **и** `Atomic`\n\n|**Характеристика**|`volatile`|`Atomic`|\n|---|---|---|\n|Гарантия видимости|Да|Да|\n|Атомарные операции|Нет|Да|\n|Использование|Для простого чтения/записи|Для сложных операций (инкремент, CAS)|\n|Пример подходящих случаев|Флаги (`boolean isRunning`)|Счётчики (`AtomicInteger.incrementAndGet`)|\n|Производительность|Выше, так как операции проще|Чуть ниже из-за механизмов синхронизации|\n"
  popularity = 4.53

[[questions]]
  id = 15
  question = "Зачем нужны atomic"
  answer = "Классы из пакета `java.util.concurrent.atomic` (например, `AtomicInteger`, `AtomicLong`, `AtomicReference`) обеспечивают **безопасные операции над переменными в многопоточной среде** без явной синхронизации.  \nОни полезны для:\n\n1. **Неатомарных операций над примитивами** (инкремент, декремент, сравнение и замена) с гарантией атомарности.\n2. **Оптимизации производительности** — вместо блокировок используется низкоуровневая атомарность через аппаратные команды процессора.\n\n"
  popularity = 12.54

[[questions]]
  id = 16
  question = "Зачем нужны volatile"
  answer = "Ключевое слово **`volatile`** гарантирует, что изменения переменной одним потоком будут **немедленно видны другим потокам**. Это предотвращает проблему с кешированием переменных в потоках.\n\n- **Когда использовать?**  \n    Используется для переменных, которые:\n    - могут быть изменены несколькими потоками;\n    - читаются часто, но синхронизация сложных операций не требуется.\n\n**Ограничения `volatile`:**  \n1. Не обеспечивает атомарности операций (например, `count++` всё равно небезопасно).\n2. Используется для простых флагов или переменных, где достаточно гарантии чтения/записи.\n\n"
  popularity = 15.68

