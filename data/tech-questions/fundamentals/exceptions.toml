[[questions]]
  id = 3
  question = "Расскажите про обрабатываемые и необрабатываемые исключения"
  answer = "**Checked** - Exception. Должны обрабатываться блоком catch, или описываться в сигнатуре метода (IOException)\n\n**Unchecked** - Ошибки Error, а так же исключения времени выполнения (RuntimeException) и его наследниками. Могут не обрабатываться блоком catch и не быть описаны в сигнатуре метода"
  popularity = 13.24

