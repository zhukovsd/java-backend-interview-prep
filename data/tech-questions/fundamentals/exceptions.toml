[[questions]]
  id = 2
  question = "Что такое Error и Exception?"
  answer = "Exception - это исключения выполнения программы\nError - ошибки JVM, программисту не стоит обрабатывать их через try-catch"
  popularity = 5.23

[[questions]]
  id = 3
  question = "Расскажите про обрабатываемые и необрабатываемые исключения"
  answer = "Проверяемые (checked) исключения обязаны быть явно обработаны до компиляции (Exception и некоторые наследники)\nНепроверяемые (unchecked) не требуют явной обработки (Error, RuntimeException)\n"
  popularity = 12.89

[[questions]]
  id = 4
  question = "О чем говорит ключевое слово throws?"
  answer = "Ключевое слово `throws` говорит о том, что метод может выбросить исключение указанных типов. Передаёт обработку исключения вышестоящему методу."
  popularity = 1.39

[[questions]]
  id = 5
  question = "Как создать собственное («пользовательское») исключение?"
  answer = "Наследоваться от RuntimeException (рекомендуется, но можно и от Exception), переопределить методы при необходимости"
  popularity = 3.83

[[questions]]
  id = 6
  question = "Расскажите про механизм обработки исключений в java (Try-catch-finally)"
  answer = "Блок **try** - блок, содержащий код, который может выбросить исключение при выполнении\nБлок **catch** - блок, “ловящий” выброшенные в **try** исключения при соответствии его типа с ожидаемым\nБлок **finally** - блок, выполняющийся после блоков **try** и **catch** вне зависимости от того, было ли выброшено исключение. Например, чтобы освободить какой-то ресурс"
  popularity = 7.32

[[questions]]
  id = 7
  question = "Возможно ли использование блока try-finally (без catch)?"
  answer = "Да, в таком случае после `try` выполнится `finally`"
  popularity = 0.35

[[questions]]
  id = 8
  question = "Может ли один блок catch отлавливать сразу несколько исключений?"
  answer = "Да"
  popularity = 0.7

[[questions]]
  id = 9
  question = "Всегда ли выполняется блок finally? Существуют ли ситуации, когда блок finally не будет выполнен?"
  answer = "Да, кроме случаев завершения программы или JVM. `finally` может не выполниться, если в блоке `try` вызывается `System.exit(0)`"
  popularity = 3.83

[[questions]]
  id = 10
  question = "В каком порядке следует обрабатывать исключения в catch блоках?"
  answer = "От наследника к родителю (от более специфичных к общему). В противоположном случае до наследников невозможно добраться, т.к. родительское исключение будет перехватывать всё"
  popularity = 1.74

[[questions]]
  id = 11
  question = "Что такое механизм try-with-resources?"
  answer = "Это механизм, который автоматические закрывает ресурс, объявленный в круглых скобках `try()`. В качестве ресурса можно использовать любой объект, класс которого реализует интерфейс `AutoClosable` или `Closable` (Scanner, например)"
  popularity = 4.88

[[questions]]
  id = 12
  question = "Ошибка OutOfMemoryError. Поймать утечку памяти и пофиксить"
  answer = "Ошибка `OutOfMemoryError` возникает, когда JVM не может выделить достаточно памяти для выполнения программы. Это может быть связано с утечками памяти, неправильной конфигурацией или большим объемом данных. Вот пошаговый процесс, как выявить и устранить причину:\n1. Сделать дамп памяти\n2. Проанализировать дамп, найти причины утечек. Типичные источники:\n    - неосвобождённые ресурсы\n    - переполненные коллекции\n    - статические ссылки (в т.ч. статические коллекции)\n    - неотписавшиеся слушатели\n3. Устранить причины\n"
  popularity = 8.01

[[questions]]
  id = 13
  question = "@SneakyThrows в Lombok"
  answer = "`@SneakyThrows` — это аннотация Lombok, которая позволяет автоматически обрабатывать исключения, не требуя явного указания `try-catch` или объявления `throws` в методе. Lombok оборачивает вызов в блок, который выбрасывает исключение как `RuntimeException`\n\n```java\n@SneakyThrows\npublic void riskyMethod() {\n    throw new IOException(\"Exception example\"); // Не нужно объявлять throws IOException\n}\n```\n"
  popularity = 0.7

[[questions]]
  id = 14
  question = "StackOverflowError vs OutOfMemoryError"
  answer = "`StackOverflowError` - выбрасывается при переполнении стека (в стеке не хватает памяти). Обычно возникает при рекурсиях. Можно решить через `-Xss` параметр JVM, но как правило, проблема именно в рекурсии, её и нужно решить.\n\n`OutOfMemoryError` - выбрасывается когда JVM не может выделить достаточно памяти в куче для создания нового объекта. Возможные причины:\n- создание очень большого массива или объекта\n- утечки памяти (неочищенные ссылки на объекты)\n- чрезмерное создание объектов без их удаления\n- чрезмерное ограничение памяти кучи через JVM параметр `-Xmx` (по умолчанию 256 МБ)\nВарианты решения:\n- использовать профилировщики памяти для анализа (`VisualVM`, `MAT`)\n- удалять ненужные объекты (`list.clear()`, `null`-ссылки)\n- увеличить ограничение памяти JVM (`-Xmx1024m`)\n- оптимизировать управление памятью (использовать `WeakReference`, `SoftReference`)\n"
  popularity = 1.74
