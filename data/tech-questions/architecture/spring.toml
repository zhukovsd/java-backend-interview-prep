[[questions]]
  id = 18
  question = "Парадигма AOP"
  answer = "*AOP* - это способ добавить в программу дополнительные функции, не трогая основной код программы.\nНапример, у нас есть метод, который что-то делает. Но нам нужно, чтобы перед началом и в конце работы этого метода писался лог. Вместо того чтобы добавлять этот код логирования в каждый метод руками - можно вынести его в отдельное место (аспект), а Spring сам \"вставит\" его туда, где нужно, без изменений основного кода.\n\n"
