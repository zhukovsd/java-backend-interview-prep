  question = "Почему лучше использовать конструктор?"
  answer = "- Неизменяемость - зависимости устанавливаются один раз при создании объекта, и их невозможно изменить (через final поля)\n- Обязательность зависимостей - устанавливает чёткое требование, что объект не может существовать без переданных зависимостей\n- Тестируемость - проще создавать mock-объекты для тестов\n- Явность - видно, какие зависимости требуются для работы объекта\n"
  popularity = 12.2

