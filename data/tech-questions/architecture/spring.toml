[[questions]]
  id = 46
  question = "Spring Security, как хранить пароль пользователя?"
  answer = "Для хранения паролей используют хэширование - исходную строку преобразуют в хэш по криптостойким алгоритмам (восстановить оригинальный текст крайне сложно или невозможно), после чего сохраняют в базу данных.\n\n**Как хранить пароль в Spring Security?**\n1. Хэширование с помощью BCrypt - Spring Security предоставляет поддержку алгоритма BCrypt, который подходит для хэширования паролей\n```java\n    @Bean\n    public PasswordEncoder passwordEncoder() {\n        return new BCryptPasswordEncoder();\n    }\n```\nПри сохранении пароля:\n```java\n    @Autowired\n    private PasswordEncoder passwordEncoder;\n    \n    public void saveUser(String rawPassword) {\n        String hashedPassword = passwordEncoder.encode(rawPassword);\n        // Сохранение hashedPassword в базе данных\n    }\n```\n    \n2. **Проверка пароля** - при аутентификации введённый пароль сравнивается с хэшированным значением в базе данных\n    ```java\n    boolean matches = passwordEncoder.matches(rawPassword, hashedPassword);\n    ```\n\n**Почему BCrypt?**\n- **Защита от атак с помощью “радужных таблиц”** - BCrypt автоматически добавляет случайную “соль” к каждому паролю, чтобы одинаковые пароли имели разные хэши\n- **Замедление** - BCrypt есть возможность настройки сложности (work factor), что увеличивает время вычисления хэша, усложняя атаки\n\nСравнение с другими современными алгоритмами хэширования\n\n| Алгоритм | CPU-hard | Memory-hard | GPU resistance | Популярность              |\n| -------- | -------- | ----------- | -------------- | ------------------------- |\n| BCrypt   | Да       | Нет         | средняя        | очень высокая             |\n| PBKDF2   | Да       | Нет         | слабее         | enterprise/FIPS           |\n| Argon2   | Да       | Нет         | высокая        | современный best practice |\n"
  popularity = 0.7

[[questions]]
  id = 47
  question = "Spring Profiles как с ними работать?"
  answer = "Профили Spring позволяют загружать разные настройки и компоненты в зависимости от окружения (разработка, тестирование, прод)\n\n**Как установить профиль?**\n1. В `application.properties/yml`\n```yaml\nspring:\n  profiles:\n    active: dev\n```\n2. Через аргументы JVM (`-Dspring.profiles.active=prod`)\nМожно передавать профиль при запуске:\n```bash\njava -jar myapp.jar --spring.profiles.active=prod\n```\n\n**Как создать разные настройки для профилей?**\n1. Разные файлы `application-{profile}.properties`\n\t- `application-dev.properties`\n\t- `application-prod.properties`\n\t- `application-test.properties`\n\n2. Использование `@Profile` в коде\n```java\n@Component\n@Profile(\"dev\")\npublic class DevDataSource implements DataSourceConfig {\n    @Override\n    public void setup() {\n        System.out.println(\"DEV database setup\");\n    }\n}\n\n@Component\n@Profile(\"prod\")\npublic class ProdDataSource implements DataSourceConfig {\n    @Override\n    public void setup() {\n        System.out.println(\"PROD database setup\");\n    }\n}\n```\nЕсли активен профиль `dev`, то создастся `DevDataSource`, иначе - `ProdDataSource`. Можно комбинировать профили через операторы `&, |, !,`, например \n```java\n@Component\n@Profile(\"prod & some-other-profile\")\npublic class ProdDataSource implements DataSourceConfig {\n\t...\n}\n```\n`\n*Примечание. Существует также аннотация `@IfProfileValue`, однако она применима только к тестовым классам или методам тестовых классов. Позволяет включать/выключать выполнение конкретных тестов в зависимости настроек среды, т.е. напрямую не связана с профилями Spring*\n```java\n@IfProfileValue(name = \"java.vendor\", value = \"Oracle Corporation\")\n public void testSomething() {\n     // ...\n }\n```\n"
  popularity = 1.74

[[questions]]
  id = 48
  question = "Виды proxy в Spring"
  answer = "Spring использует динамическое проксирование для создания AOP-обёрток над бинами\n\n|**Тип Proxy**|**Описание**|**Как создается?**|\n|---|---|---|\n|**JDK Dynamic Proxy**|Использует `java.lang.reflect.Proxy`|Для интерфейсов|\n|**CGLIB Proxy**|Использует `net.sf.cglib.proxy`|Для классов|\n|**AspectJ Proxy**|Используется в **Spring AOP**|Нужно доп. подключение|\n\n**JDK Dynamic Proxy (`java.lang.reflect.Proxy`)**\n- Используется **только для интерфейсов**.\n- Создает прокси-класс, который реализует интерфейс.\n```java\npublic interface Service {\n    void doWork();\n}\n\npublic class ServiceImpl implements Service {\n    public void doWork() {\n        ...\n    }\n}\n```\n\nСоздание динамического прокси вручную:\n```java\nService proxy = (Service) Proxy.newProxyInstance(\n    Service.class.getClassLoader(),\n    new Class[]{Service.class},\n    (proxyObj, method, args) -> {\n        System.out.println(\"Логирование перед вызовом метода...\");\n        return method.invoke(new ServiceImpl(), args);\n    }\n);\nproxy.doWork();\n```\n\n\n**CGLIB Proxy (`net.sf.cglib.proxy`)**\n- Используется **для классов** (даже если нет интерфейса).\n- Создает **подкласс** оригинального класса\n```java\nclass UserService {}\n\nclass UserService$$EnhancerBySpring extends UserService {}\n```\n\nСоздание CGLIB-прокси вручную:\n```java\nEnhancer enhancer = new Enhancer();\nenhancer.setSuperclass(Service.class);\nenhancer.setCallback((MethodInterceptor) (obj, method, args, proxy) -> {\n    System.out.println(\"Логирование перед вызовом метода...\");\n    return proxy.invokeSuper(obj, args);\n});\nService proxy = (Service) enhancer.create();\nproxy.doWork();\n```\n\nНельзя проксировать:\n- `final` классы\n- `final` методы\n- `private` методы\n\n\n**CGLIB vs Dynamic Proxy**\n\n| **Функция**            | **JDK Dynamic Proxy**            | **CGLIB Proxy**               |\n| ---------------------- | -------------------------------- | ----------------------------- |\n| **Где работает?**      | Только с интерфейсами            | Работает с классами           |\n| **Как создается?**     | `java.lang.reflect.Proxy`        | `net.sf.cglib.proxy.Enhancer` |\n| **Наследование**       | Нельзя наследовать логику класса | Создает подкласс              |\n| **Производительность** | Чуть быстрее                     | Немного медленнее             |\n\nHibernate (а значит и Spring Data JPA), Mockito и сам Spring (в немногочисленных случаях) использует более современный ByteBuddy. Эта библиотека объединяет возможности обоих видов прокси + дополняет их возможность изменения (enhance) уже скомпилированного байткода.\n\n**Какое proxy по-умолчанию в Spring?**\nЕсли проксируемый бин реализует хотя бы один интерфейс, то используется JDK Dynamic Proxy, если нет, то CGLIB.\n\n**Когда используется CGLIB?**\n- Если класс не реализует интерфейс\n- Если явно указать:\n        - `@EnableAspectJAutoProxy(proxyTargetClass = true)`\n        - `spring.aop.proxy-target-class=true`\n"
  popularity = 6.27

[[questions]]
  id = 49
  question = "@Lookup"
  answer = "`@Lookup` - это аннотация в Spring, позволяющая в `singleton`-бине получать новый экземпляр `prototype`-бина при каждом вызове метода. Без `@Lookup` при внедрении `prototype`-бина в `singleton` он создаётся только один раз.\n\n**Как это работает**\n1. Помечаешь метод в singleton-классе аннотацией `@Lookup`\n2. Spring динамически переопределяет этот метод (через CGLIB)\n3. При каждом вызове метода Spring запрашивает новый `prototype`-бин из контекста.\n\n```java\n@Component\n@Scope(\"prototype\")\npublic class PrototypeBean {\n    public void doSomething() {\n        System.out.println(\"PrototypeBean: \" + this);\n    }\n}\n\n@Component\npublic abstract class SingletonBean {\n\n    public void process() {\n        // Каждый раз получаем новый экземпляр PrototypeBean\n        PrototypeBean prototypeBean = getPrototypeBean();\n        prototypeBean.doSomething();\n    }\n\n    @Lookup\n    protected abstract PrototypeBean getPrototypeBean();\n}\n```\n\n**Зачем нужно?**\n- Когда в `singleton`-бине надо часто создавать `prototype`-объекты\n- Чтобы не использовать вручную `ApplicationContext.getBean()`\n- Для избежания утечек памяти (прототипы не живут вечно внутри синглтона)\n"
  popularity = 2.44

[[questions]]
  id = 50
  question = "Как работает BeanPostProcessor. Почему есть before и after initialization"
  answer = "В Spring `BeanPostProcessor` - это специальный интерфейс, который позволяет «перехватывать» создаваемые спрингом бины и модифицировать их до и после его инициализации.\n\n```java\npublic interface BeanPostProcessor {\n\n    // Вызывается до выполнения любых init-методов бина (@PostConstruct, InitializingBean.afterPropertiesSet, init-method)\n    Object postProcessBeforeInitialization(Object bean, String beanName) throws BeansException;\n\n    // Вызывается после init-методов\n    Object postProcessAfterInitialization(Object bean, String beanName) throws BeansException;\n}\n```\n\n**Зачем два метода - before и after?**\n1. `postProcessBeforeInitialization` позволяет подготовить бин до запуска его собственных методов инициализации (`@PostConstruct`, `afterPropertiesSet`, `init-method`)\n2. `postProcessAfterInitialization` вызывается после того, как бин полностью готов к работе: все свойства установлены, init-методы выполнены. Наиболее частый случай применения - оборачивание бина в прокси (например, для `@Transactional`, `@Async`)\n\n**Пример своего BeanPostProcessor**\n```java\n@Component\npublic class LoggingBeanPostProcessor implements BeanPostProcessor {\n\n    @Override\n    public Object postProcessBeforeInitialization(Object bean, String name) {\n        System.out.println(\"Before init: \" + name);\n        return bean; // можно вернуть обёртку или другой объект\n    }\n\n    @Override\n    public Object postProcessAfterInitialization(Object bean, String name) {\n        System.out.println(\"After init: \" + name);\n        // Если бин имеет аннотацию @MyTransactional — возвращаем прокси\n        if (bean.getClass().isAnnotationPresent(MyTransactional.class)) {\n            return ProxyFactory.getProxy(bean);\n        }\n        return bean;\n    }\n}\n```\n\nВсе зарегистрированные `BeanPostProcessor` выполняются в порядке их PriorityOrdered/Ordered или по умолчанию в порядке регистрации.\n\n"
  popularity = 2.44

[[questions]]
  id = 51
  question = "@Lazy"
  answer = "`@Lazy` - аннотация Spring, которая позволяет\n- откладывать создание бина до момента его первого использования вместо загрузки при старте контекста\n- откладывать внедрение зависимости (см. [[#19. Циклическая зависимость]])\n\nМожет быть применена:\n- на уровне объявления класса-бина\n- на уровне метода `@Bean`\n- на уровне точки внедрения\n\n**Как это работает под капотом**\n- При ленивой инициализации Spring создаёт не сам объект, а прокси (proxy).\n- Прокси удерживает ссылку на фабрику бинов и при первом вызове любого метода **инициализирует реальный объект** и делегирует вызов ему.\n- В случае `@Lazy` над точкой внедрения бин инициализируется сразу, но внедрение происходит позже\n\nМожно применить `@Lazy` для всего приложения сразу, тогда все бины будут инициализироваться лениво\n```\nspring.main.lazy-initialization=true\n```\n"
  popularity = 3.83

[[questions]]
  id = 52
  question = "@ControllerAdvice"
  answer = "Аннотация для вынесения общей логики аспектов, применяемой ко всем контроллерам.\n\n**Основные задачи**\n- глобальная обработка ошибок (`@ExceptionHandler`)\n- общие данные для всех контроллеров (`@ModelAttribute`)\n- общие биндеры (валидация, конвертация) через `@InitBinder`\n\nОсобенности\n- по умолчанию работает для всех контроллеров, можно ограничить область (`basePackages`, `assignableTypes`)\n- Для REST-API используют `@RestControllerAdvice` (автоматически добавляет `@ResponseBody`)\n"
  popularity = 3.83

[[questions]]
  id = 53
  question = "Как устроен Spring Security"
  answer = "Фреймворк для аутентификации и авторизации. Работает как цепочка фильтров (Servlet Filters), которая перехватывает каждый запрос.\n\n**Основные компоненты**\n1. **SecurityFilterChain** - набор фильтров, через которые проходит каждый запрос. Примеры фильтров:\n\t\t- `UsernamePasswordAuthenticationFilter` (логин/пароль)\n        - `BearerTokenAuthenticationFilter` (JWT токен)\n2. **Authentication** - объект, представляющий пользователя после входа:\n        - `principal` (сам пользователь, чаще `UserDetails`)\n        - `credentials` (пароль или токен)\n        - `authorities` (роли/права)\n3. **AuthenticationManager** - точка входа для проверки логина/пароля или токена, делегирует проверку в **AuthenticationProvider**\n4. **AuthenticationProvider** - конкретная логика проверки (например, сверка пароля с БД)\n5. **UserDetailsService** - загружает данные пользователя (по имени/почте), возвращает объект `UserDetails` с логином, паролем и ролями\n6. **Authorization** - после входа система проверяет роли/права. Используются аннотации:\n        - `@PreAuthorize(\"hasRole('ADMIN')\")`\n        - `@Secured(\"ROLE_USER\")`\n\n\n**Поток обработки запроса**\n1. Запрос приходит в приложение\n2. Проходит через **SecurityFilterChain**\n3. Фильтр (например, `UsernamePasswordAuthenticationFilter`) пытается аутентифицировать\n4. `AuthenticationManager` вызывает `AuthenticationProvider`\n5. `UserDetailsService` загружает пользователя, сверяет пароль\n6. Если успех, создаётся `Authentication`, кладётся в **SecurityContext**\n7. Далее проверяется авторизация (права/роли)\n8. Контроллер получает запрос\n\n**Пример конфигурации (новый стиль, Spring Security 5.7+)\n```java\n@Configuration\n@EnableWebSecurity\npublic class SecurityConfig {\n\n    @Bean\n    public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {\n        http\n            .authorizeHttpRequests(auth -> auth\n                .requestMatchers(\"/admin/**\").hasRole(\"ADMIN\")\n                .anyRequest().authenticated()\n            )\n            .formLogin(withDefaults())   // логин/пароль форма\n            .httpBasic(withDefaults()); // базовая авторизация\n        return http.build();\n    }\n\n    @Bean\n    public UserDetailsService users() {\n        UserDetails user = User.withUsername(\"user\")\n            .password(\"{noop}password\") // {noop} = без шифрования\n            .roles(\"USER\")\n            .build();\n        return new InMemoryUserDetailsManager(user);\n    }\n}\n```"
  popularity = 2.79
