[[questions]]
  id = 7
  question = "@Qualifier vs @Primary"
  answer = "Если есть два одинаковых по типу бина, Spring не знает какой именно использовать и выбрасывает исключение. Установка над одним из бинов аннотации `@Primary`\nделает его использование предпочтительным (дефолтным). Если нам нужно использовать в работе оба бина, можно поставить `@Qualifier(имя бина)` для каждого бина в месте внедрения (работает только с `@Autowired`)\n\n| **Аннотация** | **Описание**                                            | **Когда использовать**                                              | **Место указания**                                                                                   |\n| ------------- | ------------------------------------------------------- | ------------------------------------------------------------------- | ---------------------------------------------------------------------------------------------------- |\n| `@Primary`    | Указывает бин по умолчанию при выборе среди нескольких  | Когда нужен бин, который используется чаще всего                    | В месте объявления бина                                                                              |\n| `@Qualifier`  | Явно указывает, какой бин использовать среди нескольких | Когда нужно внедрить конкретный бин, несмотря на наличие `@Primary` | В месте внедрения бина (над полем, методом или перед аргументами в конструкторе - рядом с Autowired) |\n"
  popularity = 12.2

[[questions]]
  id = 8
  question = "Что такое Bean?"
  answer = "Bean в Spring - это объект, управляемый контейнером Spring IoC. Это основной строительный блок приложения, который регистрируется и конфигурируется контейнером\n\n---\n\n**Аннотация @Bean**\n\nАннотация `@Bean` используется для указания метода, который возвращает объект (бин) и эти бины в дальнейшем можно внедрять в другие компоненты. Используется для явного объявления бина в Java-конфигурации (в классе, помеченном как `@Configuration`)\n\nТакже для определения бинов можно использовать методы по умолчанию. Это позволяет создавать конфигурации бинов путем реализации интерфейсов с определениями бинов\n```java\npublic interface BaseConfig {\n    @Bean\n    default TransferServiceImpl transferService() {\n        return new TransferServiceImpl();\n    }\n}\n@Configuration\npublic class AppConfig implements BaseConfig {\n}\n```\n\n---\n\n **Что такое BeanDefinition?**\n\nBeanDefinition - это метаданные (описание бина), указывающие на то, как должен быть создан, сконфигурирован и управляем конкретный бин\nОн содержит:\n- Класс бина\n- Его скоуп\n- Зависимости\n- Методы инициализации и уничтожения\n\n---\n\n**Как Spring создает бины?**\n\n- **Чтение конфигурации** - Spring считывает конфигурацию из `@Configuration`, XML или аннотаций на классах\n- **Создание BeanDefinition** - на основе конфигурации Spring формирует **BeanDefinition** для каждого бина\n- **Инициализация бина:**\n    - вызывается конструктор или фабричный метод\n    - выполняется внедрение зависимостей (через конструктор, поля или сеттеры)\n- **Настройка бина** - постобработка через `BeanPostProcessor` (например, для работы с `@PostConstruct`)\n- **Добавление в контейнер** - готовый бин помещается в `ApplicationContext`\n\n---\n\n**Как конфигурируется бин?**\n\n1. Аннотации (`@Bean`, `@Component`, `@Value`, `@Scope`)\n2. XML-конфигурация\n3. Java-код (в классе с `@Configuration`)\n4. Средства типа `@PostConstruct` и `@PreDestroy` для управления жизненным циклом\n\n---\n\n**Можно вставить Bean в статическое поле?**\n\nНет, Spring не поддерживает внедрение зависимостей в статические поля напрямую. Решение - использовать сеттер или вызвать контекст через `ApplicationContext`\n\n---\n\n**Как сделать ленивую инициализацию бина?**\n\nИспользуйте аннотацию `@Lazy`\n"
  popularity = 10.1

[[questions]]
  id = 9
  question = "Скоуп бинов. Web скоуп"
  answer = "- Singleton\n    - Для каждого бина создается только один экземпляр на весь контекст приложения и переиспользуется везде, где он требуется\n    - Используется по-умолчанию\n    - Жизненный цикл бина начинается при загрузке контекста, и заканчивается при его завершении\n- Prototype\n    - Каждый раз, когда запрашивается бин, создается новый экземпляр\n    - Бины со скоупом `prototype` не уничтожаются Spring, так как они выходят из под его контроля сразу после создания\n    - НЕ ХРАНЯТСЯ в контексте Spring-а\n- Web скоуп:\n\t- request - cоздаётся один экземпляр бина на каждый HTTP-запрос\n\t- session - cоздаётся один экземпляр бина на каждую HTTP-сессию\n\t- application - cоздаётся один экземпляр бина на весь `ServletContext` (аналогично синглтону, но для веб-приложения)\n\t- websocket - cоздаётся один экземпляр бина на каждую WebSocket-сессию\n\n\n**Как создать свой Скоуп**\n1. Реализовать интерфейс Scope\n```java\npublic class CustomScope implements Scope {\n    private Map<String, Object> beans = new HashMap<>();\n\n    @Override\n    public Object get(String name, ObjectFactory<?> objectFactory) {\n        return beans.computeIfAbsent(name, k -> objectFactory.getObject());\n    }\n\n    @Override\n    public Object remove(String name) {\n        return beans.remove(name);\n    }\n    // другие методы...\n}\n```\n\n2. Зарегистрировать его в контексте:\n```java\n@Bean\npublic static CustomScopeConfigurer customScopeConfigurer() {\n    CustomScopeConfigurer configurer = new CustomScopeConfigurer();\n    configurer.addScope(\"customScope\", new CustomScope());\n    return configurer;\n}\n```\n"
  popularity = 26.48

[[questions]]
  id = 10
  question = "Как обеспечить, чтобы при внедрении бина со скоупом prototype в singleton-бин каждый вызов получал новый экземпляр?"
  answer = "1. **Внедрение `ObjectProvider` (или `ObjectFactory`)**\n```java\n@Component\n@Scope(\"singleton\")\npublic class MySingletonService {\n\n    private final ObjectProvider<MyPrototypeBean> prototypeProvider;\n\n    public MySingletonService(ObjectProvider<MyPrototypeBean> prototypeProvider) {\n        this.prototypeProvider = prototypeProvider;\n    }\n\n    public void doWork() {\n        // каждый вызов — новый бин\n        MyPrototypeBean prototype = prototypeProvider.getObject();\n        prototype.action();\n    }\n}\n```\nПлюсы:\n- просто, не нужно AOP-прокси  \nМинусы:\n- зависит от Spring API, сложнее тестировать вне контекста\n\n2. **`@Lookup`-метод (метод-инъекция)**\n```java\n@Component\n@Scope(\"singleton\")\npublic abstract class MySingletonService {\n\n    public void doWork() {\n        MyPrototypeBean prototype = createPrototype();\n        prototype.action();\n    }\n\n    @Lookup\n    protected abstract MyPrototypeBean createPrototype();\n}\n\n@Component\n@Scope(\"prototype\")\npublic class MyPrototypeBean {\n    public void action() { … }\n}\n```\nSpring генерирует подкласс, переопределяющий `createPrototype()` и вызывающий `getBean(...)`\nПлюсы:\n- нет явных провайдеров в коде   \nМинусы:\n- менее очевидно, опирается на генерацию подклассов\n\n3. **Прокси-bean (`proxyMode = TARGET_CLASS`)**\n```java\n@Component\n@Scope(value = \"prototype\", proxyMode = ScopedProxyMode.TARGET_CLASS)\npublic class MyPrototypeBean { … }\n\n@Component\n@Scope(\"singleton\")\npublic class MySingletonService {\n    private final MyPrototypeBean prototype;  // это прокси\n\n    public MySingletonService(MyPrototypeBean prototype) {\n        this.prototype = prototype;\n    }\n\n    public void doWork() {\n        prototype.action(); // при каждом вызове прокси подхватит новый экземпляр\n    }\n}\n```\nПлюсы:\n- автоматический проксинг, код остаётся простым  \nМинусы:\n- прокси-обёртка, возможны проблемы с навигацией методов, `instanceof`, необходимость проксирования класса\n\n4. **Получение из `ApplicationContext`**\n```java\n@Component\npublic class MySingletonService {\n\n    @Autowired\n    private ApplicationContext ctx;\n\n    public void doWork() {\n        MyPrototypeBean prototype = ctx.getBean(MyPrototypeBean.class);\n        prototype.action();\n    }\n}\n```\nПлюсы:\n- универсальный способ для любых бинов  \nМинусы:\n- прямая зависимость от контекста, менее чистый код\n\n**Проблемы и нюансы**\n1. **Неявное смешение слоёв** - Внедрение контекста или провайдера в бизнес-код может затруднить тестирование\n2. **Множественные реализации**  - если есть несколько `MyPrototypeBean` (например, `FastPrototype`, `SlowPrototype`), нужно уточнять:\n```java\npublic MySingletonService(\n        @Qualifier(\"fastPrototypeBean\") ObjectProvider<MyPrototypeBean> fastProvider) { … }\n```\n3. **Уничтожение prototype-бинов** - контейнер сам не вызывает `@PreDestroy` у prototype-бинов. Если в них есть ресурсы, придётся очищать вручную\n4. **Прокси и AOP** - при использовании `proxyMode` методы, помеченные `final` или `private`, не проксируются. Это может ломать логику\n5. **Сериализация** - если singleton-бин сериализуется, прокси-ссылки на prototype-бин могут привести к проблемам при десериализации\n"
  popularity = 6.62

[[questions]]
  id = 11
  question = "Жизненный цикл Bean. Вопросы связанные с классами, входящими в жизненный цикл бина"
  answer = "Spring управляет созданием, инициализацией и уничтожением бинов в рамках контейнера IoC. Этот жизненный цикл можно разделить на несколько этапов\n\n{{< figure src=\"/java-backend-interview-prep/spring_bean_lifecycle.png\" title=\"\" >}}\n\n1. **Парсинг конфигураций, сканирование аннотаций и создание BeanDefinition**\n    Spring (BeanDefinitionReader) ищет классы, которые помечены аннотациями, указывающими на то, что они являются бинами (или содержат таковые). Эти аннотации включают:\n    `@Component`, `@Service`, `@Repository`, `@Controller`, `@Configuration`\n    Spring сканирует классы в пакетах, указанных в аннотации `@ComponentScan`, или в пакете, где находится класс с аннотацией `@SpringBootApplication`. Найденные классы парсятся, и для них создаются BeanDefinition\n    `BeanDefinition` - это специальный интерфейс, через который можно получить доступ к метаданным будущего бина. В зависимости от конфигурации будет использоваться тот или иной механизм парсинга конфигурации. Все они складываются в `ConcurrentHashMap`, в которой ключ - имя бина, а объект сам `BeanDefinition`. При старте приложения в IoC контейнер попадут бины, которые имеют скоуп синглтон, а остальные создадутся тогда, когда они нужны. Сначала регистрируются все `@Configuration` для дальнейшего парсинга\n\n2. **Настройка созданных BeanDefinition** \n   Есть возможность повлиять на бины до их создания. Для этого существует интерфейс `BeanFactoryPostProcessor`, реализовав который, получаем доступ к созданным `BeanDefinition` и можем их изменить при помощи метода `postProcessBeanFactory`.\n\n3. **Создание экземпляра бинов** \n   Сначала из мапы c `BeanDefinition`-ами достаются бины, необходимые для настройки других бинов, а потом остальные (рекурсивное разрешение зависимостей). Созданием занимается `BeanFactory` (вызывает конструкторы), но можно и делегировать это фабрике, реализующей интерфейс `FactoryBean`\n\n4. **Внедрение зависимостей (через поля и сеттеры)**\n5. **Настройка созданных бинов** \n   Бины уже созданы, их можно донастроить. Интерфейс `BeanPostProcessor` позволяет вклиниться в процесс настройки бинов до того, как они попадут в контейнер. Контекст автоматически обнаруживает бины реализующие этот интерфейс и помечает их. Есть два метода\n    - `postProcessBeforeInitialization` вызывается до init метода\n    - `postProcessAfterInitialization` - после\n        \n    Сначала сработает метод `postProcessBeforeInitialization()` всех имеющихся `BeanPostProcessor`-ов. Затем, при наличии, будет вызван `init`-метод.\n    В спринге если какой-то из `BeanPostProcessor` что-то меняет в классе (в т.ч. добавляет проксирование), он должен делать это на этапе после `init`. Следовательно, `init` всегда работает на оригинальный метод до проксирования.\n        В конце бины пройдут через `postProcessAfterInitialization()`.\n        \n        _Примечание: если бин имплементирует_ `InitializingBean`_, то Spring вызовет метод_ `afterPropertiesSet()` _перед init-методом. Интерфейс не рекомендуется к использованию как устаревший_\n    \n6. **Бины созданы** На этом этапе их можно получить с помощью метода `ApplicationContext.getBean()`\n    \n7. З**акрытие контекста** \n   Когда контекст закрывается, бин уничтожается. Если в бине есть `@PreDestroy` метод, то перед уничтожением бина он вызовется. Если в `@Bean` определён метод destroyMethod, то будет вызван и он\n"
  popularity = 20.56

