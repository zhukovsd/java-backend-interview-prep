[[questions]]
  id = 3
  question = "Dependency Injection"
  answer = "Dependency Injection (внедрение зависимостей) - механизм предоставления объекту его зависимостей извне (вместо того, чтобы объект создавал их самостоятельно). DI упрощает управление зависимостями и делает код более модульным, тестируемым и легко расширяемым\n\n**Dependency Injection vs dependency lookup**\n\n| **Критерий**              | **Dependency Injection**                                         | **Dependency Lookup**                                     |\n| ------------------------- | ---------------------------------------------------------------- | --------------------------------------------------------- |\n| **Суть**                  | Зависимости предоставляются извне (контейнером или фреймворком)  | Объект сам запрашивает зависимости (чаще из контекста)    |\n| **Простота тестирования** | Легче тестировать, зависимости можно заменять mock-объектами     | Требует мокирования контекста или фабрики для тестов      |\n| **Уровень контроля**      | Контейнер управляет зависимостями, объект их не создаёт          | Объект сам решает, как получить зависимости               |\n| **Пример**                | Spring внедряет зависимость через аннотации или XML-конфигурацию | Вручную вызов метода<br>`ApplicationContext.getBean(...)` |\n\nАннотация @Lookup над методом позволяет использовать Dependency Lookup\n```java\n@Lookup\npublic WeatherService getWeatherServiceBean() {\n\treturn null;\n}\n```\n\nПод капотом спринг делает\n```java\n@Lookup\npublic WeatherService getWeatherServiceBean(){\n\treturn applicationbContext.getBean(WeatherService.class);\n}\n```\n\n**Когда пригодится способ внедрения через setter?**\n- Опциональные зависимости - зависимость не обязательна для работы объекта и используется только в некоторых сценариях\n- Динамическое изменение зависимостей - когда требуется сменить зависимость во время выполнения программы\n- Библиотеки или старый код - для интеграции с кодом, где нельзя контролировать процесс создания объектов\n"
  popularity = 12.2

[[questions]]
  id = 4
  question = "Какие способы внедрения зависимостей знаешь?"
  answer = "- Через конструктор\n- Через сеттер\n- Через поле\n\n| **Способ**             | **Описание**                                                               | **Плюсы**                                                                                     | **Минусы**                                                                                                                                                   | **Примеры использования**                                    |\n| ---------------------- | -------------------------------------------------------------------------- | --------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------ | ------------------------------------------------------------ |\n| **Через конструктор**  | Зависимости передаются при создании объекта                                | - Гарантия неизменяемости  - Обязательные зависимости явно видны  <br>- Высокая тестируемость | - Неудобно для большого числа зависимостей  <br>- Не подходит для опциональных зависимостей                                                                  | Когда зависимости обязательны и не изменяются после создания |\n| **Через setter**       | Зависимости устанавливаются с помощью метода после создания объекта        | - Подходит для опциональных зависимостей  <br>- Зависимости можно изменять в runtime          | - Возможна ситуация, когда объект используется без установленной зависимости (NPE)  <br>- Менее явный                                                        | Когда зависимости опциональны или могут изменяться           |\n| **Через поля (field)** | Зависимости внедряются напрямую в поля объекта, обычно с помощью аннотаций | - Минимум кода  - Простота при использовании фреймворков (Spring, CDI)                        | - Возможна ситуация, когда объект используется без установленной зависимости (NPE)  <br>- Сложнее тестировать  <br>- Нарушение принципа явности зависимостей | Быстрое внедрение в Spring через `@Autowired`                |\n"
  popularity = 14.98

[[questions]]
