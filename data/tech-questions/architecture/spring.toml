[[questions]]
  id = 25
  question = "@Transactional. Как работает?"
  answer = "`@Transactional` — это аннотация, которая позволяет автоматически управлять транзакциями. Когда метод аннотирован `@Transactional`, Spring берет на себя начало, коммит или откат транзакции\n\n---\n***Что можно пометить аннотацией @Transactional?***\n\n- Класс. Все его методы станут `@Transactional` \n- Метод\n\n---\n***Дефолтный propagation***\n\nPropagation.REQUIRED\n\n\n---\n***Какие способы управления транзакциями в Spring вы знаете?***\n\n- Аннотация `@Transactional`\n- TransactionManager\n- TransactionTemplate\n\n*TransactionManager* и *TransactionTemplate*\n\n- Когда требуется точный контроль над транзакциями (например, управлять несколькими транзакциями в одном потоке)\n\n*@Transactional*\n\n- Когда нужно простое управление транзакциями\n- Когда транзакция не требует сложной логики управления\n\n---\n***@Transactional повесить на private метод?***\n\nЕсли вы поместите аннотацию `@Transactional` на `private` метод, то **транзакция не будет создана или применена**, потому что Spring использует **прокси-механизм** для управления транзакциями.\n\n"
  popularity = 27.18

[[questions]]
  id = 26
  question = "Какие есть атрибуты у @Transactional?"
  answer = "\n| **Атрибут**     | **Описание**                                                                                 | **Значение по умолчанию** |\n| --------------- | -------------------------------------------------------------------------------------------- | ------------------------- |\n| `propagation`   | Определяет необходимость создания транзакции (создавать новую или использовать существующую) | `REQUIRED`                |\n| `isolation`     | Уровень изоляции транзакции (как управлять конкурентным доступом)                            | `DEFAULT`                 |\n| `readOnly`      | Только для чтения (не позволяет изменять данные)                                             | `false`                   |\n| `timeout`       | Максимальное время выполнения (в секундах)                                                   | -1 (бесконечно)           |\n| `rollbackFor`   | Перечисляет исключения, при которых делается rollback                                        | Пусто                     |\n| `noRollbackFor` | Исключения, при которых rollback не делается                                                 | Пусто                     |\n"
  popularity = 4.53

[[questions]]
  id = 27
  question = "Атрибут propagation у @Transactional"
  answer = "Атрибут `propagation` определяет необходимость создания транзакции (создавать новую или использовать уже открытую). Возможные значения:\n- **REQUIRED** - применяется по умолчанию. При входе в `@Transactional` метод будет использована уже существующая транзакция или создана новая, в случае отсутствия \n- **SUPPORTS** - метод будет выполняться в рамках транзакции, если она существует. Если ее нет, метод выполнится без транзакции\n- **MANDATORY** - требует внешнюю транзакцию, иначе выбрасывает исключение\n- **REQUIRES_NEW** - для внутреннего метода создается своя отдельная транзакция. Пока выполняется внутренний метод, внешняя транзакция приостанавливается. Результат выполнения внутренней не повлияет на результат выполнения внешней\n- **NOT_SUPPORTED** - метод всегда выполняется вне транзакции, даже если существует текущая транзакция. Текущая транзакция приостанавливается\n- **NEVER** - запрещает выполнение метода в транзакции, выбрасывает исключение, если транзакция существует\n- **NESTED** - создаёт подтранзакцию внутри основной транзакции. Эта подтранзакция может откатиться отдельно от основной, но зависит от успешного завершения основной транзакции. Если основная транзакция откатится, подтранзакция тоже откатится, даже если она завершилась успешно\n"
  popularity = 9.06

[[questions]]
  id = 28
  question = "@Transaction Что будет если вызвать метод из метода в одном классе при различных сценариях"
  answer = "Если вы вызовете метод, помеченный `@Transactional`, из другого метода того же класса, то **транзакция не начнётся или не будет соблюдена**, если вызов происходит напрямую. Потому что вызов внутри класса **не проходит через прокси**, который отвечает за управление транзакцией. Таким образом, аннотация `@Transactional` не будет обработана\n```java\n@Service\npublic class MyService {\n\n    @Transactional\n    public void transactionalMethod() {\n        // Транзакция активируется, если вызов через прокси\n    }\n\n    public void callTransactionalMethod() {\n        transactionalMethod(); // Прямой вызов, транзакция НЕ активируется\n    }\n}\n```\n\n**Как исправить?**\n1. **Использовать вызов через другой бин**\nЕсли транзакционный метод вызывается из другого бина, вызов пройдёт через прокси, и транзакция будет активирована\n```java\n@Service\npublic class MyService {\n\n    @Transactional\n    public void transactionalMethod() {\n        // Транзакция активируется\n    }\n}\n\n@Service\npublic class AnotherService {\n\n    @Autowired\n    private MyService myService;\n\n    public void callMethod() {\n        myService.transactionalMethod(); // Вызов через прокси, транзакция активируется\n    }\n}\n```\n\n2. **Использовать self-injection**\nЧастный случай предыдущего пункта - внедрение бина в самого себя\n```java\n@Service\npublic class MyService {\n\n    @Autowired\n    private MyService self;\n\n    @Transactional\n    public void transactionalMethod() {\n        // Транзакция активируется\n    }\n\n    public void callTransactionalMethod() {\n        self.transactionalMethod(); // Вызов через прокси, транзакция активируется\n    }\n}\n```\n_Примечание: с версии 2.6 Spring Boot запрещает создавать циклические зависимости. Чтобы приведённый выше код отработал, необходимо установить свойство_ `spring.main.allow-circular-references=true`\n_В случае же с внедрением через конструктор, даже это не поможет. Существует несколько альтернативных вариантов self-injection, один из них - получение бина через ApplicationContext_\n```java\n@Service\npublic class MyService implements ApplicationContextAware {\n    private ApplicationContext context;\n\n    @Override\n    public void setApplicationContext(ApplicationContext context) throws BeansException {\n        this.context = context;\n    }\n\n    @Transactional\n    public void transactionalMethod() {\n        // Транзакция активируется\n    }\n\n    public void callTransactionalMethod() {\n\t\t    // Вызов через прокси, транзакция активируется\n\t\t    context.getBean(MyService.class).transactionalMethod() \n    }\n}\n```\n"
  popularity = 15.33

[[questions]]
  id = 29
  question = "Как гарантировать корректное обновление и сохранение изменений в сущностях, полученных в методе с @Transactional"
  answer = "- `@Transactional` на сервисе гарантирует, что все изменения managed-сущностей будут автоматически сохранены при коммите (dirty checking)\n- Не нужно вызывать `save()` для уже загруженных entity - только для новых или detached (`merge()` под капотом)\n- `flush()` позволяет досрочно слить изменения в БД, если требуется промежуточный результат (generated value, ранняя проверка constraints)\n- Для чтения использовать `readOnly=true` - это ускоряет выполнение\n- Следить за корректностью атрибутов `propagation` и `isolation`, чтобы избежать неожиданных rollback’ов и блокировок\n"
  popularity = 1.39

[[questions]]
  id = 30
  question = "@Transactional и Исключения"
  answer = "\n| Ситуация                                                                                                              | Будет ли откат транзакции?   | Причина                                              |\n| --------------------------------------------------------------------------------------------------------------------- | ---------------------------- | ---------------------------------------------------- |\n| Выброшено `RuntimeException`                                                                                          | Да                           | Spring откатывает по умолчанию                       |\n| Выброшена `Error`                                                                                                     | Да                           | Расценивается как критическая ошибка                 |\n| Выброшено `Checked Exception` (`Exception`, `IOException` и др.)                                                      | Нет                          | Spring НЕ откатывает checked exceptions по умолчанию |\n| Checked exception + `rollbackFor=Exception.class`                                                                     | Да                           | Ты явно указал, для каких исключений откатывать      |\n| RuntimeException + noRollbackFor=RuntimeException.class                                                               | Нет                          | Ты запретил откатывать для этого исключения          |\n| Исключение поймано (try/catch) и не проброшено наружу                                                                 | Нет                          | Spring видит, что метод завершился “успешно”         |\n| Поймано исключение, но вызывается `TransactionAspectSupport`<br>`.currentTransactionStatus()`<br>`.setRollbackOnly()` | Да                           | Ручной указатель отката                              |\n| Метод private / final / static                                                                                        | @Transactional не отработает | Прокси не может обернуть метод                       |\n| Вызов метода внутри того же класса                                                                                    | @Transactional не отработает | Self-invocation - прокси не используется             |\n| Метод вызван через spring bean                                                                                        | Да                           | Прокси перехватывает вызов                           |\n"
  popularity = 3.14

[[questions]]
  id = 31
  question = "@Async"
  answer = "Аннотация `@Async` используется в Spring для выполнения методов **асинхронно**, то есть в отдельном потоке, чтобы не блокировать основной поток выполнения\n\n**Особенности:**\n- метод, помеченный аннотацией `@Async`, выполняется в отдельном потоке\n- возвращаемый тип может быть `void`, `Future`, или `CompletableFuture`\n- работает через прокси, поэтому вызов такого метода должен происходить у бина, а не внутри класса\n- асинхронные вызовы используют пул потоков. По умолчанию используется пул `SimpleAsyncTaskExecutor`, но можно указать свой `Executor` или `TaskExecutor` через единственный параметр аннотации\n"
  popularity = 2.09

[[questions]]
  id = 32
  question = "Starter в Spring. Плюсы и минусы"
  answer = "Стартеры в Spring - это готовые наборы библиотек (модулей), которые включают все необходимые зависимости для работы с конкретными технологиями\n\n**Плюсы**:\n- упрощение конфигурации\n- согласованность версий зависимостей\n- сокращение времени разработки\n- модульность\n- документация и поддержка\n**Минусы**:\n- избыточные зависимости\n- меньшая гибкость\n\n**Какие отличия стартера от библиотеки?**\n\n| **Характеристика** | **Starter**                    | **Library**              |\n| ------------------ | ------------------------------ | ------------------------ |\n| **Состав**         | Включает набор библиотек       | Одиночная библиотека     |\n| **Настройка**      | Автоматическая                 | Требует ручной настройки |\n| **Пример**         | `spring-boot-starter-data-jpa` | `hibernate-core`         |\n"
  popularity = 5.92

[[questions]]
  id = 33
  question = "Spring Criteria API"
  answer = "Spring Criteria API (часть Hibernate) предоставляет гибкий способ построения запросов к БД. Позволяет составлять запросы с использованием Java-классов\n\n**Ключевые особенности Criteria API**\n1. **Динамическое построение запросов** - удобно для ситуаций, когда структура запроса может меняться в рантайме в зависимости от условий\n2. **Безопасность типов** - ошибки в синтаксисе запросов обнаруживаются на этапе компиляции\n3. **Ленивость** - запрос выполняется только при обращении к результатам\n4. **Поддержка сложных запросов** - подзапросы, группировки, сортировки, фильтрации и агрегатные функции\n\n**Пример использования**\n```java\n@Entity\npublic class Employee {\n    @Id\n    @GeneratedValue(strategy = GenerationType.IDENTITY)\n    private Long id;\n    private String name;\n    private double salary;\n\n    // getters и setters\n}\n\n@Repository\npublic class EmployeeRepository {\n\n    @PersistenceContext\n    private EntityManager entityManager;\n\n    public List<Employee> findEmployeesWithSalaryGreaterThan(double minSalary) {\n        // Получаем CriteriaBuilder\n        CriteriaBuilder criteriaBuilder = entityManager.getCriteriaBuilder();\n\n        // Создаём CriteriaQuery\n        CriteriaQuery<Employee> criteriaQuery = criteriaBuilder.createQuery(Employee.class);\n\n        // Корневой объект (FROM Employee)\n        Root<Employee> root = criteriaQuery.from(Employee.class);\n\n        // Условие (WHERE salary > :minSalary)\n        criteriaQuery.select(root)\n                     .where(criteriaBuilder.gt(root.get(\"salary\"), minSalary));\n\n        // Выполняем запрос\n        return entityManager.createQuery(criteriaQuery).getResultList();\n    }\n}\n```\n"
  popularity = 3.14

