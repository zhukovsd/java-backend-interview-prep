| **Аннотация** | Место применения                  | Применение                                   |\n| ------------- | --------------------------------- | -------------------------------------------- |\n| `@Bean`       | Над методом в классе-конфигурации | При необходимости настраивать бин программно |\n| `@Component`  | Над классом                       | Для автоматического сканирования             |\n"
