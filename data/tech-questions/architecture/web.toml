[[questions]]
  id = 3
  question = "REST vs SOAP"
  answer = "SOAP и REST - это два разных подхода к разработке API. Подход SOAP отличается высокой степенью структурированности и использует формат данных XML. REST более гибкий и позволяет приложениям обмениваться данными в нескольких форматах\n\n_Примечание: на данный момент SOAP считается устаревшим подходом, используется только на легаси проектах_\n"
  popularity = 1.05

[[questions]]
