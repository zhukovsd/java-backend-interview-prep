[[questions]]
  id = 1
  question = "GOF паттерны"
  answer = "*GOF паттерны* - это классические шаблоны проектирования, описанные в книге \"Design Patterns: Elements of Reusable Object-Oriented Software\", написанной четырьмя авторами (так называемой \"Бандой четырёх\"): Эричем Гаммой, Ричардом Хелмом, Ральфом Джонсоном и Джоном Влиссидесом. Эти паттерны решают распространённые проблемы проектирования в объектно-ориентированном программировании (ООП) и помогают создавать гибкую и поддерживаемую архитектуру.\n\n"
  popularity = 12.06

