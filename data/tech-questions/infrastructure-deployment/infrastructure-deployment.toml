[[questions]]
  id = 1
  question = "CI/CD"
  answer = "CI/CD (continious integration - continious delivery/deployment) - набор инструментов и практик для автоматизации тестирования и развёртывания приложения\nCI - автоматизация тестирования и интеграции кода в общую ветку. Например, на каждый pull/merge request запускаются тесты, анализ на уязвимости\nCD - автоматизация процесса доставки и развёртывания приложений на различные среды (dev, staging, production) после успешного тестирования\n"
  popularity = 2.79

[[questions]]
  id = 2
  question = "Как работает Docker. Из чего состоит докер образ?"
  answer = "Docker-образ состоит из:\n- базового слоя (например, alpine, ubuntu)\n- набора слоёв файловой системы, которые включают установленные пакеты, зависимости и конфигурации\n- манифеста (метаданных), описывающих его слои и зависимости\n"
  popularity = 3.14

[[questions]]
  id = 3
  question = "Что такое слой? Как мы можем создать новый слой?"
  answer = "Слой - это промежуточный этап, создаваемый при выполнении каждой команды в Dockerfile (`RUN`, `COPY`, `ADD`). Каждый слой является неизменяемым, а Docker использует кэш для уже созданных слоёв\n"
  popularity = 0.35

[[questions]]
  id = 4
  question = "Docker compose"
  answer = "*Docker Compose* — это инструмент для запуска и управления несколькими Docker-контейнерами, описанными в одном файле `docker-compose.yml`. Он позволяет легко управлять зависимыми сервисами (например, веб-сервер, база данных) в одном окружении.\n\n---\n***Разница между Docker File и Docker Compose***\n\n**Dockerfile** и **Docker Compose** — это инструменты Docker, но они служат для разных задач:\n\n1. **Dockerfile**\n    \n    - Это файл, где вы описываете, как собрать образ (шаблон) контейнера.\n    - С его помощью можно указать, какие программы устанавливать, какие файлы добавлять и какую команду запускать при старте контейнера.\n    - Применяется для создания **одного образа**.\n    - *Пример*:  \n        Вы хотите запустить приложение на Java. В Dockerfile вы указываете, чтобы скачивалась нужная версия JDK, копировался ваш код и запускалось приложение.\n2. **Docker Compose**\n    \n    - Это инструмент для управления несколькими контейнерами. Он не создает образы, а работает с уже готовыми.\n    - В файле `docker-compose.yml` вы описываете, как разные контейнеры будут взаимодействовать: какие порты открыть, какие сети использовать, какие данные хранить.\n    - Применяется для **оркестрации нескольких сервисов**.\n    - *Пример*:  \n        Ваше приложение на Java использует базу данных. В Compose вы описываете, чтобы одновременно запускались контейнеры с приложением и с базой данных, а также настраиваете их соединение.\n\n**Ключевая разница:**\n\n- **Dockerfile** нужен для создания образа одного контейнера.\n- **Docker Compose** — для управления и запуска нескольких связанных контейнеров.\n\n"
  popularity = 2.79

[[questions]]
  id = 5
  question = "ARG, ENV. В чем отличия?"
  answer = "- `ARG` - параметры, которые передаются во время сборки образа. Доступны только во время создания Docker-образа и не сохраняются в контейнере\n- `ENV` - переменные окружения, которые задаются в контейнере и могут быть использованы приложениями, запущенными в контейнере\n"
  popularity = 0.35

[[questions]]
  id = 6
  question = "Docker cmd vs entrypoint"
  answer = "`CMD` - определяет команду по умолчанию, которая выполняется при запуске контейнера. Может быть переопределена при запуске (`docker run`)\n`ENTRYPOINT` - указывает фиксированную команду, которая всегда будет выполняться. Аргументы могут быть переданы через `CMD` или командную строку. Может быть переопределена через флаг `--entrypoint`\n\n[Статья на Хабре про CMD и ENTRYPOINT в Dockerfile](https://habr.com/ru/companies/nixys/articles/830830/)\n"
  popularity = 0.7

[[questions]]
  id = 7
  question = "Отличия контейнеризации от виртулизации"
  answer = "Виртуализация представляет собой эмуляцию на уровне железа. Каждая виртуальная машина представляет собой самостоятельную машину со своей ОС\n\nКонтейнеризация - разделение приложений на уровне операционной системы. Контейнеры используют одно ядро ОС и изолируются друг от друга\n"
  popularity = 4.53

[[questions]]
  id = 8
  question = "Поддержка сервиса в продакшене, мониторинг его работы. Общие подходы?"
  answer = "Поддержка сервиса в продакшене включает в себя обеспечение его доступности, производительности и надежности\n\n**Общие подходы:**\n1. **Мониторинг и логирование**\n    - **Prometheus** - cбор метрик\n    - **Grafana** - визуализация метрик, настройка алертов\n    - **ELK Stack (Elasticsearch, Logstash, Kibana)** - анализ и хранение логов\n    - **Datadog / New Relic** - для полного мониторинга приложения и инфраструктуры\n2. **Управление отказами**\n    - Настройка системы алертов (например, через **PagerDuty** или **Grafana**)\n    - Автоматизация перезапуска сервисов с помощью **Docker Restart Policies** или **Kubernetes Deployment Strategies**\n3. **Планы восстановления**\n    - Настройка резервного копирования (базы данных, конфигураций)\n    - Разработка сценариев восстановления после сбоев\n4. **Масштабируемость**\n    - Горизонтальное масштабирование с помощью **Kubernetes**, **Docker Swarm** или облачных решений (AWS ECS, Azure AKS, Google GKE)\n    - Использование **автоскейлинга** для добавления ресурсов в моменты пиковых нагрузок\n5. **Интеграция CI/CD**\n    - Автоматическое развертывание обновлений с предварительным тестированием\n    - Настройка этапов отката (rollback) в случае неудачи\n6. **Health Checks**\n    - Настройка проверки работоспособности сервиса (например, HTTP `/health` endpoint)\n    - Встроенные механизмы Docker или Kubernetes для мониторинга контейнеров\n\n**Пример мониторинга сервиса**\n1. **Мониторинг метрик**\n    - Настройка **Prometheus** для сбора данных о запросах, загрузке CPU и использовании памяти\n    - Визуализация дашбордов в **Grafana**\n2. **Логирование**\n    - Логи сервисов собираются через **Fluentd** или **Filebeat** и передаются в **Elasticsearch**\n3. **Алерты**\n    - Настройка оповещений через **Slack** или **PagerDuty** для уведомлений при отказах или аномалиях\n4. **Проверки состояния**\n    - Добавление `/health` endpoint, возвращающего статус 200, если сервис работает корректно"
  popularity = 0.35
