[[questions]]
  id = 1
  question = "Liquibase. Что это и для чего?"
  answer = "Liqubase - это инструмент управления миграциями базы данных. Позволяет версионировать изменения в базе данных, отслеживать их и автоматически применять при обновлениях"
  popularity = 3.14

[[questions]]
  id = 2
  question = "Какие записи создаёт liquibase во время миграции?"
  answer = "Liquibase автоматически создаёт несколько служебных таблиц (при первой миграции) и использует их для отслеживания текущего состояния схемы базы данных и применённых миграций\n\n**DATABASECHANGELOG** - хранит информацию о выполненных миграциях (changelog-файлах).\n\n|**Поле**|**Описание**|\n|---|---|\n|ID|Уникальный идентификатор изменения|\n|AUTHOR|Автор миграции|\n|FILENAME|Путь к файлу миграции (например, `changelog.xml`)|\n|DATEEXECUTED|Дата выполнения изменения|\n|ORDEREXECUTED|Порядок выполнения изменений|\n|MD5SUM|Хэш содержимого изменения для проверки|\n\n**DATABASECHANGELOGLOCK** - предотвращает одновременное выполнение миграций разными процессами\n\n|**Поле**|**Описание**|\n|---|---|\n|ID|Идентификатор блокировки (обычно `1`)|\n|LOCKED|Флаг (`TRUE` или `FALSE`), показывающий, занята ли блокировка|\n|LOCKGRANTED|Время предоставления блокировки|\n|LOCKEDBY|Информация о процессе, который удерживает блокировку|\n"
  popularity = 0.7

[[questions]]
  id = 3
  question = "Зачем нужны инструменты миграции?"
  answer = "Инструменты миграций (Liquibase, Flyway) нужны для удобства управления миграциями. Основные цели:\n1. **автоматизация обновлений** - автоматическое применение изменений базы данных (создание таблиц, добавление столбцов, индексов и т.д.)\n2. **откат изменений** - возможность отменить применённые миграции в случае ошибок\n3. **отслеживание изменений** - позволяет вести историю всех изменений базы (версионирование)\n4. **безопасность** - инструменты предотвращают выполнение миграций двумя процессами одновременно (через блокировки)\n5. **согласованность** - изменения гарантированно применяются одинаково на всех окружениях (локально, тестовые, продакшн)\n6. **упрощение совместной работы** - разработчики могут синхронизировать свои изменения через централизованные файлы миграции"
  popularity = 1.39
