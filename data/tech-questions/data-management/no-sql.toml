[[questions]]
  id = 1
  question = "NoSQL типы БД"
  answer = "\n| **Тип**                       | **Пример**      | **Особенности**                                               | **Когда использовать**                     |\n| ----------------------------- | --------------- | ------------------------------------------------------------- | ------------------------------------------ |\n| Документные                   | MongoDB         | JSON-документы, гибкая структура                              | Динамические, неструктурированные данные   |\n| Ключ-значение                 | Redis, DynamoDB | Максимально быстрый доступ                                    | Кэш, данные с уникальными ключами          |\n| Колоночные  <br>(wide-column) | Cassandra       | Хранение колонок внутри других колонок, объединение в групппы | Аналитика, обработка больших данных        |\n| Поисковые                     | Elasticsearch   | Обратный индекс, по факту документная бд                      | Полнотекстовый поиск, поиск по логам       |\n| Графовые                      | Neo4j           | Узлы и связи                                                  | Моделирование сложных связей между данными |\n"
  popularity = 1.39

[[questions]]
  id = 2
  question = "Для чего используется Redis?"
  answer = "Redis - это высокопроизводительная NoSQL база данных, которая работает в оперативной памяти (in-memory), обеспечивая минимальные задержки. Основное назначение Redis - хранение данных в виде ключ-значение\n"
  popularity = 3.14

[[questions]]
  id = 3
  question = "Что такое Кэш?"
  answer = "[Статья про кэш на Хабре](https://habr.com/ru/articles/734660/)\n\n**Кэш** - это временное хранилище данных, созданное для ускорения повторного доступа к ним\n\n**Преимущества**\n- **Ускорение** - данные быстрее извлекаются из кэша, чем из основного хранилища\n- **Экономия ресурсов** - уменьшение нагрузки на сервер базы данных\n- **Снижение задержек** - быстрый доступ к часто используемым данным\n\n**Пример**\nКэширование результата SQL-запроса:\n1. пользователь делает запрос к базе данных\n2. результат сохраняется в Redis\n3. повторный запрос возвращает данные из кэша Redis\n\n**Подходы к настройке инвалидации кэша**\nИнвалидация кэша необходима для обеспечения актуальности данных в кэше. Существует несколько основных подходов:\n\n**1. Time-to-Live (TTL)**\nУстанавливается время жизни данных в кэше. После истечения этого времени данные удаляются автоматически\n\n**Преимущества**:\n- Простота настройки, минимальная нагрузка на систему\n**Недостатки**:\n- Возможна работа с устаревшими данными до истечения TTL\n\nУстановка времени жизни 60 секунд:\n```java\nredis.set(key, value, 60);\n```\n\n**2. Manual Invalidation**\nИнвалидация данных выполняется вручную, например, при обновлении данных в основной базе данных\n\n**Преимущества**\n- Полный контроль над процессом\n**Недостатки**\n- Возможен человеческий фактор - забыть удалить данные из кэша\n\nУдаление ключа после изменения записи в базе:\n```java\nredis.del(\"user:123\");\n```\n\n**3. Инвалидация по событию**\nДанные инвалидируют при наступлении некоего события - обычно это обновление данных в источнике (**write through** и **write aside** стратегии кэширования).\nТакже в качестве события для инвалидации данных может выступать время последней модификации данных\n"
  popularity = 0.7
