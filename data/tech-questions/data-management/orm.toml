[[questions]]
  id = 20
  question = "Логи в Hibernate"
  answer = "Hibernate предоставляет детализированные логи через категорию `org.hibernate.SQL`. Это помогает отслеживать сгенерированные SQL-запросы, параметры и выполнение транзакций. Включение логов может помочь отладить проблемы с производительностью или запросами, но может замедлить выполнение при большом количестве запросов.\n\n```java\nlog4j.logger.org.hibernate.SQL=DEBUG\nlog4j.logger.org.hibernate.type.descriptor.sql.BasicBinder=TRACE\n```\n\n"
